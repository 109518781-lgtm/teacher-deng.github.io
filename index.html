<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>学生复习资料</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1a1a2e;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .file-list {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        .file-item:hover {
            background: #f8f9fa;
        }
        .file-icon {
            font-size: 22px;
            margin-right: 15px;
        }
        .file-link {
            flex: 1;
            text-decoration: none;
            color: #333;
            font-size: 16px;
            word-break: break-word;
        }
        .file-link:hover {
            color: #0366d6;
            text-decoration: underline;
        }
        .empty-tip {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #999;
            font-size: 12px;
        }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .file-item { padding: 12px 15px; }
            .file-link { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 学生复习资料</h1>
        <div class="subtitle">点击文件名开始复习</div>
        <div class="file-list" id="fileList"></div>
        <div class="footer">
            ⏰ 最后更新：<span id="updateTime"></span>
        </div>
    </div>
    <script>
        // 由 GitHub Actions 自动生成的文件数据
        const files = ["数学_高中_平面向量解析.html", "英语_七年级_下册_七下英语外研版U1练习.html", "英语_七年级_下册_七下英语外研版U2练习.html", "英语_七年级_下册_七下英语外研版U3练习.html", "英语_八年级_下册_初二英语下册外研版单词预习.html", "英语_新概念1册_新概念59-60练习.html", "英语_新概念1册_新概念77-78练习.html", "英语_新概念1册_新概念79-80练习.html", "英语_新概念1册_新概念81-82练习.html", "语文_七年级_下册_七下语文第三单元练习.html", "语文_七年级_下册_七下语文第二单元练习.html", "赢未来国雅-英语单词互动小游戏.html"];
        
        const container = document.getElementById("fileList");
        
        if (!files || files.length === 0) {
            container.innerHTML = '<div class="empty-tip">📭 暂无复习资料，请上传 HTML 文件</div>';
        } else {
            let html = '';
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                // 去掉 .html 后缀作为显示名称
                let displayName = file.replace(/\.html$/i, '');
                html += `
                    <div class="file-item">
                        <span class="file-icon">📘</span>
                        <a href="${file}" class="file-link" target="_blank">${displayName}</a>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        document.getElementById("updateTime").innerText = new Date().toLocaleString("zh-CN");
    </script>
</body>
</html>

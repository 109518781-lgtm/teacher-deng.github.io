    function makeWordsClickable(container) {

            var last = 0, match;
            var frag = document.createDocumentFragment();
            while ((match = regex.exec(text)) !== null) {
                if (match.index > last) frag.appendChild(document.createTextNode(text.substring(last, match.index)));

                var span = document.createElement('span');
                span.className = 'clickable-word';
                span.innerText = word;
                span.addEventListener('click', (function(w) { return function(e) { e.stopPropagation(); showWordMeaning(w); }; })(word));
                frag.appendChild(span);
                last = match.index + match[0].length;
            }
            if (last < text.length) frag.appendChild(document.createTextNode(text.substring(last)));
            if (frag.childNodes.length) textNode.parentNode.replaceChild(frag, textNode);
        });
    }

    var passageA = "Chelsea Flower Show, London\nAlso known as the 'Great Spring Show', the Chelsea Flower Show is a wonderful showcase of garden designs and flower displays. Many gardeners come to London from around the world for the five-day event.\n\nSt Patrick's Day, Ireland\nSt Patrick's Day celebrates the passing of the patron saint and is a national holiday in Ireland. The capital Dublin takes things to a whole other level, with wonderful street performances, concerts, and displays.\n\nOktoberfest, Germany\nThis year will mark the 188th anniversary of Munich Oktoberfest. What was previously a few stands is now Germany's largest celebration. Though the rides and games are amazing, the beer tents are where the most exciting events are held.\n\nFiesta de San Isidro, Spain\nEach year, Spain holds the Fiesta de San Isidro during the spring in memory of the patron saint of Madrid. Over the course of a few days, the whole city becomes a sea of Latin culture, including Spanish music, dance, and theatre both indoors and outdoors.";

    var passageC = "Many of us live with a roommate at some stage. Sometimes, there can be problems. Who hasn't had an argument about whose turn it is to take out the rubbish? However, living with another person also comes with many benefits.\n\nYou know that there's always someone else around which can help you feel safer. There is always someone to talk to, so you never feel lonely. Besides these obvious benefits, there are some you may not notice. For example, we're actually more likely to eat healthier food when living with others.\n\nAustralian researchers found that people living alone tended to eat less fresh food, which can have a negative effect on long-term health. However, those living with others generally benefited from a more varied diet.\n\nCooking skills may be another factor. If people living alone find they do not have the knowledge required to prepare a particular dish, they may fall back on ready-made, less healthy food. In addition, people living alone can eat whatever they want at any time. However, it's helpful to have someone around who questions your decision to eat frozen pizza at 3 am.\n\nSo, if you now live alone and find yourself fighting a losing battle against poor eating habits, why not consider sharing a home with someone else?";

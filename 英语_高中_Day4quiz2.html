<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>

        }
        .detail-explanation {
            margin: 12px 0 0 0;

            border-radius: 20px;
            font-size: 0.88rem;
            line-height: 1.5;
        }
        .note-box {
            margin-top: 16px;
            background: #edf6ef;

            font-size: 0.85rem;

        .lock-message {

        .analysis-special {
            margin: 0px;
            background: #fefbed;
            border-radius: 32px;
            padding: 0px 0px 12px 0px;
            border: 1px solid #f0e2bc;
        }
        .analysis-title {
            font-weight: 800;
            font-size: 1rem;
            padding: 20px 24px 8px 24px;

            background: #fff8e7;
            border-bottom: 1px dashed #efdfb2;
        }
        .phrase-list, .sentence-list {
            padding: 8px 24px 20px 24px;

        .phrase-item, .sentence-item {
            margin-bottom: 18px;

            border-radius: 24px;
            border-left: 4px solid #cfb87c;
        }
        .phrase-text {
            font-weight: 700;
            color: #3c6e47;
            font-size: 0.9rem;

            flex-wrap: wrap;

        }
        .phrase-en {

            border-radius: 40px;
        }

            font-size: 0.85rem;
        }
        .phrase-example {
            font-size: 0.85rem;

            padding-left: 8px;
            border-left: 2px solid #dfcca2;
        }
        .sentence-grammar {
            background: #fef7e6;
            padding: 10px 14px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.85rem;

        }
        .sentence-en {
            font-weight: 600;
            color: #2f6042;
        }
        .sentence-zh {
            color: #a5651e;

        }
        .hover-word {
            border-bottom: 1px dashed #6f9a82;

        }
        .hover-word:hover {
            background: #d9f0e4;

        .method-card {
            background: #eef3f0;

            padding: 18px 22px;
            margin: 0 0 20px 0;
        }
        .badge-method {
            background: #d9e6de;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #2f6b48;
        }
        .vocab-table, .sentence-table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffffdd;
            border-radius: 24px;
            overflow: hidden;
            margin-top: 12px;
        }
        .vocab-table th, .vocab-table td, .sentence-table th, .sentence-table td {
            border: 1px solid #dbeadf;
            padding: 10px 12px;
            vertical-align: top;
            font-size: 0.85rem;
        }
        .vocab-table th, .sentence-table th {
            background: #e2f0e8;
            font-weight: 600;
            color: #245f41;
        }
        .section-title-icon {
            margin: 20px 0 10px 0;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .editable-cell {
            background-color: #fffff2;
        }
        @media (max-width: 640px) {
            body { padding: 16px 12px; }
            .question-panel { padding: 18px 16px 6px 16px; }
            .phrase-list, .sentence-list { padding: 8px 16px 16px 16px; }
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #86a694;
            margin: 32px 0 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>✨ 赢未来国雅 · 英语练习考点精析 ✨</h1>
        <p>完形填空 · 工厂劳动与成长 | 上下文逻辑 + 词汇搭配</p>
        <div class="meta-info">📌 来源：2022新课标I卷 · 难度较难</div>
    </div>
    <div id="questionsRoot"></div>
    <footer>💡 点击选项即锁定答案，显示你的答案vs正确答案。悬停英文单词显示释义，下方表格可自填复习。</footer>
</div>

<script>
    // ========== 单词悬停释义库 ==========
    const meaningMap = {
        "tax-paying": "纳税的", "employed": "受雇的", "baking": "烘焙", "manager": "经理", "Easter": "复活节",
        "bunny": "小兔子", "downtown": "市中心", "minimum wage": "最低工资", "grand": "宏大的", "icing": "糖霜",
        "belt": "传送带", "high-pressure": "高压力的", "grocer": "杂货商", "appreciate": "感激；珍惜",
        "temporary": "临时的", "permission": "允许", "delivering": "运送", "withdraw": "取钱", "donate": "捐赠"
    };
    function addWordHover(text) {
        if (!text) return text;
        return text.replace(/\b([A-Za-z][A-Za-z\-']{1,35})\b/g, (match) => {
            let low = match.toLowerCase();
            let meaning = meaningMap[low] || meaningMap[match];
            if (meaning) return `<span class="hover-word" title="${meaning}">${match}</span>`;
            return match;
        });
    }

    // ========== 完形填空数据 (41-55) ==========
    const clozeQuestions = [
        { id: 41, text: "My best friend Betsy's father was a manager at Hough Bakeries, which, at Easter time, ______ little bunny cakes for all its ______ throughout Cleveland.", options: ["A. sold", "B. ordered", "C. made", "D. reserved"], correct: "C", explanation: "烘焙厂在复活节制作兔子蛋糕，made 符合生产场景。", note: "make cakes 制作蛋糕；上下文化语境" },
        { id: 42, text: "My best friend Betsy's father was a manager at Hough Bakeries, which, at Easter time, ______ little bunny cakes for all its ______ throughout Cleveland.", options: ["A. stores", "B. families", "C. schools", "D. citizens"], correct: "A", explanation: "为所有门店制作蛋糕，stores 指代分店。", note: "its stores 它的各个店铺；商业语境" },
        { id: 43, text: "It happened that the plant downtown needed eight kids for ______ help during our spring break.", options: ["A. generous", "B. financial", "C. technical", "D. temporary"], correct: "D", explanation: "春假期间的临时帮手，temporary 临时的。", note: "temporary help 临时工" },
        { id: 44, text: "for which I had no ______ beyond listening to my favorite records.", options: ["A. plans", "B. problems", "C. excuses", "D. hobbies"], correct: "A", explanation: "除了听唱片之外没有其他计划。", note: "have no plans 没有安排" },
        { id: 45, text: "I'd ______ minimum wage.", options: ["A. offer", "B. earn", "C. set", "D. suggest"], correct: "B", explanation: "挣最低工资，earn 获得报酬。", note: "earn minimum wage 挣法定最低工资" },
        { id: 46, text: "I'd see how a factory ______.", options: ["A. worked", "B. closed", "C. developed", "D. survived"], correct: "A", explanation: "了解工厂如何运作，work 运转。", note: "how a factory works 工厂运作方式" },
        { id: 47, text: "My parents thought all of this was a grand idea and called Betsy's dad with their ______.", options: ["A. ambition", "B. permission", "C. experience", "D. invitation"], correct: "B", explanation: "打电话征得同意，permission 许可。", note: "with their permission 得到他们的允许" },
        { id: 48, text: "Our ______ in the factory were simple: Place cakes on a moving belt. Attach icing ears. Apply icing eyes and nose. ______ bunny from the belt.", options: ["A. joys", "B. ideas", "C. roles", "D. choices"], correct: "C", explanation: "我们在工厂的职责很简单，roles 角色/任务。", note: "roles 工作任务" },
        { id: 49, text: "Our ______ in the factory were simple: Place cakes on a moving belt. Attach icing ears. Apply icing eyes and nose. ______ bunny from the belt.", options: ["A. Save", "B. Keep", "C. Stop", "D. Remove"], correct: "D", explanation: "将兔子蛋糕从传送带上取下，remove 移开。", note: "remove from 从…移除" },
        { id: 50, text: "This was ______ than it sounds.", options: ["A. harder", "B. better", "C. longer", "D. cheaper"], correct: "A", explanation: "实际上比听起来更难，harder 更困难。", note: "比较级 harder 呼应 high-pressure" },
        { id: 51, text: "______ a bit and the cakes pile up.", options: ["A. Calm down", "B. Slow down", "C. Stay on", "D. Move on"], correct: "B", explanation: "慢一点蛋糕就会堆积，slow down 放慢速度。", note: "slow down 减速；pile up 堆积" },
        { id: 52, text: "As I told my parents at dinner that first night, it was all a little more high-pressure than I'd ______.", options: ["A. indicated", "B. witnessed", "C. expected", "D. remembered"], correct: "C", explanation: "比我预期的压力更大，expected 预料。", note: "than I'd expected 超出预料" },
        { id: 53, text: "Dad ______.", options: ["A. cried", "B. smiled", "C. hesitated", "D. refused"], correct: "B", explanation: "父亲微笑，表示理解和欣慰。", note: "根据上下文父亲分享自己的经历，表情应为微笑" },
        { id: 54, text: "The son of a grocer, he'd spent the summers of his childhood ______ food in Benardsville, New Jersey.", options: ["A. tasting", "B. finding", "C. sharing", "D. delivering"], correct: "D", explanation: "童年夏天送食物，delivering 运送。", note: "delivering food 送食物" },
        { id: 55, text: "This was the sort of work that made you ______ the dollars you earned and respect those who did the work, he told me.", options: ["A. withdraw", "B. donate", "C. receive", "D. appreciate"], correct: "D", explanation: "让你珍惜赚到的钱，appreciate 珍惜/感激。", note: "appreciate the dollars 珍惜金钱" }
    ];

    // 完整文章呈现（带空原文供阅读）
    const fullPassage = `My life as a tax-paying employed person began in middle school, when, for three whole days, I worked in a baking factory.

My best friend Betsy's father was a manager at Hough Bakeries, which, at Easter time, [41] little bunny cakes for all its [42] throughout Cleveland. It happened that the plant downtown needed eight kids for [43] help during our spring break, for which I had no [44] beyond listening to my favorite records. I'd [45] minimum wage. I'd see how a factory [46]. My parents thought all of this was a grand idea and called Betsy's dad with their [47].

Our [48] in the factory were simple: Place cakes on a moving belt. Attach icing ears. Apply icing eyes and nose. [49] bunny from the belt. This was [50] than it sounds. [51] a bit and the cakes pile up. As I told my parents at dinner that first night, it was all a little more high-pressure than I'd [52].

Dad [53]. The son of a grocer, he'd spent the summers of his childhood [54] food in Benardsville, New Jersey. This was the sort of work that made you [55] the dollars you earned and respect those who did the work, he told me.`;

    // 核心短语 + 长难句
    const phraseList = [
        { phrase: "minimum wage", meaning: "最低工资", example: "I'd earn minimum wage at the factory." },
        { phrase: "pile up", meaning: "堆积", example: "Slow down and the cakes pile up." },
        { phrase: "high-pressure", meaning: "高压力的", example: "It was more high-pressure than I'd expected." },
        { phrase: "spend time doing", meaning: "花时间做某事", example: "He spent summers delivering food." },
        { phrase: "make sb appreciate", meaning: "让某人珍惜", example: "The work made me appreciate the money I earned." },
        { phrase: "respect those who", meaning: "尊重那些……的人", example: "Respect those who do the hard work." }
    ];

    const longSentences = [
        { sentence: "My life as a tax-paying employed person began in middle school, when, for three whole days, I worked in a baking factory.", translation: "我作为纳税就业者的生活始于中学时期，当时我整整三天在一家烘焙厂工作。", analysis: "when引导定语从句修饰middle school；插入语for three whole days。" },
        { sentence: "This was the sort of work that made you appreciate the dollars you earned and respect those who did the work, he told me.", translation: "他告诉我，这种工作能让你珍惜自己挣到的钱，并尊重那些从事这种工作的人。", analysis: "that引导定语从句修饰work；made you appreciate and respect 双宾语；who引导定语从句修饰those。" }
    ];

    const strategyBlock = `
        <div class="method-card">
            <div class="badge-method">🎯 完形填空 · 解题策略与思路</div>
            <ul style="margin-left:20px; margin-top:12px; color:#375e4c; line-height:1.5;">
                <li><strong>1. 语境逻辑链：</strong> 从“烘焙厂 Easter time” → 制作蛋糕 (made) → 供给各门店 (stores)。</li>
                <li><strong>2. 固定搭配与词义辨析：</strong> temporary help, earn wage, remove from, slow down, pile up。</li>
                <li><strong>3. 情感线索：</strong> 作者感到压力比预期大 (expected)，父亲微笑(smiled) 表示共情理解。</li>
                <li><strong>4. 上下文复现：</strong> high-pressure 呼应 harder；appreciate 对应珍惜劳动所得。</li>
                <li><strong>5. 主旨升华：</strong> 结尾父亲的话点明劳动让人懂得珍惜和尊重。</li>
            </ul>
        </div>
    `;

    const root = document.getElementById("questionsRoot");
    function buildExam() {
        let html = `
            <div class="card">
                <div class="question-panel">
                    <div class="question-text">📖 完形填空 · 工厂里的第一份工作 (2022新课标I卷)</div>
                    <div class="cloze-passage">${addWordHover(fullPassage)}</div>
                </div>
            </div>
        `;
        clozeQuestions.forEach((q, idx) => {
            html += `
                <div class="card" data-qid="cloze_${q.id}" data-correct="${q.correct}" data-type="cloze" data-explanation='${q.explanation.replace(/'/g, "&#39;")}' data-note='${q.note.replace(/'/g, "&#39;")}'>
                    <div class="question-panel">
                        <div class="question-item">
                            <div class="question-text">${q.id}. ${addWordHover(q.text)}</div>
                            <div class="options-list" id="opts-cloze_${q.id}">
            `;
            q.options.forEach(opt => {
                let letter = opt.charAt(0);
                let optRaw = opt.slice(1).trim();
                html += `<div class="option" data-val="${letter}"><div class="option-letter">${letter}</div><div class="option-text">${addWordHover(optRaw)}</div></div>`;
            });
            html += `</div></div><div class="feedback-area" id="fb-cloze_${q.id}" style="display:none;"></div></div>`;
        });

        // 短语+长难句区域
        html += `<div class="card"><div class="analysis-special">
                    <div class="analysis-title">📚 高频搭配 & 核心短语 · 长难句精析</div>
                    <div class="phrase-list"><strong style="display:block; margin-bottom:14px;">🔖 常考短语 (含释义+例句)</strong>`;
        phraseList.forEach(p => {
            html += `<div class="phrase-item">
                        <div class="phrase-text"><span class="phrase-en">${addWordHover(p.phrase)}</span> <span class="phrase-zh">${p.meaning}</span></div>
                        <div class="phrase-example">💬 ${addWordHover(p.example)}</div>
                     </div>`;
        });
        html += `</div><div class="sentence-list"><strong style="display:block; margin:20px 0 14px;">🧩 长难句 + 语法分析</strong>`;
        longSentences.forEach(ls => {
            html += `<div class="sentence-item">
                        <div class="sentence-en">📖 ${addWordHover(ls.sentence)}</div>
                        <div class="sentence-zh">📝 中文：${ls.translation}</div>
                        <div class="sentence-grammar">📌 语法解析：${ls.analysis}</div>
                     </div>`;
        });
        html += `</div></div></div>`;
        html += strategyBlock;

        // 难词表+长难句积累表（可编辑）
        html += `<div class="card" style="padding:16px 22px 22px 22px;">
                    <div class="section-title-icon">📘 我的难词表 · 自主复习</div>
                    <table class="vocab-table"><thead><tr><th>序号</th><th>单词</th><th>词性及释义</th><th>我的笔记</th></tr></thead>
                    <tbody id="vocabTbody">${[...Array(10)].map((_,i)=>`<tr><td>${i+1}</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>`).join('')}</tbody></table>
                    <div class="section-title-icon" style="margin-top:24px;">📜 长难句积累 · 语料库</div>
                    <table class="sentence-table"><thead><tr><th>序号</th><th>长难句</th><th>备注（翻译/结构分析）</th></tr></thead>
                    <tbody id="sentenceTbody">${[...Array(5)].map((_,i)=>`<tr><td>${i+1}</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>`).join('')}</tbody></table>
                    <div style="font-size:0.7rem; color:#8aa998; margin-top:12px;">✏️ 点击单元格即可填写，自由记录难词和长难句分析。</div>
                </div>`;
        root.innerHTML = html;
        attachEvents();
    }

    function attachEvents() {
        const cards = document.querySelectorAll('.card[data-qid]');
        cards.forEach(card => {
            const correctAns = card.getAttribute('data-correct');
            const expRaw = card.getAttribute('data-explanation');
            const noteRaw = card.getAttribute('data-note');
            const explanation = expRaw || "上下文逻辑推断得出。";
            const note = noteRaw || "注意固定搭配与逻辑衔接。";
            const optsDiv = card.querySelector('.options-list');
            if (!optsDiv) return;
            const options = optsDiv.querySelectorAll('.option');
            options.forEach(opt => {
                opt.addEventListener('click', () => {
                    if (card.classList.contains('answered')) return;
                    const selectedVal = opt.getAttribute('data-val');
                    const isCorrect = (selectedVal === correctAns);
                    const feedbackDiv = card.querySelector('.feedback-area');
                    if (!feedbackDiv) return;
                    let yourFull = "", correctFull = "";
                    options.forEach(op => {
                        if(op.getAttribute('data-val') === selectedVal) yourFull = op.querySelector('.option-text')?.innerText || selectedVal;
                        if(op.getAttribute('data-val') === correctAns) correctFull = op.querySelector('.option-text')?.innerText || correctAns;
                    });
                    feedbackDiv.innerHTML = `
                        <div class="result-badge ${isCorrect ? 'correct-badge' : 'wrong-badge'}">${isCorrect ? '✔ 回答正确' : '❌ 回答错误'}</div>
                        <div class="answer-compare"><div class="your-answer">📌 你的答案：${selectedVal}. ${yourFull}</div><div class="correct-answer">✅ 正确答案：${correctAns}. ${correctFull}</div></div>
                        <div class="detail-explanation"><strong>🔎 详细解析：</strong> ${explanation}<br/><strong>📘 考点笔记：</strong> ${note}</div>
                        <div class="lock-message">🔒 答案已锁定，不可修改</div>
                    `;
                    feedbackDiv.style.display = 'block';
                    card.classList.add('answered');
                    options.forEach(op => op.classList.add('disabled-opt'));
                });
            });
        });
    }

    buildExam();
</script>
</body>
</html>

<!DOCTYPE html>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5fbf7;

        .option-letter { font-weight: 800; background: #e3f0e9; width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border-radius: 40px; color: #2b6e4c; flex-shrink: 0; }

        .analysis-special { background: #fefbed; border-radius: 32px; padding: 0px 0px 12px 0px; border: 1px solid #f0e2bc; margin: 20px 0; }
        .analysis-title { font-weight: 800; font-size: 1rem; padding: 20px 24px 8px 24px; color: #b17f2e; background: #fff8e7; border-bottom: 1px dashed #efdfb2; }
        .phrase-list, .sentence-list { padding: 8px 24px 20px 24px; }
        .phrase-item, .sentence-item { margin-bottom: 18px; padding: 10px 14px; background: #fffcf0; border-radius: 24px; border-left: 4px solid #cfb87c; }
        .phrase-text { font-weight: 700; color: #3c6e47; font-size: 0.9rem; display: flex; flex-wrap: wrap; gap: 8px; align-items: baseline; }
        .phrase-en { background: #e8f0e3; padding: 2px 10px; border-radius: 40px; }
        .phrase-zh { color: #b45f1b; font-weight: 500; font-size: 0.85rem; }
        .phrase-example { font-size: 0.85rem; color: #5c6e5a; margin-top: 8px; padding-left: 8px; border-left: 2px solid #dfcca2; }

        .word-toast { position: fixed; bottom: 25%; left: 50%; transform: translateX(-50%) translateY(20px); background: #fffffff2; backdrop-filter: blur(8px); color: #2c5a44; padding: 12px 24px; border-radius: 50px; font-size: 1rem; font-weight: 600; z-index: 1000; max-width: 85vw; white-space: normal; text-align: center; box-shadow: 0 8px 24px rgba(0, 32, 0, 0.15), 0 0 0 1px rgba(100, 150, 120, 0.3); pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease; opacity: 0; border: 1px solid #bdd8ca; }
        .word-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .method-card { background: #eef3f0; border-radius: 28px; padding: 18px 22px; margin: 20px 0; }
        .badge-method { background: #d9e6de; display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: bold; color: #2f6b48; }
        @media (max-width: 640px) { body { padding: 16px 12px; } .question-panel { padding: 18px 16px 6px 16px; } .feedback-area { margin: 0 12px 16px 12px; } }
        footer { text-align: center; font-size: 0.7rem; color: #86a694; margin: 32px 0 10px; }
    </style>

<body>
<div class="container">
    <div class="hero">
        <h1>✨ 赢未来国雅 · 英语练习考点精析 ✨</h1>
        <p>七年级英语期中模拟卷（外研版）| 点击任意英文单词查释义 | 答案对比</p>
        <div class="meta-info">语法选择 + 完形填空 + 阅读理解 + 短文填空 + 读写综合 | 完整释义库</div>
    </div>
    <div id="questionsRoot"></div>
    <footer>💡 点击选项立即锁定答案。<span style="background:#e8f0e3;padding:2px 10px;border-radius:20px;">🔍 点击任意英文单词 → 弹出中文释义</span></footer>
</div>
<div id="wordToast" class="word-toast"></div>

<script>
    // ========== 释义库 ==========
    const meaningMap = {
        "police": "警察", "artist": "艺术家", "criminal": "罪犯", "crime": "犯罪", "describe": "描述",
        "height": "身高", "straight": "直的", "curly": "卷曲的", "blond": "金色的", "real": "真正的",
        "AI": "人工智能", "DeepSeek": "深度求索", "engineers": "工程师", "practice": "练习", "smart": "聪明的",
        "museum": "博物馆", "pool": "游泳池", "glassware": "玻璃制品", "socks": "袜子", "shower": "淋浴",
        "space": "太空", "astronaut": "宇航员", "gravity": "重力", "zebrafish": "斑马鱼", "experiment": "实验",
        "muscles": "肌肉", "healthy": "健康的", "vegetables": "蔬菜", "hamburgers": "汉堡包", "noodles": "面条",
        "birthday": "生日", "luck": "运气", "Spring Festival": "春节", "exercise": "运动", "fit": "健康的",
        "difficult": "困难的", "interesting": "有趣的", "tidy": "整洁的", "breakfast": "早餐", "short-sighted": "近视的",
        "mummichogs": "花鳝", "Skylab": "天空实验室", "Tiangong": "天宫", "zero gravity": "零重力",
        "part": "部分", "kinds": "种类", "making": "制作", "because": "因为", "with": "带有", "eggs": "鸡蛋",
        "enjoy": "享受", "come": "来", "sounds": "听起来", "breath": "呼吸", "warmer": "更温暖的"
    };
    function lookupMeaning(word) {
        if (meaningMap[word]) return meaningMap[word];
        var lower = word.toLowerCase();
        if (meaningMap[lower]) return meaningMap[lower];
        var withoutS = lower.replace(/s$/, '');
        if (meaningMap[withoutS]) return meaningMap[withoutS];
        var withoutEd = lower.replace(/ed$/, '');
        if (meaningMap[withoutEd]) return meaningMap[withoutEd];
        return null;
    }
    function showWordMeaning(word) {
        var meaning = lookupMeaning(word);
        if (!meaning) meaning = "✨ 可自行补充笔记";
        var toast = document.getElementById("wordToast");
        toast.innerText = word + "  ·  " + meaning;
        toast.classList.add("show");
        setTimeout(function() { toast.classList.remove("show"); }, 1500);
    }
    function makeWordsClickable(container) {
        if (!container) return;
        var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
                if (node.parentElement && (node.parentElement.classList && node.parentElement.classList.contains('clickable-word')) ||
                    (node.parentElement && node.parentElement.closest && node.parentElement.closest('.option, .disabled-opt, .feedback-area, .result-badge, .answer-compare, .detail-explanation')))
                    return NodeFilter.FILTER_REJECT;
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        var nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(function(textNode) {
            var text = textNode.nodeValue;
            if (!text || !text.trim()) return;
            var regex = /\b([A-Za-z][A-Za-z\-']{1,35})\b/g;
            var last = 0, match;
            var frag = document.createDocumentFragment();
            while ((match = regex.exec(text)) !== null) {
                if (match.index > last) frag.appendChild(document.createTextNode(text.substring(last, match.index)));
                var word = match[1];
                var span = document.createElement('span');
                span.className = 'clickable-word';
                span.innerText = word;
                span.addEventListener('click', (function(w) { return function(e) { e.stopPropagation(); showWordMeaning(w); }; })(word));
                frag.appendChild(span);
                last = match.index + match[0].length;
            }
            if (last < text.length) frag.appendChild(document.createTextNode(text.substring(last)));
            if (frag.childNodes.length) textNode.parentNode.replaceChild(frag, textNode);
        });
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    // ========== 语法选择 (1-10) ==========
    var grammarChoice = [
        { id: 1, text: "Today we are going to learn something about ______ interesting job.", opts: ["A. a", "B. an", "C. the"], correct: "B", exp: "interesting以元音音素开头，用an。", note: "不定冠词an用于元音音素开头的单词" },
        { id: 2, text: "His job is to draw a picture of ______ criminal.", opts: ["A. each", "B. some", "C. both"], correct: "A", exp: "给每个罪犯画像。", note: "each每个" },
        { id: 3, text: "They will tell Joe ______ the criminal looks like.", opts: ["A. how", "B. what", "C. why"], correct: "B", exp: "what...look like询问外貌。", note: "what引导宾语从句" },
        { id: 4, text: "He wants ______ the pictures well.", opts: ["A. draw", "B. to draw", "C. drew"], correct: "B", exp: "want to do sth想要做某事。", note: "不定式作宾语" },
        { id: 5, text: "______ many people don't always see things the same way, they may describe the same person differently.", opts: ["A. So", "B. But", "C. Because"], correct: "C", exp: "前后为因果关系。", note: "because引导原因状语从句" },
        { id: 6, text: "they may describe the same person ______.", opts: ["A. different", "B. difference", "C. differently"], correct: "C", exp: "副词修饰动词describe。", note: "副词differently" },
        { id: 7, text: "The criminal is of middle ______ and young.", opts: ["A. height", "B. high", "C. highly"], correct: "A", exp: "of medium height中等身高。", note: "名词height" },
        { id: 8, text: "But ______ woman says, 'He is tall and thin...'", opts: ["A. the other", "B. another", "C. other"], correct: "B", exp: "另一个女士。", note: "another另一个" },
        { id: 9, text: "he ______ long curly blond hair.", opts: ["A. have", "B. has", "C. had"], correct: "B", exp: "主语he，一般现在时。", note: "has第三人称单数" },
        { id: 10, text: "______ the end, the real criminal is a short and heavy old man.", opts: ["A. On", "B. At", "C. In"], correct: "C", exp: "in the end最后。", note: "固定短语" }
    ];

    // ========== 完形填空 (11-20) ==========
    var clozeData = [
        { id: 11, text: "It can ______ out math problems, write simple code.", opts: ["A. get", "B. make", "C. find", "D. work"], correct: "D", exp: "work out解决。", note: "work out" },
        { id: 12, text: "Different from other AIs, it ______ by doing lots of tasks every day.", opts: ["A. changes", "B. learns", "C. plays", "D. enjoys"], correct: "B", exp: "通过学习来进步。", note: "learns学习" },
        { id: 13, text: "Most AIs need many ______ from books to learn.", opts: ["A. examples", "B. games", "C. pictures", "D. questions"], correct: "A", exp: "从书本中学习示例。", note: "examples示例" },
        { id: 14, text: "With more practice, it becomes ______.", opts: ["A. good", "B. interesting", "C. smart", "D. different"], correct: "C", exp: "变得更聪明。", note: "smart聪明的" },
        { id: 15, text: "Schools and small shops can use it for ______.", opts: ["A. work", "B. exercise", "C. help", "D. free"], correct: "D", exp: "免费使用。", note: "for free免费" },
        { id: 16, text: "We don't worry about ______ now.", opts: ["A. news", "B. time", "C. money", "D. books"], correct: "C", exp: "不用再担心钱。", note: "money钱" },
        { id: 17, text: "It makes mistakes in languages ______ German.", opts: ["A. with", "B. from", "C. like", "D. for"], correct: "C", exp: "像德语这样的语言。", note: "like像" },
        { id: 18, text: "Engineers try to ______ these mistakes and correct them.", opts: ["A. forget", "B. mark", "C. answer", "D. remember"], correct: "B", exp: "标记错误。", note: "mark标记" },
        { id: 19, text: "We want R1 to help people ______ the world.", opts: ["A. at", "B. of", "C. on", "D. around"], correct: "D", exp: "世界各地的人们。", note: "around the world" },
        { id: 20, text: "great things need to ______ more.", opts: ["A. love", "B. try", "C. help", "D. see"], correct: "B", exp: "伟大的事物需要更多尝试。", note: "try尝试" }
    ];

    // ========== 阅读理解 A篇 (21-25) ==========
    var readingAQ = [
        { id: 21, text: "What can people probably do in the train museum?", opts: ["A. Take photos.", "B. Run.", "C. Smoke.", "D. Get on the trains."], correct: "A", exp: "规则中没有禁止拍照，所以可能可以。", note: "细节推断" },
        { id: 22, text: "What must people do before getting into the swimming pool?", opts: ["A. Brush their teeth.", "B. Eat some food.", "C. Take some drinks.", "D. Take a shower."], correct: "D", exp: "规则明确要求Take a shower。", note: "细节理解" },
        { id: 23, text: "In Children's Play Area, children must wear", opts: ["A. hats", "B. glasses", "C. socks", "D. shoes"], correct: "C", exp: "No shoes. But wear socks.所以要穿袜子。", note: "细节理解" },
        { id: 24, text: "How many rules of Children's Play Area are the same as rules of the swimming pool?", opts: ["A. One.", "B. Two.", "C. Three.", "D. Four."], correct: "C", exp: "禁止吸烟、禁止食物饮料、禁止玻璃制品，共三条。", note: "规则对比" },
        { id: 25, text: "Who may be interested in the material?", opts: ["A. Sally—find a restaurant.", "B. Jack—swimming pool rules.", "C. Mark—buy shoes.", "D. Susan—reading place."], correct: "B", exp: "材料介绍了游泳池规则，Jack想知道。", note: "推理判断" }
    ];

    // ========== 阅读理解 B篇 (26-30) ==========
    var readingBQ = [
        { id: 26, text: "Why was 28th July, 1973 a big day for fish?", opts: ["A. Because mummichogs were first used.", "B. Because two mummichogs became the first fish in space.", "C. Because fish farming became successful.", "D. Because two mummichogs were hatched."], correct: "B", exp: "两条花鳝成为太空第一批鱼。", note: "细节理解" },
        { id: 27, text: "What does the zebrafish study on Tiangong want to find out?", opts: ["A. How zebrafish get used to space life.", "B. If zebrafish live without gravity.", "C. How little gravity changes fish's grow and live.", "D. If zebrafish live the same in space."], correct: "C", exp: "观察微重力如何改变鱼的生长方式。", note: "细节理解" },
        { id: 28, text: "What does the passage tell us?", opts: ["A. Fish are used in many studies in space.", "B. Fish are leading the way to explore space safely.", "C. Fish help check body changes in space.", "D. Fish are used to check gravity."], correct: "B", exp: "鱼类正在引领安全探索太空。", note: "主旨推断" },
        { id: 29, text: "What does the writer think of these fish?", opts: ["A. Helpful.", "B. Interesting.", "C. Wonderful.", "D. Amazing."], correct: "A", exp: "有助于人类探索太空。", note: "态度题" },
        { id: 30, text: "What is the main idea of the passage?", opts: ["A. Fish were taken into space successfully.", "B. Fish have many body parts like ours.", "C. Fish are see-through for scientists.", "D. Fish helps us learn about living in space."], correct: "D", exp: "鱼类帮助人类了解在太空生活。", note: "主旨大意" }
    ];

    // ========== 阅读理解 C篇 配对阅读 (31-35) ==========
    var matchOptions = [
        "A. Listening to English songs and watching English movies...", "B. Meat is healthy, but too much meat is not good for us...", "C. It's good for us to keep our room clean and tidy...", "D. Doing sports is a good way for us to keep healthy...", "E. It's not right to copy others' homework...", "F. We should go to bed early and get up early...", "G. It's important for us to keep a healthy habit when we read..."
    ];
    var matchQs = [
        { id: 31, text: "Bill eats too much meat and drinks cola. He is very fat.", correct: "B", exp: "关于健康饮食的建议。", note: "少吃肉和甜饮料" },
        { id: 32, text: "Kate never does sports because she doesn't like them.", correct: "D", exp: "关于运动的建议。", note: "做运动保持健康" },
        { id: 33, text: "Lucy often reads in bed or on the bus. She is short-sighted.", correct: "G", exp: "关于阅读习惯的建议。", note: "不要在不良环境下阅读" },
        { id: 34, text: "Tom always gets up late so he doesn't have time for breakfast.", correct: "F", exp: "关于作息和早餐的建议。", note: "早睡早起" },
        { id: 35, text: "Betty isn't tidy. Her things are always here and there.", correct: "C", exp: "关于保持整洁的建议。", note: "保持房间整洁" }
    ];

    // 为每篇阅读生成高频短语
    function getPhrasesForReading(part) {
        if (part === 'A') return [
            { phrase: "be quiet", meaning: "保持安静", example: "Rules: Be quiet in the museum." },
            { phrase: "take a shower", meaning: "洗淋浴", example: "Take a shower before getting into the pool." },
            { phrase: "wear socks", meaning: "穿袜子", example: "Wear socks all the time." }
        ];
        if (part === 'B') return [
            { phrase: "in space", meaning: "在太空中", example: "became the first fish in space." },
            { phrase: "zero gravity", meaning: "零重力", example: "swim in zero gravity." },
            { phrase: "take care of", meaning: "照顾", example: "easy to take care of." },
            { phrase: "help sb do sth", meaning: "帮助某人做某事", example: "help us learn to travel in space safely." }
        ];
        return [
            { phrase: "too much", meaning: "太多", example: "too much meat" },
            { phrase: "be good for", meaning: "对...有好处", example: "sports are good for health" },
            { phrase: "get up", meaning: "起床", example: "get up late" },
            { phrase: "here and there", meaning: "到处", example: "things are here and there" }
        ];
    }

    // 短文填空答案 (36-45)
    var passageFill = [
        { id: 36, correct: "part", exp: "重要的一部分", note: "part部分" },
        { id: 37, correct: "kinds", exp: "不同种类", note: "kinds种类" },
        { id: 38, correct: "making", exp: "喜欢做面条", note: "like making" },
        { id: 39, correct: "because", exp: "因为没有时间", note: "because因为" },
        { id: 40, correct: "with", exp: "用...烹饪", note: "with用" },
        { id: 41, correct: "eggs", exp: "鸡蛋和西红柿", note: "eggs鸡蛋" },
        { id: 42, correct: "their", exp: "他们的家人", note: "their他们的" },
        { id: 43, correct: "luck", exp: "有好运", note: "luck运气" },
        { id: 44, correct: "enjoy", exp: "享受面条", note: "enjoy享受" },
        { id: 45, correct: "come", exp: "来到中国", note: "come来" }
    ];

    // 回答问题 (46-50)
    var qaQuestions = [
        { id: 46, text: "What do many students know about sports?", answer: "Many students know that sports are good for their health.", exp: "从第一段第一句得出。" },
        { id: 47, text: "What do many students only like doing?", answer: "Many students like watching sports on TV or playing computer games.", exp: "从第一段得出。" },

    document.querySelectorAll('.card[data-qid]').forEach(function(card) {

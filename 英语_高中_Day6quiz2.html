<body>
<div class="container">
    <div class="hero">
        <h1>✨ 赢未来国雅 · 英语练习考点精析 ✨</h1>
        <p>完形填空 · 卧底英雄 | 上下文逻辑 + 词汇搭配 + 悬停释义</p>
        <div class="meta-info">📌 来源：2021新课标Ⅱ卷 · 难度较难</div>
    </div>
    <div id="questionsRoot"></div>
    <footer>💡 点击选项即锁定，显示你的答案vs正确答案。悬停英文单词显示释义，下方表格可自填复习。</footer>
</div>

<script>
    // ========== 单词悬停释义库 ==========
    const meaningMap = {
        "pretended": "假装", "dialects": "方言", "Oscar-winning": "奥斯卡获奖的", "devoted": "投入的",
        "disguised": "伪装", "convincing": "令人信服的", "alcohol": "酒", "judo": "柔道", "criminal": "罪犯",
        "honors": "荣誉", "medal": "奖章", "citations": "表彰", "merit": "功绩", "teammates": "队友",
        "toilet": "厕所", "beggars": "乞丐", "stolen goods": "赃物", "appearance": "外表", "trust": "信任",
        "courage": "勇气", "optimism": "乐观"
    };
    function addWordHover(text) {
        if (!text) return text;
        return text.replace(/\b([A-Za-z][A-Za-z\-']{1,35})\b/g, (match) => {
            let low = match.toLowerCase();
            let meaning = meaningMap[low] || meaningMap[match];
            if (meaning) return `<span class="hover-word" title="${meaning}">${match}</span>`;
            return match;
        });
    }

    // ========== 完形填空数据 (41-55) 基于2021新课标Ⅱ卷 ==========
    const clozeQuestions = [
        { id: 41, text: "Over the past 38 years, Mr. Wang has pretended to be someone else many times, and has even learned to ______ different dialects（方言），leading to him being described as an 'Oscar-winning actor'.", options: ["A. teach", "B. compare", "C. assess", "D. speak"], correct: "D", explanation: "学会说不同的方言。speak dialects 为固定搭配。", note: "speak a dialect 说方言；语境中强调语言能力。" },
        { id: 42, text: "The 60-year-old is not an actor, but a ______.", options: ["A. lawyer", "B. doctor", "C. policeman", "D. businessman"], correct: "C", explanation: "根据下文卧底、调查案件，他是一名警察。", note: "上下文暗示执法身份，伪装成乞丐破案。" },
        { id: 43, text: "However, he is more devoted to his '______' than any real actor.", options: ["A. role", "B. study", "C. family", "D. audience"], correct: "A", explanation: "他比真正的演员更投入自己的‘角色’。", note: "role 角色，呼应前文‘奥斯卡演员’的比喻。" },
        { id: 44, text: "To look into the ______, Wang disguised himself and ______ the beggars.", options: ["A. minor", "B. case", "C. future", "D. question"], correct: "B", explanation: "调查案件。look into the case 调查案件。", note: "case 案件；下文的 thieves 提示案件语境。" },
        { id: 45, text: "To look into the ______, Wang disguised himself and ______ the beggars.", options: ["A. interviewed", "B. joined", "C. arrested", "D. assisted"], correct: "B", explanation: "伪装自己并加入乞丐群体。joined 加入。", note: "伪装后融入群体才能获取信息。" },
        { id: 46, text: "Dirty shorts and old shoes gave him the ______ of a real beggar and his convincing dialect soon won him the ______ of the beggars.", options: ["A. challenge", "B. experience", "C. appearance", "D. freedom"], correct: "C", explanation: "脏衣服旧鞋给了他真实乞丐的外表。appearance 外表。", note: "appearance 外观形象，与 disguise 呼应。" },
        { id: 47, text: "Dirty shorts and old shoes gave him the ______ of a real beggar and his convincing dialect soon won him the ______ of the beggars.", options: ["A. vote", "B. sympathy", "C. permission", "D. trust"], correct: "D", explanation: "令人信服的方言赢得乞丐们的信任。trust 信任。", note: "赢得信任才能获取情报。" },
        { id: 48, text: "I often ______ them to drink alcohol.", options: ["A. invited", "B. forced", "C. helped", "D. expected"], correct: "A", explanation: "邀请他们喝酒以套话。invite 邀请。", note: "invite to drink 邀请喝酒，套近乎获取信息。" },
        { id: 49, text: "Once they were ______ they began to talk a lot.", options: ["A. drunk", "B. deserted", "C. bored", "D. lost"], correct: "A", explanation: "一旦喝醉，他们就开始说很多话。drunk 醉的。", note: "喝醉后放松警惕，泄露信息。" },
        { id: 50, text: "I'd then ______ myself to use the toilet, ______ what the beggars said, and send the ______ to my teammates.", options: ["A. guide", "B. persuade", "C. excuse", "D. allow"], correct: "C", explanation: "借口上厕所。excuse oneself 委婉地离开。", note: "excuse oneself to do sth 找借口去做某事。" },
        { id: 51, text: "I'd then ______ myself to use the toilet, ______ what the beggars said, and send the ______ to my teammates.", options: ["A. refer to", "B. note down", "C. ask about", "D. miss out"], correct: "B", explanation: "记下乞丐们说的话。note down 记录。", note: "note down 记录重要信息。" },
        { id: 52, text: "I'd then ______ myself to use the toilet, ______ what the beggars said, and send the ______ to my teammates.", options: ["A. plan", "B. agreement", "C. direction", "D. information"], correct: "D", explanation: "将信息发送给队友。information 信息。", note: "收集的情报信息。" },
        { id: 53, text: "Wang, who is often in ______ situations, is also a judo（柔道）master.", options: ["A. awkward", "B. dangerous", "C. unfortunate", "D. strange"], correct: "B", explanation: "经常处于危险境地。dangerous 危险的。", note: "卧底工作伴随危险，后文提到柔道保护自己。" },
        { id: 54, text: "As long as I get close enough, no criminal can ______ from me.", options: ["A. separate", "B. recover", "C. escape", "D. hear"], correct: "C", explanation: "没有罪犯能逃脱。escape 逃脱。", note: "escape from sb 从某人手中逃脱。" },
        { id: 55, text: "Wang's ______ won him several honors, including a National May Day Labor Medal and 11 Citations of Merit.", options: ["A. courage", "B. honesty", "C. kindness", "D. optimism"], correct: "A", explanation: "他的勇气为他赢得荣誉。courage 勇气。", note: "勇敢无畏的卧底工作获得表彰。" }
    ];

    // 完整文章原文（用于阅读展示）
    const fullPassage = `Over the past 38 years, Mr. Wang has pretended to be someone else many times, and has even learned to [41] different dialects（方言），leading to him being described as an "Oscar-winning actor".

The 60-year-old is not an actor, but a [42]. However, he is more devoted to his "[43]" than any real actor.

In the 1990s, a group of thieves often sold stolen goods with the help of some beggars. To look into the [44], Wang disguised himself and [45] the beggars. Dirty shorts and old shoes gave him the [46] of a real beggar and his convincing dialect soon won him the [47] of the beggars.

"I often [48] them to drink alcohol. Once they were [49] they began to talk a lot," Wang said. "I'd then [50] myself to use the toilet, [51] what the beggars said, and send the [52] to my teammates."

Wang, who is often in [53] situations, is also a judo master. "As long as I get close enough, no criminal can [54] from me," he said.

Wang's [55] won him several honors, including a National May Day Labor Medal and 11 Citations of Merit.`;

    // 核心短语 + 长难句
    const phraseList = [
        { phrase: "pretend to be", meaning: "假装成", example: "He pretended to be a beggar to investigate the case." },
        { phrase: "be devoted to", meaning: "致力于", example: "He is devoted to his role as an undercover policeman." },
        { phrase: "look into", meaning: "调查", example: "The detective looked into the case carefully." },
        { phrase: "disguise oneself", meaning: "伪装自己", example: "Wang disguised himself as a beggar." },
        { phrase: "win one's trust", meaning: "赢得某人的信任", example: "His dialect won the trust of the beggars." },
        { phrase: "note down", meaning: "记下", example: "He noted down every word they said." },
        { phrase: "escape from", meaning: "从……逃脱", example: "No criminal can escape from him." }
    ];

    const longSentences = [
        { sentence: "Over the past 38 years, Mr. Wang has pretended to be someone else many times, and has even learned to speak different dialects, leading to him being described as an 'Oscar-winning actor'.", translation: "在过去的38年里，王先生多次假扮成别人，甚至学会了说不同的方言，这使他被称为‘奥斯卡获奖演员’。", analysis: "现在分词短语leading to作结果状语；him being described为动名词复合结构。" },
        { sentence: "Wang, who is often in dangerous situations, is also a judo master.", translation: "经常身处险境的王先生也是一位柔道大师。", analysis: "who引导非限制性定语从句修饰Wang；补充说明其背景。" }
    ];

    const strategyBlock = `
        <div class="method-card">
            <div class="badge-method">🎯 完形填空 · 解题策略思路</div>
            <ul style="margin-left:20px; margin-top:12px; color:#375e4c; line-height:1.5;">
                <li><strong>1. 上下文逻辑链：</strong> 警察伪装→加入乞丐→赢得信任→套话→记录信息→发送队友→获得荣誉。</li>
                <li><strong>2. 固定搭配与词义辨析：</strong> speak dialects, look into the case, win trust, note down, escape from。</li>
                <li><strong>3. 情感与动作线索：</strong> 邀请喝酒→喝醉后说话→借口上厕所→记录信息，环环相扣。</li>
                <li><strong>4. 职业背景推断：</strong> 卧底、调查案件、擒拿罪犯 → 警察。</li>
                <li><strong>5. 主旨升华：</strong> 勇气与奉献赢得国家荣誉。</li>
            </ul>
        </div>
    `;

    const root = document.getElementById("questionsRoot");

    function buildExam() {
        let html = `
            <div class="card">
                <div class="question-panel">
                    <div class="question-text">📖 完形填空 · 卧底英雄王先生 (2021新课标II卷)</div>
                    <div class="cloze-passage">${addWordHover(fullPassage)}</div>
                </div>
            </div>
        `;

        clozeQuestions.forEach((q, idx) => {
            html += `
                <div class="card" data-qid="cloze_${q.id}" data-correct="${q.correct}" data-type="cloze" data-explanation='${q.explanation.replace(/'/g, "&#39;")}' data-note='${q.note.replace(/'/g, "&#39;")}'>
                    <div class="question-panel">
                        <div class="question-item">
                            <div class="question-text">${q.id}. ${addWordHover(q.text)}</div>
                            <div class="options-list" id="opts-cloze_${q.id}">
            `;
            q.options.forEach(opt => {
                let letter = opt.charAt(0);
                let optRaw = opt.slice(1).trim();
                html += `<div class="option" data-val="${letter}"><div class="option-letter">${letter}</div><div class="option-text">${addWordHover(optRaw)}</div></div>`;
            });
            html += `</div></div><div class="feedback-area" id="fb-cloze_${q.id}" style="display:none;"></div></div>`;
        });

        // 短语+长难句区域
        html += `<div class="card"><div class="analysis-special">
                    <div class="analysis-title">📚 高频搭配 & 核心短语 · 长难句精析</div>
                    <div class="phrase-list"><strong style="display:block; margin-bottom:14px;">🔖 常考短语 (含释义+例句)</strong>`;
        phraseList.forEach(p => {
            html += `<div class="phrase-item">
                        <div class="phrase-text"><span class="phrase-en">${addWordHover(p.phrase)}</span> <span class="phrase-zh">${p.meaning}</span></div>
                        <div class="phrase-example">💬 ${addWordHover(p.example)}</div>
                     </div>`;
        });
        html += `</div><div class="sentence-list"><strong style="display:block; margin:20px 0 14px;">🧩 长难句 + 语法分析</strong>`;
        longSentences.forEach(ls => {
            html += `<div class="sentence-item">
                        <div class="sentence-en">📖 ${addWordHover(ls.sentence)}</div>
                        <div class="sentence-zh">📝 中文：${ls.translation}</div>
                        <div class="sentence-grammar">📌 语法解析：${ls.analysis}</div>
                     </div>`;
        });
        html += `</div></div></div>`;
        html += strategyBlock;

        // 难词表+长难句积累表（可编辑）
        html += `<div class="card" style="padding:16px 22px 22px 22px;">
                    <div class="section-title-icon">📘 我的难词表 · 自主复习</div>
                    <table class="vocab-table"><thead><tr><th>序号</th><th>单词</th><th>词性及释义</th><th>我的笔记</th></tr></thead>
                    <tbody id="vocabTbody">${[...Array(10)].map((_,i)=>`<tr><td>${i+1}</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>`).join('')}</tbody></table>
                    <div class="section-title-icon" style="margin-top:24px;">📜 长难句积累 · 语料库</div>
                    <table class="sentence-table"><thead><tr><th>序号</th><th>长难句</th><th>备注（翻译/结构分析）</th></tr></thead>
                    <tbody id="sentenceTbody">${[...Array(5)].map((_,i)=>`<tr><td>${i+1}</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>`).join('')}</tbody></table>
                    <div style="font-size:0.7rem; color:#8aa998; margin-top:12px;">✏️ 点击单元格即可填写，自由记录难词和长难句分析。</div>
                </div>`;
        root.innerHTML = html;
        attachEvents();
    }

    function attachEvents() {
        const cards = document.querySelectorAll('.card[data-qid]');
        cards.forEach(card => {
            const correctAns = card.getAttribute('data-correct');
            const expRaw = card.getAttribute('data-explanation');
            const noteRaw = card.getAttribute('data-note');
            const explanation = expRaw || "根据上下文逻辑推断得出。";
            const note = noteRaw || "注意固定搭配与语境衔接。";
            const optsDiv = card.querySelector('.options-list');
            if (!optsDiv) return;
            const options = optsDiv.querySelectorAll('.option');
            options.forEach(opt => {
                opt.addEventListener('click', () => {
                    if (card.classList.contains('answered')) return;
                    const selectedVal = opt.getAttribute('data-val');
                    const isCorrect = (selectedVal === correctAns);
                    const feedbackDiv = card.querySelector('.feedback-area');
                    if (!feedbackDiv) return;
                    let yourFull = "", correctFull = "";
                    options.forEach(op => {
                        if(op.getAttribute('data-val') === selectedVal) yourFull = op.querySelector('.option-text')?.innerText || selectedVal;
                        if(op.getAttribute('data-val') === correctAns) correctFull = op.querySelector('.option-text')?.innerText || correctAns;
                    });
                    feedbackDiv.innerHTML = `
                        <div class="result-badge ${isCorrect ? 'correct-badge' : 'wrong-badge'}">${isCorrect ? '✔ 回答正确' : '❌ 回答错误'}</div>
                        <div class="answer-compare"><div class="your-answer">📌 你的答案：${selectedVal}. ${yourFull}</div><div class="correct-answer">✅ 正确答案：${correctAns}. ${correctFull}</div></div>
                        <div class="detail-explanation"><strong>🔎 详细解析：</strong> ${explanation}<br/><strong>📘 考点笔记：</strong> ${note}</div>
                        <div class="lock-message">🔒 答案已锁定，不可修改</div>
                    `;
                    feedbackDiv.style.display = 'block';
                    card.classList.add('answered');
                    options.forEach(op => op.classList.add('disabled-opt'));
                });
            });
        });
    }

    buildExam();
</script>
</body>
</html>

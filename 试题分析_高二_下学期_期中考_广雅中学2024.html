    // 智能释义查找：先精确匹配，再小写匹配，再尝试去掉常见后缀
    function lookupMeaning(word) {
        if (meaningMap[word]) return meaningMap[word];
        var lower = word.toLowerCase();
        if (meaningMap[lower]) return meaningMap[lower];
        // 尝试去掉末尾常见后缀进行匹配
        var withoutS = lower.replace(/s$/, '');
        if (meaningMap[withoutS]) return meaningMap[withoutS];
        var withoutEd = lower.replace(/ed$/, '');
        if (meaningMap[withoutEd]) return meaningMap[withoutEd];
        var withoutIng = lower.replace(/ing$/, '');
        if (meaningMap[withoutIng]) return meaningMap[withoutIng];
        return null;
    }
    
    function showWordMeaning(word) {
        var meaning = lookupMeaning(word);
        if (!meaning) meaning = "✨ 可自行补充笔记";
        var toast = document.getElementById("wordToast");
        toast.innerText = word + "  ·  " + meaning;
        toast.classList.add("show");
        setTimeout(function() { toast.classList.remove("show"); }, 1500);
    }
    
    function makeWordsClickable(container) {
        if (!container) return;
        var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
                if (node.parentElement && (node.parentElement.classList && node.parentElement.classList.contains('clickable-word')) ||
                    (node.parentElement && node.parentElement.closest && node.parentElement.closest('.option, .disabled-opt, .feedback-area, .result-badge, .answer-compare, .detail-explanation')))
                    return NodeFilter.FILTER_REJECT;
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        var nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(function(textNode) {
            var text = textNode.nodeValue;
            if (!text || !text.trim()) return;
            var regex = /\b([A-Za-z][A-Za-z\-']{1,35})\b/g;
            var last = 0, match;
            var frag = document.createDocumentFragment();
            while ((match = regex.exec(text)) !== null) {
                if (match.index > last) frag.appendChild(document.createTextNode(text.substring(last, match.index)));
                var word = match[1];
                var span = document.createElement('span');
                span.className = 'clickable-word';
                span.innerText = word;
                span.addEventListener('click', (function(w) { return function(e) { e.stopPropagation(); showWordMeaning(w); }; })(word));
                frag.appendChild(span);
                last = match.index + match[0].length;
            }
            if (last < text.length) frag.appendChild(document.createTextNode(text.substring(last)));
            if (frag.childNodes.length) textNode.parentNode.replaceChild(frag, textNode);
        });
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    // ========== 文章内容 ==========
    var passageA = "After taking an introductory course in global health last winter, Yashaswi Bista, president of Stanford SupplyHer, was empowered to take action against malaria — a disease that has been claiming hundreds of thousands of lives every year for centuries.\n\nStanford SupplyHer, a student group supporting women's health through art, hosted an event in partnership with United to Beat Malaria (UBM) to encourage funding for malaria prevention, treatment and research initiatives while tabling at White Plaza last Monday. \"Knowing that malaria is especially dangerous to pregnant individuals and children makes advocacy for malaria funding and research essential for our mission,\" said Bista.\n\n\"We in the U.S. need to be aware of the impact of global warming on malaria because less developed countries in other parts of the world are more heavily affected by our emissions,\" Bista said. Last year, the U.S. experienced its first local outbreaks of malaria since 2003. Infectious disease experts have warned that climate change will spread malaria and other diseases carried by mosquitoes to areas that were once free of malaria.\n\nThis summer, after discovering the work of UBM, a global grassroots campaign of the UN Foundation, Bista met with her congressional representatives to advocate for malaria treatment and research. To support continued funding for global malaria programs, Bista wrote to officials in Congress. \"It's easy for people to feel like they are powerless with issues as big as malaria. But any person can give input to their decision makers on issues as big as these,\" wrote Macgan Cross, a senior advocate at UBM. \"By sending messages to your elected officials in support of global health funding, you are making sure your voice is heard.\"\n\nBista encouraged students to become involved in initiatives on campus to spread awareness of malaria and other global health issues. \"Global health is important to me because there are so many health inequities around the world and health itself is important to live a fulfilling life,\" Bista said.";

    var passageB = "After Taylor Swift, the \"Mona Lisa\" is probably the most recognizable female face in the world. Every day around 20,000 people stare at the Leonardo da Vinci's painting in the Louvre. Yet it became famous not because of a tempting semi-smile. Until a worker stole the masterpiece in 1911, it was still mostly unknown; viewers flooded in to see what a French newspaper called \"an enormous, horrific, gaping void\".\n\nClassics of art, literature and music are supposed to carry some mysterious appeal that endures across the ages. But as Rochelle Gurstein, a historian, writes in a new book, the \"timeless classic\" is anything but. \"What I believed was written in stone was actually written in water\", she argues. Classics come and go.\n\nTake other celebrated works of art. Until the end of the 19th century Michelangelo's \"David\" had only his fig leaf to protect him from the weather in Piazza della Signoria in Florence. He attracted more pigeons than visitors; visitors preferred the artist's sculpture of Moses in Rome. Before the famous \"Venus de Milo\" was discovered in 1820, viewers were crazy about \"Venus de Medici\", a delicate sculpture most people alive today have never heard of.\n\nMuch as in art, the classics of music and literature have not always been set in stone either. Today, Johann Sebastian Bach is often regarded as the master of classical music. But after his death in 1750, Bach's compositions fell out of fashion until Felix Mendelssohn, a German composer, rediscovered them in the 1820s. Herman Melville's masterpiece \"Moby Dick\" was largely forgotten until critics such as Raymond Weaver, a professor at Columbia University rescued him from the depth of a nobody around the centenary of his birth in 1919.\n\n\"The status of classics\" depends on critics and shows the power of passionate writers to change the way people look at art. Tastes evolve, and they should. But culture lives on only as long as people continue to argue over what counts as a classic today. The true enemy of the classic is not relativism or awakening. It is silence.";

    var passageC = "The Malagasy baobab trees, a typical feature of Madagascar's landscape, should have disappeared long ago due to the extinction of its former seed-distributing animals. However, it did not. Seheno Andriantsaralaza at the University of Antananarivo in Madagascar and Onja Razafindratsima at the University of California, Berkeley, now think they may know the reason.\n\nTogether with their colleagues, the scientists monitored 15 trees to find new baobab seed-distributing animals in a western Madagascar region. They also set up camera traps around seed-containing fruits, and searched any feces along the way for the presence of seeds.\n\nThey report in the journal Biotropica that a native rat was caught on camera handling whole fruits on four occasions. Although there was no record of the rat breaking the fruits open, the team found 13 fruits that had been chewed into and had their seeds removed. They then found convincing evidence: baobab seeds in seven different piles of bush-pig feces.\n\nThe discovery is not without irony. Scientists believe bush pigs were brought to Madagascar by humans sometime between 1,000 and 5,000 years ago, just as the former seed-distributing animals were going extinct. Their arrival was a lucky break for the baobabs, especially as scientists have determined a seed's journey through the pig-like digestive system doesn't reduce its ability to grow.\n\nWhile the finding is important in its own right, it also provides valuable evidence that introduced species may not be entirely harmful. Madagascar's pigs, for example, though not native, have made themselves essential to the survival of truly native species. Similar relationships are suspected to hold in South America between rabbits native to Europe and plants with no seed distributors.";

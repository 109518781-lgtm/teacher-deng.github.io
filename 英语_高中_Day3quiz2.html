    function showWordMeaning(word) {
        const lowerWord = word.toLowerCase();
        let meaning = meaningMap[lowerWord] || meaningMap[word];
        if (!meaning) {
            meaning = "✨ 可自行补充笔记";
        }
        const toast = document.getElementById("wordToast");
        toast.innerText = `${word}  ·  ${meaning}`;
        toast.classList.add("show");
        setTimeout(() => {
            toast.classList.remove("show");
        }, 1500);
    }

    function makeWordsClickable(container) {
        if (!container) return;
        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
            acceptNode: (node) => {
                if (node.parentElement && (node.parentElement.classList?.contains('clickable-word') || 
                    node.parentElement.closest('.option, .disabled-opt, .feedback-area, .result-badge, .answer-compare, .detail-explanation'))) {
                    return NodeFilter.FILTER_REJECT;
                }
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        
        textNodes.forEach(textNode => {
            const text = textNode.nodeValue;
            if (!text || !text.trim()) return;
            const regex = /\b([A-Za-z][A-Za-z\-']{1,35})\b/g;
            let lastIndex = 0;
            let match;
            const fragment = document.createDocumentFragment();
            while ((match = regex.exec(text)) !== null) {
                const before = text.substring(lastIndex, match.index);
                if (before) fragment.appendChild(document.createTextNode(before));
                const word = match[1];
                const span = document.createElement('span');
                span.className = 'clickable-word';
                span.innerText = word;
                span.setAttribute('data-word', word);
                span.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showWordMeaning(word);
                });
                fragment.appendChild(span);
                lastIndex = match.index + match[0].length;
            }
            if (lastIndex < text.length) {
                fragment.appendChild(document.createTextNode(text.substring(lastIndex)));
            }
            if (fragment.childNodes.length > 0) {
                textNode.parentNode.replaceChild(fragment, textNode);
            }
        });
    }

Being at the right place at the right time is decisive in any style of photography. I often leave early to seek the right destinations so I can set up early to avoid missing the moment I am attempting to photograph. I have missed plenty of beautiful sunsets/sunrises due to being on the spot only five minutes before the best moment.

One time my friends and I drove three hours to Devil's Lake, Wisconsin, to climb the purple quartz (石英) rock around the lake. After we found a crazy-looking road that hung over a bunch of rocks, we decided to photograph the scene at sunset. The position enabled us to look over the lake with the sunset in the background. We managed to leave this spot to climb higher because of the spare time until sunset. However, we did not mark the route (路线) so we ended up almost missing the sunset entirely. Once we found the place, it was stressful getting lights and cameras set up in the limited time. Still, looking back on the photos, they are some of my best shots though they could have been so much better if I would have been prepared and managed my time wisely.`;

    }

    function buildExam() {
        let html = `
            <div class="card">
                <div class="question-panel">
                    <div class="question-text">📖 阅读理解 · 风景摄影师的挑战与成长 (2023全国乙卷)</div>
                    <div class="reading-passage" id="readingPassage">${escapeHtml(passageContent)}</div>
                </div>
            </div>
        `;

        readingQuestions.forEach(q => {
            html += `
                <div class="card" data-qid="rd_${q.id}" data-correct="${q.correct}" data-type="reading" data-explanation='${escapeHtml(q.explanation)}' data-note='${escapeHtml(q.note)}'>
                    <div class="question-panel">
                        <div class="question-text">${q.id}. ${escapeHtml(q.text)}</div>
                        <div class="options-list" id="opts-rd_${q.id}">
            `;
            q.options.forEach(opt => {
                let letter = opt.charAt(0);
                let optRaw = opt.slice(1).trim();
                html += `<div class="option" data-val="${letter}"><div class="option-letter">${letter}</div><div class="option-text">${escapeHtml(optRaw)}</div></div>`;
            });
            html += `</div></div><div class="feedback-area" id="fb-rd_${q.id}" style="display:none;"></div></div>`;
        });

        html += `<div class="card"><div class="analysis-special">
                    <div class="analysis-title">📚 高频搭配 & 核心短语 · 长难句精析</div>
                    <div class="phrase-list"><strong style="display:block; margin-bottom:14px;">🔖 常考短语 (含释义+例句)</strong>`;
        phraseList.forEach(p => {
            html += `<div class="phrase-item">
                        <div class="phrase-text"><span class="phrase-en">${escapeHtml(p.phrase)}</span> <span class="phrase-zh">${escapeHtml(p.meaning)}</span></div>
                        <div class="phrase-example">💬 ${escapeHtml(p.example)}</div>
                     </div>`;
        });
        html += `</div><div class="sentence-list"><strong style="display:block; margin:20px 0 14px;">🧩 长难句 + 语法分析</strong>`;
        longSentences.forEach(ls => {
            html += `<div class="sentence-item">
                        <div class="sentence-en">📖 ${escapeHtml(ls.sentence)}</div>
                        <div class="sentence-zh">📝 中文：${escapeHtml(ls.translation)}</div>
                        <div class="sentence-grammar">📌 语法解析：${escapeHtml(ls.analysis)}</div>
                     </div>`;
        });
        html += `</div></div></div>`;
        html += strategyBlock;

        html += `<div class="card" style="padding:16px 22px 22px 22px;">
                    <div class="section-title-icon">📘 我的难词表 · 自主复习</div>
                    <table class="vocab-table"><thead><tr><th>序号</th><th>单词</th><th>词性及释义</th><th>我的笔记</th></tr></thead>
                    <tbody id="vocabTbody">${[...Array(10)].map((_,i)=>`<tr><td>${i+1}</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>`).join('')}</tbody></table>
                    <div class="section-title-icon" style="margin-top:24px;">📜 长难句积累 · 语料库</div>
                    <table class="sentence-table"><thead><tr><th>序号</th><th>长难句</th><th>备注（翻译/结构分析）</th></tr></thead>
                    <tbody id="sentenceTbody">${[...Array(5)].map((_,i)=>`<tr><td>${i+1}</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>`).join('')}</tbody></table>
                    <div style="font-size:0.7rem; color:#8aa998; margin-top:12px;">✏️ 点击单元格即可填写，自由记录难词和长难句分析。</div>
                </div>`;

        root.innerHTML = html;
        
        const passageDiv = document.getElementById("readingPassage");
        if (passageDiv) makeWordsClickable(passageDiv);
        document.querySelectorAll('.question-text, .option-text, .phrase-item, .sentence-item, .method-card, .phrase-example, .sentence-en, .sentence-zh').forEach(el => {
            if (el) makeWordsClickable(el);
        });
        attachEvents();
    }

    function attachEvents() {
        const cards = document.querySelectorAll('.card[data-qid]');
        cards.forEach(card => {
            const correctAns = card.getAttribute('data-correct');
            const expRaw = card.getAttribute('data-explanation');
            const noteRaw = card.getAttribute('data-note');
            const explanation = expRaw || "根据文章细节推断得出。";
            const note = noteRaw || "注意题干关键词与原文同义转述。";
            const optsDiv = card.querySelector('.options-list');
            if (!optsDiv) return;
            const options = optsDiv.querySelectorAll('.option');
            options.forEach(opt => {
                opt.addEventListener('click', () => {
                    if (card.classList.contains('answered')) return;
                    const selectedVal = opt.getAttribute('data-val');
                    const isCorrect = (selectedVal === correctAns);
                    const feedbackDiv = card.querySelector('.feedback-area');
                    if (!feedbackDiv) return;

                    let yourFull = "", correctFull = "";
                    options.forEach(op => {
                        if(op.getAttribute('data-val') === selectedVal) yourFull = op.querySelector('.option-text')?.innerText || selectedVal;
                        if(op.getAttribute('data-val') === correctAns) correctFull = op.querySelector('.option-text')?.innerText || correctAns;
                    });

                    feedbackDiv.innerHTML = `
                        <div class="result-badge ${isCorrect ? 'correct-badge' : 'wrong-badge'}">${isCorrect ? '✔ 回答正确' : '❌ 回答错误'}</div>
                        <div class="answer-compare">
                            <div class="your-answer">📌 你的答案：${selectedVal}. ${escapeHtml(yourFull)}</div>
                            <div class="correct-answer">✅ 正确答案：${correctAns}. ${escapeHtml(correctFull)}</div>
                        </div>
                        <div class="detail-explanation"><strong>🔎 详细解析：</strong> ${escapeHtml(explanation)}<br/><strong>📘 考点笔记：</strong> ${escapeHtml(note)}</div>
                        <div class="lock-message">🔒 答案已锁定，不可修改</div>
                    `;
                    feedbackDiv.style.display = 'block';
                    card.classList.add('answered');
                    options.forEach(op => op.classList.add('disabled-opt'));
                });
            });
        });
    }

    buildExam();
</script>
</body>
</html>

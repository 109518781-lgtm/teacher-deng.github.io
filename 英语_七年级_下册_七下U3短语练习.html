        { id: "di3", section: "developing", type: "中英互译", question: "“junk food” 通常指？", options: ["垃圾食品", "不健康食品", "速食", "废弃食物"], correct: 0, explanation: "junk food 高热量低营养食品，如汉堡、薯片。", note: "📌 考点：对比 fast food 快餐；junk food 含贬义，强调不健康。" },
        { id: "di4", section: "developing", type: "一词多义", question: "We should eat as many fruit and vegetables as possible. 'as many as possible' 含义？", options: ["尽可能多", "和多一样多", "尽可能多地", "尽量多"], correct: 0, explanation: "as many as possible 后接可数名词，表示最大数量。", note: "📌 考点：as much as possible 修饰不可数名词；as soon as possible 尽快。" },
        { id: "di5", section: "developing", type: "语境运用", question: "Eating carrots will give you better eyesight. 'better' 在此是？", options: ["更好的", "改善", "好转", "较佳"], correct: 0, explanation: "better 是 good 的比较级，修饰名词 eyesight。", note: "📌 考点：比较级修饰名词；much better 好得多；better than 比……好。" },

        { id: "di7", section: "developing", type: "语境运用", question: "When foods cross borders, sweet things can happen. 'cross borders' 指的是？", options: ["跨越国界", "穿越边境", "跨境", "过境"], correct: 0, explanation: "cross borders 指食物文化跨国传播。", note: "📌 考点：across borders 同义；food across borders 跨境美食。" },

    let userAnswers = {};
    let lockedQuestions = {};

    function initAnswers() {
        questionsDB.forEach(q => {
            userAnswers[q.id] = null;
            lockedQuestions[q.id] = false;
        });
    }

    function computeCompleted() {
        let count = 0;
        for (let id in userAnswers) if (userAnswers[id] !== null) count++;
        return count;
    }

    function updateGlobalStats() {
        const total = questionsDB.length;
        const done = computeCompleted();
        document.getElementById('globalStats').innerHTML = `📊 已完成 ${done} / ${total} 题`;
    }

    function renderSection(sectionKey, sectionTitle, desc) {
        const filtered = questionsDB.filter(q => q.section === sectionKey);
        if (filtered.length === 0) return '';
        let html = `<div class="section-card" data-section="${sectionKey}">
                        <div class="section-title">${sectionTitle} <small>${desc}</small></div>
                        <div class="quiz-area" id="quiz-area-${sectionKey}">`;
        filtered.forEach(q => {
            const selectedIdx = userAnswers[q.id] !== null ? userAnswers[q.id] : -1;
            const isLocked = lockedQuestions[q.id];
            html += `<div class="question-item" data-qid="${q.id}">
                        <div class="question-text"><span class="badge">${q.type}</span> ${q.question}</div>
                        <div class="options" id="opts-${q.id}">`;
            q.options.forEach((opt, idx) => {
                const checkedAttr = (selectedIdx === idx) ? 'checked' : '';
                const disabledAttr = isLocked ? 'disabled' : '';
                html += `<div class="option ${isLocked ? 'disabled-opt' : ''}" data-opt-index="${idx}" data-qid="${q.id}">
                            <input type="radio" name="q_${q.id}" value="${idx}" id="q_${q.id}_${idx}" ${checkedAttr} ${disabledAttr}>
                            <label for="q_${q.id}_${idx}">${String.fromCharCode(65+idx)}. ${opt}</label>
                         </div>`;
            });
            html += `</div><div class="feedback" id="fb-${q.id}" style="display: none;"></div></div>`;
        });
        html += `</div><div class="section-summary" id="summary-${sectionKey}"><span>📌 本区进度</span><span class="accuracy" id="acc-${sectionKey}">0% 正确率</span></div></div>`;
        return html;
    }

    function showFeedback(qid, selectedIdx, isCorrect) {
        const fbDiv = document.getElementById(`fb-${qid}`);
        if (!fbDiv) return;
        const q = questionsDB.find(qq => qq.id === qid);
        const correctLetter = String.fromCharCode(65 + q.correct);
        const correctText = q.options[q.correct];
        fbDiv.style.display = 'block';
        fbDiv.innerHTML = `<div class="${isCorrect ? 'feedback-correct' : 'feedback-wrong'}" style="padding: 8px; border-radius: 20px;">
            <strong>${isCorrect ? '✅ 回答正确！' : '❌ 回答错误'}</strong><br/>
            <div class="explanation">📖 解析：${q.explanation}</div>
            <div class="note-box">📘 考点笔记：${q.note}<br/>✔ 正确答案：${correctLetter}. ${correctText}</div>
        </div>`;
    }

    function lockOptions(qid) {
        const container = document.getElementById(`opts-${qid}`);
        if (!container) return;
        container.querySelectorAll('.option').forEach(opt => {
            opt.classList.add('disabled-opt');
            const radio = opt.querySelector('input');
            if (radio) radio.disabled = true;
        });
    }

    function updateSectionAccuracy() {
        const sections = ['start_out', 'understanding', 'developing'];
        sections.forEach(sec => {
            const secQuestions = questionsDB.filter(q => q.section === sec);
            let answered = 0, correct = 0;
            secQuestions.forEach(q => {
                const ans = userAnswers[q.id];
                if (ans !== null) {
                    answered++;
                    if (ans === q.correct) correct++;
                }
            });
            const accuracy = answered === 0 ? 0 : Math.round((correct / answered) * 100);
            const accSpan = document.getElementById(`acc-${sec}`);
            if (accSpan) accSpan.innerText = `${accuracy}% 正确率 (${correct}/${answered})`;
        });
        updateGlobalStats();
    }

    function bindEvents() {
        document.querySelectorAll('.options').forEach(container => {
            container.addEventListener('change', (e) => {
                const radio = e.target;
                if (!radio.matches('input[type="radio"]')) return;
                const qid = radio.name.split('_')[1];
                if (lockedQuestions[qid]) return;
                const selectedVal = parseInt(radio.value);
                const q = questionsDB.find(qq => qq.id === qid);
                if (!q) return;
                const isCorrect = (selectedVal === q.correct);
                userAnswers[qid] = selectedVal;
                lockedQuestions[qid] = true;
                showFeedback(qid, selectedVal, isCorrect);
                lockOptions(qid);
                updateSectionAccuracy();
            });
        });
    }

    function generateReport() {
        let report = "📚 赢未来国雅·短语即学即练 学习报告\n";
        report += `生成时间：${new Date().toLocaleString()}\n总题数：${questionsDB.length}\n已完成：${computeCompleted()}\n\n`;
        let totalCorrect = 0;
        let details = [];
        questionsDB.forEach(q => {
            const userChoice = userAnswers[q.id];
            const isCorrect = (userChoice !== null && userChoice === q.correct);
            if (isCorrect) totalCorrect++;
            const userAnswerText = userChoice !== null ? q.options[userChoice] : "未作答";
            const correctAnswerText = q.options[q.correct];
            details.push(`\n【${q.section.toUpperCase()} | ${q.type}】${q.question}\n我的答案：${userAnswerText}\n正确答案：${correctAnswerText}\n解析：${q.explanation}\n笔记：${q.note}\n状态：${isCorrect ? "✓" : "✗"}\n`);
        });
        const totalRate = Math.round((totalCorrect / questionsDB.length) * 100);
        report += `总体正确率：${totalRate}% (${totalCorrect}/${questionsDB.length})\n\n========== 详细记录 ==========\n${details.join('---\n')}`;
        const blob = new Blob([report], {type: "text/plain;charset=utf-8"});
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = "U3_phrase_report.txt";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function addDownloadButtons() {
        ['start_out', 'understanding', 'developing'].forEach(sec => {
            const sumDiv = document.getElementById(`summary-${sec}`);
            if (sumDiv && !sumDiv.querySelector('.sec-download')) {
                const btn = document.createElement('button');
                btn.innerText = '📄 下载学习报告';
                btn.className = 'download-btn sec-download';
                btn.style.marginLeft = '15px';
                btn.addEventListener('click', () => generateReport());
                sumDiv.appendChild(btn);
            }
        });
        if (!document.querySelector('.global-extra-download')) {
            const extra = document.createElement('div');
            extra.style.display = 'flex';
            extra.style.justifyContent = 'center';
            extra.style.margin = '20px 0 10px';
            const btnAll = document.createElement('button');
            btnAll.innerText = '📑 下载完整学习报告（全短语）';
            btnAll.className = 'download-btn';
            btnAll.style.padding = '12px 28px';
            btnAll.addEventListener('click', generateReport);
            extra.appendChild(btnAll);
            document.getElementById('app').appendChild(extra);
        }
    }

    function renderApp() {
        const appDiv = document.getElementById('app');
        const startHtml = renderSection('start_out', '🍽️ Starting out · 美食基础认知', '招牌菜 / 跨境食物');
        const underHtml = renderSection('understanding', '🥘 Understanding ideas (核心短语篇)', '味道记忆 / 烹饪动作');
        const devHtml = renderSection('developing', '🌍 Developing ideas (拓展提升)', '均衡饮食 / 文化对比');
        appDiv.innerHTML = startHtml + underHtml + devHtml;
        bindEvents();
        updateSectionAccuracy();
        addDownloadButtons();
        updateGlobalStats();
    }

    initAnswers();
    renderApp();
</script>
</body>
</html>

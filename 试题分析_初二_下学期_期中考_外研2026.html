<div class="container">
    <div class="hero">
        <h1>✨ 赢未来国雅 · 英语练习考点精析 ✨</h1>
        <p>外研版八年级下册期中测试卷 | 点击任意英文单词查释义 | 答案对比 | 完整题型</p>
        <div class="meta-info">单项选择 + 完形填空 + 阅读理解 + 词汇运用 + 句型转换 + 补全对话 + 写作</div>
    </div>

    <footer>💡 点击选项立即锁定答案。<span style="background:#e8f0e3;padding:2px 10px;border-radius:20px;">🔍 点击任意英文单词 → 弹出中文释义</span></footer>
</div>
<div id="wordToast" class="word-toast"></div>

<script>
    // ========== 释义库 ==========
    const meaningMap = {
        "achievement": "成就感", "window cleaner": "窗户清洁工", "spiderman": "蜘蛛人", "watermelon": "西瓜",
        "newborn": "新生儿", "colleagues": "同事", "challenges": "挑战", "joys": "快乐",
        "basketball": "篮球", "swimming": "游泳", "failure": "失败", "opportunities": "机会",
        "peer pressure": "同伴压力", "teamwork": "团队合作", "courage": "勇气", "responsibility": "责任",
        "cashier": "收银员", "machine": "机器", "oxygen": "氧气", "presentation": "演讲",
        "equipment": "设备", "communication": "沟通", "cooperation": "合作", "honour": "荣誉",
        "disappear": "消失", "promise": "承诺", "vote": "投票", "leader": "领导者",
        "replace": "替代", "freeze": "僵住", "panic": "恐慌", "role": "角色",
        "grow up": "成长", "turn": "转变", "diary": "日记", "heartbreaking": "令人心碎的",
        "knitting": "编织", "sign up": "报名", "take responsibility": "承担责任",
        "spring up": "涌现", "get lost": "迷路", "make a decision": "做决定"
    };
    function lookupMeaning(word) {
        if (meaningMap[word]) return meaningMap[word];
        var lower = word.toLowerCase();
        if (meaningMap[lower]) return meaningMap[lower];
        var withoutS = lower.replace(/s$/, '');
        if (meaningMap[withoutS]) return meaningMap[withoutS];
        var withoutEd = lower.replace(/ed$/, '');
        if (meaningMap[withoutEd]) return meaningMap[withoutEd];
        return null;
    }
    function showWordMeaning(word) {
        var meaning = lookupMeaning(word);
        if (!meaning) meaning = "✨ 可自行补充笔记";
        var toast = document.getElementById("wordToast");
        toast.innerText = word + "  ·  " + meaning;
        toast.classList.add("show");
        setTimeout(function() { toast.classList.remove("show"); }, 1500);
    }
    function makeWordsClickable(container) {
        if (!container) return;
        var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
                if (node.parentElement && (node.parentElement.classList && node.parentElement.classList.contains('clickable-word')) ||
                    (node.parentElement && node.parentElement.closest && node.parentElement.closest('.option, .disabled-opt, .feedback-area, .result-badge, .answer-compare, .detail-explanation')))
                    return NodeFilter.FILTER_REJECT;
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        var nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(function(textNode) {
            var text = textNode.nodeValue;
            if (!text || !text.trim()) return;
            var regex = /\b([A-Za-z][A-Za-z\-']{1,35})\b/g;
            var last = 0, match;
            var frag = document.createDocumentFragment();
            while ((match = regex.exec(text)) !== null) {
                if (match.index > last) frag.appendChild(document.createTextNode(text.substring(last, match.index)));
                var word = match[1];
                var span = document.createElement('span');
                span.className = 'clickable-word';
                span.innerText = word;
                span.addEventListener('click', (function(w) { return function(e) { e.stopPropagation(); showWordMeaning(w); }; })(word));
                frag.appendChild(span);
                last = match.index + match[0].length;
            }
            if (last < text.length) frag.appendChild(document.createTextNode(text.substring(last)));
            if (frag.childNodes.length) textNode.parentNode.replaceChild(frag, textNode);
        });
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    // ========== 单项选择 (1-15) ==========
    var singleChoice = [
        { id: 1, text: "—What do you think of window cleaning? —It ______ not always considered a good job, but it brings a sense of achievement.", opts: ["A. is", "B. was", "C. will be", "D. has been"], correct: "A", exp: "一般现在时被动语态，描述客观事实。", note: "is considered" },
        { id: 2, text: "The old woman ______ home by a policewoman last night after she got lost.", opts: ["A. takes", "B. took", "C. was taken", "D. will be taken"], correct: "C", exp: "一般过去时被动语态，last night。", note: "was taken" },
        { id: 3, text: "— ______ I sign up for the space tour now? —No, you needn't. You can do it tomorrow.", opts: ["A. Must", "B. Should", "C. Can", "D. May"], correct: "A", exp: "Must提问，needn't否定回答。", note: "must表示必须" },
        { id: 4, text: "Cashiers in supermarkets ______ by machines in the near future.", opts: ["A. replace", "B. will replace", "C. are replaced", "D. will be replaced"], correct: "D", exp: "一般将来时被动语态，in the near future。", note: "will be replaced" },
        { id: 5, text: "The son ______ his mother angry because he didn't keep his promise.", opts: ["A. made", "B. kept", "C. let", "D. had"], correct: "A", exp: "make sb + adj使某人...", note: "made his mother angry" },
        { id: 6, text: "Why did Tony freeze? Because he was afraid ______ Lisa's feelings.", opts: ["A. hurt", "B. to hurt", "C. hurting", "D. hurted"], correct: "B", exp: "be afraid to do sth害怕做某事。", note: "afraid to hurt" },
        { id: 7, text: "A good team leader ______ take responsibility in times of disagreement.", opts: ["A. can", "B. should", "C. may", "D. would"], correct: "B", exp: "should表示建议或责任。", note: "should应该" },
        { id: 8, text: "The 30-metre-high rock wall on Mount Qomolangma ______ as the Second Step.", opts: ["A. calls", "B. called", "C. is called", "D. was called"], correct: "C", exp: "一般现在时被动语态，描述事实。", note: "is called被称为" },
        { id: 9, text: "You ______ worry about the presentation. Our team will help you.", opts: ["A. mustn't", "B. shouldn't", "C. needn't", "D. can't"], correct: "C", exp: "needn't不必，没必要。", note: "needn't不必" },
        { id: 10, text: "The basketball coach said the writer ______ tall enough to join the team.", opts: ["A. isn't", "B. wasn't", "C. hasn't", "D. hadn't"], correct: "B", exp: "过去时，否定形式。", note: "wasn't tall enough" },
        { id: 11, text: "How ______ the job market ______ in the future?", opts: ["A. does; change", "B. will; change", "C. did; change", "D. is; changing"], correct: "B", exp: "in the future用一般将来时。", note: "will change" },
        { id: 12, text: "The boy ______ a lot from his failure.", opts: ["A. learned", "B. learns", "C. will learn", "D. is learning"], correct: "A", exp: "描述过去学到的教训。", note: "learned from" },
        { id: 13, text: "All the oxygen ______ to Liu Lianman because he was too tired.", opts: ["A. gave", "B. was given", "C. will give", "D. will be given"], correct: "B", exp: "一般过去时被动语态。", note: "was given" },
        { id: 14, text: "______ you ever ______ peer pressure?", opts: ["A. Do; experience", "B. Did; experience", "C. Have; experienced", "D. Will; experience"], correct: "C", exp: "ever提示现在完成时。", note: "Have experienced" },
        { id: 15, text: "The company ______ a job interview next month.", opts: ["A. holds", "B. held", "C. will hold", "D. has held"], correct: "C", exp: "next month用一般将来时。", note: "will hold" }
    ];

    // ========== 完形填空 (1-10) ==========
    var clozeData = [
        { id: 1, text: "Our leader, Tom, didn't ______.", opts: ["A. freeze", "B. storm", "C. worry", "D. agree"], correct: "A", exp: "没有僵住，而是让大家讨论。", note: "freeze僵住" },
        { id: 2, text: "He said we ______ respect each other's opinions.", opts: ["A. should", "B. can", "C. may", "D. would"], correct: "A", exp: "应该尊重他人意见。", note: "should应该" },
        { id: 3, text: "Our sound equipment ______ by accident.", opts: ["A. break", "B. broke", "C. was broken", "D. will be broken"], correct: "C", exp: "设备被损坏，被动语态。", note: "was broken" },
        { id: 4, text: "He said we ______ ask the school for help.", opts: ["A. must", "B. should", "C. need", "D. can"], correct: "B", exp: "建议向学校求助。", note: "should应该" },
        { id: 5, text: "A great team ______ good communication and cooperation.", opts: ["A. needs", "B. needed", "C. will need", "D. is needed"], correct: "A", exp: "一般现在时，描述事实。", note: "needs需要" },
        { id: 6, text: "I learned that we ______ communicate openly.", opts: ["A. must", "B. should", "C. can", "D. may"], correct: "B", exp: "应该开放沟通。", note: "should" },
        { id: 7, text: "A leader ______ solve problems in a wise way.", opts: ["A. can", "B. should", "C. may", "D. would"], correct: "B", exp: "领导者应该明智解决问题。", note: "should" },
        { id: 8, text: "Teamwork always ______ when we face difficulties.", opts: ["A. work", "B. works", "C. worked", "D. will work"], correct: "B", exp: "一般现在时，works。", note: "works起作用" },
        { id: 9, text: "No one can succeed ______ the support of a team.", opts: ["A. with", "B. without", "C. for", "D. against"], correct: "A", exp: "没有团队支持无法成功。", note: "without没有" },
        { id: 10, text: "A good experience can help us ______ better team players.", opts: ["A. become", "B. became", "C. becoming", "D. becomes"], correct: "A", exp: "help sb do sth。", note: "become成为" }
    ];

    // ========== 阅读理解 A篇 (Robert) ==========
    var readingAQ = [
        { id: 1, text: "How long did Robert work as a window cleaner?", opts: ["A. 10 years.", "B. 20 years.", "C. 30 years.", "D. 40 years."], correct: "C", exp: "第一句话：worked for 30 years。", note: "30年" },
        { id: 2, text: "What did the kind woman give Robert on his first summer?", opts: ["A. A glass of water.", "B. A watermelon.", "C. A picture.", "D. A smile."], correct: "B", exp: "她给了西瓜。", note: "watermelon" },
        { id: 3, text: "Why did Robert feel sad when the baby's family moved away?", opts: ["A. Because he would miss the baby.", "B. Because he lost his job.", "C. Because the baby didn't say goodbye.", "D. Because he couldn't see the picture."], correct: "A", exp: "会想念那个婴儿。", note: "miss the baby" },
        { id: 4, text: "What did Robert think of window cleaning?", opts: ["A. Easy.", "B. Boring.", "C. Sense of achievement.", "D. Tiring."], correct: "C", exp: "他找到了成就感。", note: "sense of achievement" },
        { id: 5, text: "What can we learn from Robert's story?", opts: ["A. Every job has its meaning.", "B. Window cleaning is the best.", "C. Change jobs often.", "D. Hard to make friends."], correct: "A", exp: "每份工作都有意义。", note: "every job has meaning" }
    ];

    // ========== 阅读理解 B篇 (Growing Pains) ==========
    var readingBQ = [
        { id: 1, text: "Why did the writer fail to join the basketball team?", opts: ["A. Too short.", "B. Didn't practice.", "C. Didn't like basketball.", "D. Coach didn't like him."], correct: "A", exp: "因为不够高。", note: "not tall enough" },
        { id: 2, text: "What did the writer do after failing?", opts: ["A. Gave up sports.", "B. Tried swimming.", "C. Became a coach.", "D. Wrote a book."], correct: "B", exp: "尝试了游泳。", note: "tried swimming" },
        { id: 3, text: "How does the writer feel about his past failure now?", opts: ["A. Still sad.", "B. Thinks it's funny.", "C. Thankful.", "D. Forgets it."], correct: "C", exp: "感激那次失败。", note: "thankful" },
        { id: 4, text: "What does the writer learn from his experience?", opts: ["A. Failure is not part of life.", "B. Failure leads to new opportunities.", "C. Easy to achieve success.", "D. Growing up is always fun."], correct: "B", exp: "失败带来新的机会。", note: "new opportunities" },
        { id: 5, text: "What's the main idea of the passage?", opts: ["A. Love for basketball.", "B. Swimming career.", "C. How he overcame failure and grew up.", "D. How to join a basketball team."], correct: "C", exp: "如何克服失败并成长。", note: "overcame failure" }
    ];

    function getPhrasesForReading(part) {
        if (part === 'A') return [
            { phrase: "a sense of achievement", meaning: "成就感", example: "brings a sense of achievement" },
            { phrase: "bit by bit", meaning: "一点一点地", example: "grow bit by bit" },
            { phrase: "be part of", meaning: "成为...的一部分", example: "been part of many warm stories" }
        ];
        return [
            { phrase: "try out for", meaning: "参加选拔", example: "tried out for the basketball team" },
            { phrase: "take one's mind off", meaning: "转移注意力", example: "to take his mind off things" },
            { phrase: "fall in love with", meaning: "爱上", example: "fell in love with swimming" },
            { phrase: "a part of life", meaning: "生活的一部分", example: "failure is a part of life" }
        ];
    }

    // 词汇运用
    var vocabFill = [
        { id: 1, correct: "honour", exp: "it's a great honour", note: "honour荣誉" },
        { id: 2, correct: "grew", exp: "婴儿慢慢长大", note: "grew" },
        { id: 3, correct: "are disappearing", exp: "正在消失", note: "are disappearing" },
        { id: 4, correct: "was reminded", exp: "被提醒", note: "was reminded" },
        { id: 5, correct: "don't have to", exp: "不必", note: "don't have to" },
        { id: 6, correct: "voted", exp: "投票选举", note: "voted" },
        { id: 7, correct: "was taken", exp: "被带到", note: "was taken" },
        { id: 8, correct: "are called", exp: "被称为", note: "are called" },
        { id: 9, correct: "fell", exp: "爱上", note: "fell in love with" },
        { id: 10, correct: "takes", exp: "承担责任", note: "takes responsibility" }
    ];

    // 句型转换
    var sentenceTransform = [
        { id: 1, text: "People will replace cashiers with machines in the future.", correct: "will be replaced", exp: "被动语态will be done", note: "Cashiers will be replaced" },
        { id: 2, text: "The son made his mother worried because he came back late.", correct: "was made worried", exp: "was made + adj", note: "The mother was made worried" },
        { id: 3, text: "You should talk to your teammates first.", correct: "shouldn't talk", exp: "否定句加not", note: "shouldn't talk" },
        { id: 4, text: "Liu Lianman was too tired to climb further.", correct: "so; that; couldn't", exp: "too...to改为so...that", note: "so tired that he couldn't climb" },
        { id: 5, text: "We have to work together to finish the task.", correct: "Do we have to", exp: "一般疑问句", note: "Do we have to" }
    ];

    // 补全对话
    var dialogue = [
        { id: 1, text: "I heard you joined the school drama team. ______", correct: "B", exp: "询问是否真实", note: "Is that true?" },
        { id: 2, text: "Yes, but Tony froze when he had to make a decision. ______", correct: "D", exp: "表示同情", note: "I'm sorry to hear that" },
        { id: 3, text: "______", correct: "E", exp: "询问解决办法", note: "What should we do?" },
        { id: 4, text: "What if I don't get the role? — ______", correct: "A", exp: "别担心", note: "Don't worry" },
        { id: 5, text: "______ — You're welcome.", correct: "C", exp: "表示感谢", note: "Thank you for your advice" }
    ];
    var dialogueOpts = ["A. Don't worry about that.", "B. Is that true?", "C. Thank you for your advice.", "D. I'm sorry to hear that.", "E. What should we do?"];

    var root = document.getElementById("questionsRoot");
    var html = '';

    html += '<div class="card"><div class="question-panel"><div class="question-text">📌 单项选择 (1-15)</div></div></div>';
    for (var i = 0; i < singleChoice.length; i++) { var q = singleChoice[i];

            html += '<div class="option" data-val="' + opt[0] + '"><div class="option-letter">' + opt[0] + '</div><div class="option-text">' + escapeHtml(opt) + '</div></div>';
        }
        html += '</div></div><div class="feedback-area" style="display:none;"></div></div>';

    html += '<div class="card"><div class="question-panel"><div class="question-text">📝 完形填空 · 团队合作故事</div><div class="cloze-passage">' + escapeHtml("Last year, I joined a team to organize a school party. Our first task was to plan the party activities. Some members wanted a dance show, while others preferred a talent show. We couldn't reach an agreement. Our leader, Tom, didn't freeze. Instead, he asked us to talk about our ideas one by one. He said we should respect each other's opinions. Finally, we decided to have both shows. When we were preparing, a problem appeared. Our sound equipment was broken by accident. Tom told us not to panic. He said we should ask the school for help. With the school's support, we got new equipment in time. On the day of the party, everything went well. I learned that a great team needs good communication and cooperation. When disagreements happen, we should communicate openly. A leader should solve problems in a wise way. Teamwork always works when we face difficulties. No one can succeed without the support of a team. A good experience can help us become better team players.") + '</div></div></div>';
    for (var i = 0; i < clozeData.length; i++) { var q = clozeData[i];
        html += '<div class="card" data-qid="clz_' + q.id + '" data-correct="' + q.correct + '" data-exp="' + escapeHtml(q.exp) + '" data-note="' + escapeHtml(q.note) + '"><div class="question-panel"><div class="question-text">' + q.id + '. ' + escapeHtml(q.text) + '</div><div class="options-list">';
        for (var j = 0; j < 4; j++) { var opt = ["A. freeze", "B. storm", "C. worry", "D. agree"][j]; if (q.id===2) opt = ["A. should","B. can","C. may","D. would"][j]; if (q.id===3) opt = ["A. break","B. broke","C. was broken","D. will be broken"][j]; if (q.id===4) opt = ["A. must","B. should","C. need","D. can"][j]; if (q.id===5) opt = ["A. needs","B. needed","C. will need","D. is needed"][j]; if (q.id===6) opt = ["A. must","B. should","C. can","D. may"][j]; if (q.id===7) opt = ["A. can","B. should","C. may","D. would"][j]; if (q.id===8) opt = ["A. work","B. works","C. worked","D. will work"][j]; if (q.id===9) opt = ["A. with","B. without","C. for","D. against"][j]; if (q.id===10) opt = ["A. become","B. became","C. becoming","D. becomes"][j];
            html += '<div class="option" data-val="' + opt[0] + '"><div class="option-letter">' + opt[0] + '</div><div class="option-text">' + escapeHtml(opt) + '</div></div>';
        }
        html += '</div></div><div class="feedback-area" style="display:none;"></div></div>';
    }

    html += '<div class="card"><div class="question-panel"><div class="question-text">📖 阅读理解 A · 窗户清洁工Robert的故事</div><div class="reading-passage">' + escapeHtml("Robert worked as a window cleaner for 30 years. On his last day at work, he gave a speech. He said the past 30 years were filled with challenges and joys. He remembered his first summer as a 'spiderman'. It was a very hot day. When he opened his eyes after wiping the sweat, he saw a juicy watermelon. A kind woman had cut it into small pieces for him. That was the sweetest watermelon he had ever eaten. He also watched a newborn baby grow bit by bit through the glass. The baby drew a picture of him. Later, the family moved away. Robert felt sad but happy they had been friends. He said window cleaning was not always considered a good job, but he found a sense of achievement. He told his colleagues the city shone brighter because of them.") + '</div></div></div>';
    for (var i = 0; i < readingAQ.length; i++) { var q = readingAQ[i];
        html += '<div class="card" data-qid="rea_' + q.id + '" data-correct="' + q.correct + '" data-exp="' + escapeHtml(q.exp) + '" data-note="' + escapeHtml(q.note) + '"><div class="question-panel"><div class="question-text">' + q.id + '. ' + escapeHtml(q.text) + '</div><div class="options-list">';
        for (var j = 0; j < 4; j++) { var opt = q.opts[j];
            html += '<div class="option" data-val="' + opt[0] + '"><div class="option-letter">' + opt[0] + '</div><div class="option-text">' + escapeHtml(opt) + '</div></div>';
        }
        html += '</div></div><div class="feedback-area" style="display:none;"></div></div>';
    }
    var pa = getPhrasesForReading('A');
    html += '<div class="analysis-special"><div class="analysis-title">📚 阅读理解A · 高频短语</div><div class="phrase-list">';
    for (var i = 0; i < pa.length; i++) { html += '<div class="phrase-item"><div class="phrase-text"><span class="phrase-en">' + escapeHtml(pa[i].phrase) + '</span><span class="phrase-zh">' + escapeHtml(pa[i].meaning) + '</span></div><div class="phrase-example">💬 ' + escapeHtml(pa[i].example) + '</div></div>'; }
    html += '</div></div>';

    html += '<div class="card"><div class="question-panel"><div class="question-text">📖 阅读理解 B · 成长的烦恼与收获</div><div class="reading-passage">' + escapeHtml("Four years ago, the writer tried out for the basketball team but failed because he wasn't tall enough. He felt very disappointed. His best friend suggested he try other sports like swimming. At first, he swam just to take his mind off things. But soon, he fell completely in love with swimming. Now, he has won several competitions and made many friends. He understands that failure is a part of life. When one door closes, another opens. He realizes that growing up is not easy. Every difficult experience can teach us something and help us grow.") + '</div></div></div>';
    for (var i = 0; i < readingBQ.length; i++) { var q = readingBQ[i];
        html += '<div class="card" data-qid="reb_' + q.id + '" data-correct="' + q.correct + '" data-exp="' + escapeHtml(q.exp) + '" data-note="' + escapeHtml(q.note) + '"><div class="question-panel"><div class="question-text">' + q.id + '. ' + escapeHtml(q.text) + '</div><div class="options-list">';
        for (var j = 0; j < 4; j++) { var opt = q.opts[j];
            html += '<div class="option" data-val="' + opt[0] + '"><div class="option-letter">' + opt[0] + '</div><div class="option-text">' + escapeHtml(opt) + '</div></div>';
        }
        html += '</div></div><div class="feedback-area" style="display:none;"></div></div>';
    }
    var pb = getPhrasesForReading('B');
    html += '<div class="analysis-special"><div class="analysis-title">📚 阅读理解B · 高频短语</div><div class="phrase-list">';
    for (var i = 0; i < pb.length; i++) { html += '<div class="phrase-item"><div class="phrase-text"><span class="phrase-en">' + escapeHtml(pb[i].phrase) + '</span><span class="phrase-zh">' + escapeHtml(pb[i].meaning) + '</span></div><div class="phrase-example">💬 ' + escapeHtml(pb[i].example) + '</div></div>'; }
    html += '</div></div>';

    html += '<div class="card"><div class="question-panel"><div class="question-text">📝 词汇运用 (1-10)</div></div></div>';
    for (var i = 0; i < vocabFill.length; i++) { var q = vocabFill[i];
        html += '<div class="card" data-qid="voc_' + q.id + '" data-correct="' + q.correct + '" data-exp="' + escapeHtml(q.exp) + '" data-note="' + escapeHtml(q.note) + '"><div class="question-panel"><div class="question-text">' + q.id + '. </div><div class="options-list"><div class="option" data-val="' + q.correct + '"><div class="option-letter">📝</div><div class="option-text">点击填写答案: ' + escapeHtml(q.correct) + '</div></div></div></div><div class="feedback-area" style="display:none;"></div></div>';
    }

    html += '<div class="card"><div class="question-panel"><div class="question-text">📝 句型转换 (1-5)</div></div></div>';
    for (var i = 0; i < sentenceTransform.length; i++) { var q = sentenceTransform[i];
        html += '<div class="card" data-qid="st_' + q.id + '" data-correct="' + escapeHtml(q.correct) + '" data-exp="' + escapeHtml(q.exp) + '" data-note="' + escapeHtml(q.note) + '"><div class="question-panel"><div class="question-text">' + q.id + '. ' + escapeHtml(q.text) + '</div><div class="options-list"><div class="option" data-val="' + escapeHtml(q.correct) + '"><div class="option-letter">📝</div><div class="option-text">点击显示答案: ' + escapeHtml(q.correct) + '</div></div></div></div><div class="feedback-area" style="display:none;"></div></div>';
    }

    html += '<div class="card"><div class="question-panel"><div class="question-text">💬 补全对话 (1-5)</div></div></div>';
    for (var i = 0; i < dialogue.length; i++) { var q = dialogue[i];
        html += '<div class="card" data-qid="dia_' + q.id + '" data-correct="' + q.correct + '" data-exp="' + escapeHtml(q.exp) + '" data-note="补全对话"><div class="question-panel"><div class="question-text">' + q.id + '. ' + escapeHtml(q.text) + '</div><div class="options-list">';
        for (var j = 0; j < dialogueOpts.length; j++) { var opt = dialogueOpts[j];
            html += '<div class="option" data-val="' + opt[0] + '"><div class="option-letter">' + opt[0] + '</div><div class="option-text">' + escapeHtml(opt) + '</div></div>';
        }
        html += '</div></div><div class="feedback-area" style="display:none;"></div></div>';
    }

    html += '<div class="card"><div class="question-panel"><div class="question-text">✍️ 书面表达 · My Understanding of Growth</div><div class="grammar-passage">' + escapeHtml("要求：1.成长中可能遇到的困难（如失败、同伴压力等）；2.如何应对这些困难；3.从成长中获得的启示。词数80-100。参考范文见试卷解析。") + '</div></div></div>';
    html += '<div class="method-card"><div class="badge-method">🎯 解题策略总结</div><ul style="margin-left:20px;color:#375e4c;"><li><strong>1. 单项选择</strong> — 注意时态、语态、情态动词、非谓语动词。</li><li><strong>2. 完形填空</strong> — 上下文逻辑、固定搭配、词义辨析。</li><li><strong>3. 阅读理解</strong> — 细节定位、推理判断、主旨概括。</li><li><strong>4. 词汇运用</strong> — 词性转换、时态语态、固定短语。</li><li><strong>5. 补全对话</strong> — 交际用语、上下文呼应。</li></ul></div>';
    
    root.innerHTML = html;
    document.querySelectorAll(".reading-passage, .cloze-passage, .grammar-passage, .question-text, .option-text, .phrase-item").forEach(function(el) { makeWordsClickable(el); });
    
    document.querySelectorAll('.card[data-qid]').forEach(function(card) {
        var correct = card.getAttribute('data-correct');
        var exp = card.getAttribute('data-exp') || "根据上下文分析得出。";
        var note = card.getAttribute('data-note') || "注意固定搭配与逻辑。";
        var optsDiv = card.querySelector('.options-list');
        if (!optsDiv) return;
        var opts = optsDiv.querySelectorAll('.option');
        opts.forEach(function(opt) {
            opt.addEventListener('click', function() {
                if (card.classList.contains('answered')) return;
                var selected = opt.getAttribute('data-val');
                var isCorrect = (selected === correct);
                var fb = card.querySelector('.feedback-area');
                if (!fb) return;
                var yourFull = selected, correctFull = correct;
                opts.forEach(function(o) { if(o.getAttribute('data-val') === selected) yourFull = o.querySelector('.option-text')?.innerText || selected; if(o.getAttribute('data-val') === correct) correctFull = o.querySelector('.option-text')?.innerText || correct; });
                fb.innerHTML = '<div class="result-badge ' + (isCorrect ? 'correct-badge' : 'wrong-badge') + '">' + (isCorrect ? '✔ 回答正确' : '❌ 回答错误') + '</div><div class="answer-compare"><div class="your-answer">📌 你的答案：' + selected + '. ' + escapeHtml(yourFull) + '</div><div class="correct-answer">✅ 正确答案：' + correct + '. ' + escapeHtml(correctFull) + '</div></div><div class="detail-explanation"><strong>🔎 详细解析：</strong> ' + escapeHtml(exp) + '<br/><strong>📘 考点笔记：</strong> ' + escapeHtml(note) + '</div><div class="lock-message">🔒 答案已锁定</div>';
                fb.style.display = 'block';
                card.classList.add('answered');
                opts.forEach(function(o) { o.classList.add('disabled-opt'); });
            });
        });
    });
</script>

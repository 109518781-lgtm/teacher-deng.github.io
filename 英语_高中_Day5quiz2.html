<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>赢未来国雅 · 英语练习考点精析 | 数字时代的故事讲述</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5fbf7;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 24px 18px;
            color: #1e2f2a;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* 头部 */
        .hero {
            text-align: center;
            margin-bottom: 32px;
        }
        .hero h1 {
            font-size: 1.9rem;
            background: linear-gradient(135deg, #216e48, #368f5c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .hero p {
            color: #517a66;
            font-size: 0.9rem;
            border-bottom: 2px solid #cde2d6;
            display: inline-block;
            padding-bottom: 8px;
        }
        .meta-info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #5e7a6b;
        }

        /* 卡片通用样式 */
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 24px rgba(0, 32, 0, 0.05);
            margin-bottom: 28px;
            overflow: hidden;
        }

        .question-panel {
            padding: 24px 22px 12px 22px;
        }

        .reading-passage {
            background: #fefaf0;
            padding: 18px 20px;
            border-radius: 28px;
            line-height: 1.68;
            font-size: 0.96rem;
            margin-bottom: 24px;
            border: 1px solid #e9e0cb;
            white-space: pre-line;
        }

        .question-text {
            font-size: 1rem;
            font-weight: 550;
            background: #f9fff9;
            padding: 10px 16px;
            border-radius: 24px;
            border-left: 6px solid #3b9b6e;
            margin-bottom: 20px;
            line-height: 1.45;
            color: #1f3b31;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 18px;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 10px 16px;
            background: #fefef8;
            border: 1px solid #e1efe6;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option:hover:not(.disabled-opt) {
            background: #e9f3ec;
            border-color: #9ac2ab;
        }

        .option-letter {
            font-weight: 800;
            background: #e3f0e9;
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            color: #2b6e4c;
            flex-shrink: 0;
        }

        .option-text {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #2a423a;
        }

        .feedback-area {
            background: #f9fcf5;
            margin: 0 20px 20px 20px;
            border-radius: 24px;
            padding: 16px 20px;
            border: 1px solid #d9ebdf;
        }

        .result-badge {
            display: inline-block;
            font-weight: 700;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            margin-bottom: 14px;
        }

        .correct-badge {
            background: #cbefdf;
            color: #146b3a;
        }

        .wrong-badge {
            background: #ffe1de;
            color: #bc4a3a;
        }

        .answer-compare {
            background: #ffffffcc;
            padding: 10px 14px;
            border-radius: 20px;
            margin-top: 8px;
            font-size: 0.9rem;
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            border-left: 4px solid #88b8a0;
        }

        .detail-explanation {
            margin: 12px 0 0 0;
            padding: 12px 14px;
            background: #f3f8f1;
            border-radius: 20px;
            font-size: 0.88rem;
            line-height: 1.5;
        }

        .note-box {
            margin-top: 16px;
            background: #edf6ef;
            border-radius: 20px;
            padding: 12px 18px;
            font-size: 0.85rem;
            border: 1px solid #cde0d4;
        }

        .lock-message {
            margin-top: 12px;
            font-size: 0.7rem;
            text-align: right;
            color: #89b69c;
            font-style: italic;
        }

        .disabled-opt {
            opacity: 0.65;
            pointer-events: none;
            background: #f2f5ef;
            cursor: default;
        }

        /* 短语和长难句专用区域 */
        .analysis-special {
            margin: 0px;
            background: #fefbed;
            border-radius: 32px;
            padding: 0px 0px 12px 0px;
            border: 1px solid #f0e2bc;
        }

        .analysis-title {
            font-weight: 800;
            font-size: 1rem;
            padding: 20px 24px 8px 24px;
            color: #b17f2e;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff8e7;
            border-bottom: 1px dashed #efdfb2;
        }

        .phrase-list,
        .sentence-list {
            padding: 8px 24px 20px 24px;
        }

        .phrase-item,
        .sentence-item {
            margin-bottom: 18px;
            padding: 10px 14px;
            background: #fffcf0;
            border-radius: 24px;
            border-left: 4px solid #cfb87c;
        }

        .phrase-text {
            font-weight: 700;
            color: #3c6e47;
            font-size: 0.9rem;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 8px;
        }

        .phrase-en {
            background: #e8f0e3;
            padding: 2px 10px;
            border-radius: 40px;
        }

        .phrase-zh {
            color: #b45f1b;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .phrase-example {
            font-size: 0.85rem;
            color: #5c6e5a;
            margin-top: 8px;
            padding-left: 8px;
            border-left: 2px solid #dfcca2;
        }

        .sentence-grammar {
            background: #fef7e6;
            padding: 10px 14px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.85rem;
            line-height: 1.45;
        }

        .sentence-en {
            font-weight: 600;
            color: #2f6042;
        }

        .sentence-zh {
            color: #a5651e;
            margin-top: 6px;
            font-size: 0.85rem;
        }

        .hover-word {
            border-bottom: 1px dashed #6f9a82;
            cursor: help;
            transition: 0.1s;
            font-weight: 500;
        }

        .hover-word:hover {
            background: #d9f0e4;
            border-radius: 8px;
        }

        .method-card {
            background: #eef3f0;
            border-radius: 28px;
            padding: 18px 22px;
            margin: 0 0 20px 0;
        }

        .badge-method {
            background: #d9e6de;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #2f6b48;
        }

        .vocab-table,
        .sentence-table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffffdd;
            border-radius: 24px;
            overflow: hidden;
            margin-top: 12px;
        }

        .vocab-table th,
        .vocab-table td,
        .sentence-table th,
        .sentence-table td {
            border: 1px solid #dbeadf;
            padding: 10px 12px;
            vertical-align: top;
            font-size: 0.85rem;
        }

        .vocab-table th,
        .sentence-table th {
            background: #e2f0e8;
            font-weight: 600;
            color: #245f41;
        }

        .section-title-icon {
            margin: 20px 0 10px 0;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .editable-cell {
            background-color: #fffff2;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px 12px;
            }

            .question-panel {
                padding: 18px 16px 6px 16px;
            }

            .feedback-area {
                margin: 0 12px 16px 12px;
            }

            .phrase-list,
            .sentence-list {
                padding: 8px 16px 16px 16px;
            }
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #86a694;
            margin: 32px 0 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>✨ 赢未来国雅 · 英语练习考点精析 ✨</h1>
        <p>阅读理解 · 数字时代与代际故事 | 悬停释义+对比解析+自主复习表</p>
        <div class="meta-info">📌 来源：2022新课标II卷 · 难度较难</div>
    </div>
    <div id="questionsRoot"></div>
    <footer>💡 点击选项即锁定，显示你的答案vs正确答案。悬停英文单词显示释义，下方可自由记录难词长难句。</footer>
</div>

<script>
    // ========== 单词悬停释义库 ==========
    const meaningMap = {
        "journalists": "记者", "storytelling": "讲故事", "multimedia": "多媒体的", "tablet": "平板电脑",
        "poke": "戳", "antique": "古董", "digitally": "数字地", "integration": "融合", "province": "省",
        "amused": "逗乐", "outdated": "过时的", "lifeless": "无生气的", "notable": "显著的", "competent": "有能力的",
        "ambitious": "有雄心的", "attractive": "有吸引力的", "independent": "独立的", "edit": "编辑",
        "mobile payment": "移动支付", "digital native": "数字原住民", "hit home": "使明确认识到",
        "come alive": "变得生动"
    };
    function addWordHover(text) {
        if (!text) return text;
        return text.replace(/\b([A-Za-z][A-Za-z\-']{1,35})\b/g, (match) => {
            let low = match.toLowerCase();
            let meaning = meaningMap[low] || meaningMap[match];
            if (meaning) return `<span class="hover-word" title="${meaning}">${match}</span>`;
            return match;
        });
    }

    // ========== 文章数据（2022新课标II卷）==========
    const passageContent = `We journalists live in a new age of storytelling, with many new multimedia tools. Many young people don't even realize it's new. For them, it's just normal.

This hit home for me as I was sitting with my 2-year-old grandson on a sofa over the Spring Festival holiday. I had brought a children's book to read. It had simple words and colorful pictures - a perfect match for his age.

Picture this: my grandson sitting on my lap as I hold the book in front so he can see the pictures. As I read, he reaches out and pokes (戳) the page with his finger.

What's up with that? He just likes the pictures, I thought. Then I turned the page and continued. He poked the page even harder. I nearly dropped the book. I was confused: Is there something wrong with this kid?

Then I realized what was happening. He was actually a stranger to books. His father frequently amused the boy with a tablet computer which was loaded with colorful pictures that come alive when you poke them. He thought my storybook was like that.

Sorry, kid. This book is not part of your high-tech world. It's an outdated, lifeless thing. An antique, like your grandfather. Well, I may be old, but I'm not hopelessly challenged, digitally speaking. I edit video and produce audio. I use mobile payment. I've even built websites.

There's one notable gap in my new-media experience, however: I've spent little time in front of a camera, since I have a face made for radio. But that didn't stop China Daily from asking me last week to share a personal story for a video project about the integration of Beijing, Tianjin and Hebei province.

Anyway, grandpa is now an internet star -- two minutes of fame! I promise not to let it go to my head. But I will make sure my 2-year-old grandson sees it on his tablet.`;

    // 阅读题目（基于原卷24-27）—— 第24题已补充完整C/D选项
    const readingQuestions = [
        { id: 24, text: "What do the underlined words 'hit home for me' mean in paragraph 2?", options: ["A. Provided shelter for me.", "B. Became very clear to me.", "C. Took the pressure off me.", "D. Worked quite well on me."], correct: "B", explanation: "短语 'hit home' 意为‘使人深刻理解/意识到’。作者在假期与孙子互动时，突然意识到年轻一代对数字工具的天然亲近，正是因为这件小事让他‘意识到’代际差异。", note: "hit home 此处意为‘让我恍然大悟’。词义猜测题：结合上下文‘我与孙子读书，他戳书本让我不解，而后意识到他误认成平板’，所以B‘变得非常清晰’最贴切。" },
        { id: 25, text: "Why did the kid poke the storybook?", options: ["A. He took it for a tablet computer.", "B. He disliked the colorful pictures.", "C. He was angry with his grandpa.", "D. He wanted to read it by himself."], correct: "A", explanation: "第五段明确指出孩子父亲常用平板电脑让他看会动的图片，所以孩子误以为纸质故事书也是那样的交互设备。", note: "细节理解：孩子把纸质书当成了可交互的平板。" },
        { id: 26, text: "What does the author think of himself?", options: ["A. Socially ambitious.", "B. Physically attractive.", "C. Financially independent.", "D. Digitally competent."], correct: "D", explanation: "第六段作者列举自己会编辑视频、做音频、移动支付、建网站，表明他在数字方面是有能力的，并不像孙子认为的‘过时古董’。", note: "事实细节：digitally competent 对应列举的技能。" },
        { id: 27, text: "What can we learn about the author as a journalist?", options: ["A. He lacks experience in his job.", "B. He seldom appears on television.", "C. He manages a video department.", "D. He often interviews internet stars."], correct: "B", explanation: "倒数第二段提到 'I've spent little time in front of a camera' 以及 'a face made for radio'，说明他很少出现在电视镜头前。", note: "推理判断：a face made for radio 自嘲不适合出镜，与 seldom appears on television 同义。" }
    ];

    // 高频短语 + 长难句
    const phraseList = [
        { phrase: "hit home", meaning: "使充分意识到；切中要害", example: "The realization hit home when I saw my grandson poking the book." },
        { phrase: "be a stranger to", meaning: "对……陌生", example: "He was a stranger to books." },
        { phrase: "come alive", meaning: "变得生动；活跃起来", example: "Pictures come alive when you poke the screen." },
        { phrase: "digitally speaking", meaning: "就数字技术而言", example: "I'm not hopelessly challenged, digitally speaking." },
        { phrase: "a face made for radio", meaning: "不适合上镜 (自嘲)", example: "I have a face made for radio, so I seldom appear on TV." },
        { phrase: "let it go to my head", meaning: "使某人骄傲自满", example: "I promise not to let the fame go to my head." }
    ];

    const longSentences = [
        { sentence: "His father frequently amused the boy with a tablet computer which was loaded with colorful pictures that come alive when you poke them.", translation: "他的父亲经常用一台平板电脑逗孩子，里面装满了五彩缤纷的图片，一戳它们就会动起来。", analysis: "which引导定语从句修饰tablet computer；that引导定语从句修饰pictures；when引导时间状语从句。" },
        { sentence: "There's one notable gap in my new-media experience, however: I've spent little time in front of a camera, since I have a face made for radio.", translation: "然而，我的新媒体经历中有一个显著的空白：我很少出现在镜头前，因为我这张脸只适合做广播。", analysis: "冒号后解释gap的内容；since引导原因状语从句；a face made for radio为幽默表达。" }
    ];

    const strategyBlock = `
        <div class="method-card">
            <div class="badge-method">🎯 阅读理解 · 解题策略思路</div>
            <ul style="margin-left:20px; margin-top:12px; color:#375e4c; line-height:1.5;">
                <li><strong>1. 词义猜测题（24题）：</strong> 借助上下文逻辑（从困惑到了悟）及情感色彩 → hit home = became very clear。</li>
                <li><strong>2. 细节理解题（25题）：</strong> 定位第五段，孩子误将纸质书当作平板，poke 动作源于习惯。</li>
                <li><strong>3. 观点态度题（26题）：</strong> 通过具体事例（编辑视频、建网站）推断作者认为自己数字能力胜任。</li>
                <li><strong>4. 推理判断题（27题）：</strong> “spent little time in front of a camera” 可见很少上电视。</li>
                <li><strong>5. 长难句拆分：</strong> 先抓主句，再逐层分析定语和状语。</li>
            </ul>
        </div>
    `;

    // 渲染DOM
    const root = document.getElementById("questionsRoot");

    function buildExam() {
        let html = `
            <div class="card">
                <div class="question-panel">
                    <div class="question-text">📖 阅读理解 · 记者祖父与数字时代幼孙 (2022新课标II卷)</div>
                    <div class="reading-passage">${addWordHover(passageContent)}</div>
                </div>
            </div>
        `;

        readingQuestions.forEach(q => {
            html += `
                <div class="card" data-qid="rd_${q.id}" data-correct="${q.correct}" data-type="reading" data-explanation='${q.explanation.replace(/'/g, "&#39;")}' data-note='${q.note.replace(/'/g, "&#39;")}'>
                    <div class="question-panel">
                        <div class="question-text">${q.id}. ${addWordHover(q.text)}</div>
                        <div class="options-list" id="opts-rd_${q.id}">
            `;
            q.options.forEach(opt => {
                let letter = opt.charAt(0);
                let optRaw = opt.slice(1).trim();
                html += `<div class="option" data-val="${letter}"><div class="option-letter">${letter}</div><div class="option-text">${addWordHover(optRaw)}</div></div>`;
            });
            html += `</div></div><div class="feedback-area" id="fb-rd_${q.id}" style="display:none;"></div></div>`;
        });

        // 短语 + 长难句区域
        html += `<div class="card"><div class="analysis-special">
                    <div class="analysis-title">📚 高频搭配 & 核心短语 · 长难句精析</div>
                    <div class="phrase-list"><strong style="display:block; margin-bottom:14px;">🔖 常考短语 (含释义+例句)</strong>`;
        phraseList.forEach(p => {
            html += `<div class="phrase-item">
                        <div class="phrase-text"><span class="phrase-en">${addWordHover(p.phrase)}</span> <span class="phrase-zh">${p.meaning}</span></div>
                        <div class="phrase-example">💬 ${addWordHover(p.example)}</div>
                     </div>`;
        });
        html += `</div><div class="sentence-list"><strong style="display:block; margin:20px 0 14px;">🧩 长难句 + 语法分析</strong>`;
        longSentences.forEach(ls => {
            html += `<div class="sentence-item">
                        <div class="sentence-en">📖 ${addWordHover(ls.sentence)}</div>
                        <div class="sentence-zh">📝 中文：${ls.translation}</div>
                        <div class="sentence-grammar">📌 语法解析：${ls.analysis}</div>
                     </div>`;
        });
        html += `</div></div></div>`;
        html += strategyBlock;

        // 难词表 + 长难句积累表（可编辑）
        html += `<div class="card" style="padding:16px 22px 22px 22px;">
                    <div class="section-title-icon">📘 我的难词表 · 自主复习</div>
                    <table class="vocab-table"><thead><tr><th>序号</th><th>单词</th><th>词性及释义</th><th>我的笔记</th></tr></thead>
                    <tbody id="vocabTbody">${[...Array(10)].map((_,i)=>`<tr><td>${i+1}</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>`).join('')}</tbody></table>
                    <div class="section-title-icon" style="margin-top:24px;">📜 长难句积累 · 语料库</div>
                    <table class="sentence-table"><thead><tr><th>序号</th><th>长难句</th><th>备注（翻译/结构分析）</th></tr></thead>
                    <tbody id="sentenceTbody">${[...Array(5)].map((_,i)=>`<tr><td>${i+1}</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>`).join('')}</tbody></tr>
                    <div style="font-size:0.7rem; color:#8aa998; margin-top:12px;">✏️ 点击单元格即可填写，自由记录难词和长难句分析，方便复习。</div>
                </div>`;

        root.innerHTML = html;
        attachEvents();
    }

    function attachEvents() {
        const cards = document.querySelectorAll('.card[data-qid]');
        cards.forEach(card => {
            const correctAns = card.getAttribute('data-correct');
            const expRaw = card.getAttribute('data-explanation');
            const noteRaw = card.getAttribute('data-note');
            const explanation = expRaw || "根据文章细节与逻辑推断得出。";
            const note = noteRaw || "注意题干关键词与原文同义转述。";
            const optsDiv = card.querySelector('.options-list');
            if (!optsDiv) return;
            const options = optsDiv.querySelectorAll('.option');
            options.forEach(opt => {
                opt.addEventListener('click', () => {
                    if (card.classList.contains('answered')) return;
                    const selectedVal = opt.getAttribute('data-val');
                    const isCorrect = (selectedVal === correctAns);
                    const feedbackDiv = card.querySelector('.feedback-area');
                    if (!feedbackDiv) return;

                    let yourFull = "", correctFull = "";
                    options.forEach(op => {
                        if(op.getAttribute('data-val') === selectedVal) yourFull = op.querySelector('.option-text')?.innerText || selectedVal;
                        if(op.getAttribute('data-val') === correctAns) correctFull = op.querySelector('.option-text')?.innerText || correctAns;
                    });

                    feedbackDiv.innerHTML = `
                        <div class="result-badge ${isCorrect ? 'correct-badge' : 'wrong-badge'}">${isCorrect ? '✔ 回答正确' : '❌ 回答错误'}</div>
                        <div class="answer-compare">
                            <div class="your-answer">📌 你的答案：${selectedVal}. ${yourFull}</div>
                            <div class="correct-answer">✅ 正确答案：${correctAns}. ${correctFull}</div>
                        </div>
                        <div class="detail-explanation"><strong>🔎 详细解析：</strong> ${explanation}<br/><strong>📘 考点笔记：</strong> ${note}</div>
                        <div class="lock-message">🔒 答案已锁定，不可修改</div>
                    `;
                    feedbackDiv.style.display = 'block';
                    card.classList.add('answered');
                    options.forEach(op => op.classList.add('disabled-opt'));
                });
            });
        });
    }

    buildExam();
</script>
</body>
</html>

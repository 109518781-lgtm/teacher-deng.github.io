<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>赢未来国雅 · 英语练习考点精析 | DIY 阅读专练</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5fbf7;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 24px 18px;
            color: #1e2f2a;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* 头部 */
        .hero {
            text-align: center;
            margin-bottom: 32px;
        }
        .hero h1 {
            font-size: 1.9rem;
            background: linear-gradient(135deg, #216e48, #368f5c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .hero p {
            color: #517a66;
            font-size: 0.9rem;
            border-bottom: 2px solid #cde2d6;
            display: inline-block;
            padding-bottom: 8px;
        }
        .meta-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #5e7a6b;
        }

        /* 卡片通用 */
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 24px rgba(0, 32, 0, 0.05);
            margin-bottom: 28px;
            overflow: hidden;
            transition: 0.2s;
        }

        .question-panel {
            padding: 24px 22px 12px 22px;
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: 550;
            background: #f9fff9;
            padding: 12px 16px;
            border-radius: 24px;
            border-left: 6px solid #3b9b6e;
            margin-bottom: 20px;
            line-height: 1.45;
            color: #1f3b31;
        }

        .reading-passage {
            background: #fefaf0;
            padding: 18px 20px;
            border-radius: 28px;
            line-height: 1.65;
            font-size: 0.95rem;
            margin-bottom: 24px;
            border: 1px solid #e9e0cb;
            white-space: pre-line;
        }

        /* 选项区域 */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 18px;
        }
        .option {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 10px 16px;
            background: #fefef8;
            border: 1px solid #e1efe6;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover:not(.disabled-opt) {
            background: #e9f3ec;
            border-color: #9ac2ab;
        }
        .option-letter {
            font-weight: 800;
            background: #e3f0e9;
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            color: #2b6e4c;
            flex-shrink: 0;
        }
        .option-text {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #2a423a;
        }

        /* 反馈区域 */
        .feedback-area {
            background: #f9fcf5;
            margin: 0 20px 20px 20px;
            border-radius: 24px;
            padding: 16px 20px;
            border: 1px solid #d9ebdf;
        }
        .result-badge {
            display: inline-block;
            font-weight: 700;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            margin-bottom: 14px;
        }
        .correct-badge {
            background: #cbefdf;
            color: #146b3a;
        }
        .wrong-badge {
            background: #ffe1de;
            color: #bc4a3a;
        }
        .answer-compare {
            background: #ffffffcc;
            padding: 10px 14px;
            border-radius: 20px;
            margin-top: 8px;
            font-size: 0.9rem;
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            border-left: 4px solid #88b8a0;
        }
        .detail-explanation {
            margin: 12px 0 0 0;
            padding: 12px 14px;
            background: #f3f8f1;
            border-radius: 20px;
            font-size: 0.88rem;
            line-height: 1.5;
        }
        .note-box {
            margin-top: 16px;
            background: #edf6ef;
            border-radius: 20px;
            padding: 12px 18px;
            font-size: 0.85rem;
            border: 1px solid #cde0d4;
        }
        .lock-message {
            margin-top: 12px;
            font-size: 0.7rem;
            text-align: right;
            color: #89b69c;
            font-style: italic;
        }

        /* 短语长难句区域 */
        .analysis-special {
            margin: 0px;
            background: #fefbed;
            border-radius: 32px;
            padding: 0px 0px 12px 0px;
            border: 1px solid #f0e2bc;
        }
        .analysis-title {
            font-weight: 800;
            font-size: 1rem;
            padding: 20px 24px 8px 24px;
            color: #b17f2e;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff8e7;
            border-bottom: 1px dashed #efdfb2;
        }
        .phrase-list, .sentence-list {
            padding: 8px 24px 20px 24px;
        }
        .phrase-item, .sentence-item {
            margin-bottom: 18px;
            padding: 10px 14px;
            background: #fffcf0;
            border-radius: 24px;
            border-left: 4px solid #cfb87c;
        }
        .phrase-text {
            font-weight: 700;
            color: #3c6e47;
            font-size: 0.9rem;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 8px;
        }
        .phrase-en {
            background: #e8f0e3;
            padding: 2px 10px;
            border-radius: 40px;
        }
        .phrase-zh {
            color: #b45f1b;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .phrase-example {
            font-size: 0.85rem;
            color: #5c6e5a;
            margin-top: 8px;
            padding-left: 8px;
            border-left: 2px solid #dfcca2;
        }
        .sentence-grammar {
            background: #fef7e6;
            padding: 10px 14px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.85rem;
            line-height: 1.45;
        }
        .sentence-en {
            font-weight: 600;
            color: #2f6042;
        }
        .sentence-zh {
            color: #a5651e;
            margin-top: 6px;
            font-size: 0.85rem;
        }

        .disabled-opt {
            opacity: 0.65;
            pointer-events: none;
            background: #f2f5ef;
            cursor: default;
        }

        /* 表格样式 难词 + 长难句积累表 */
        .vocab-table, .sentence-table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffffdd;
            border-radius: 24px;
            overflow: hidden;
            margin-top: 12px;
        }
        .vocab-table th, .vocab-table td, .sentence-table th, .sentence-table td {
            border: 1px solid #dbeadf;
            padding: 10px 12px;
            vertical-align: top;
            font-size: 0.85rem;
        }
        .vocab-table th, .sentence-table th {
            background: #e2f0e8;
            font-weight: 600;
            color: #245f41;
        }
        .section-title-icon {
            margin: 20px 0 10px 0;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hover-word {
            border-bottom: 1px dashed #6f9a82;
            cursor: help;
            transition: 0.1s;
            font-weight: 500;
        }
        .hover-word:hover {
            background: #d9f0e4;
            border-radius: 8px;
        }
        .method-card {
            background: #eef3f0;
            border-radius: 28px;
            padding: 18px 22px;
            margin: 0 0 20px 0;
        }
        .badge-method {
            background: #d9e6de;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #2f6b48;
        }

        @media (max-width: 640px) {
            body { padding: 16px 12px; }
            .question-panel { padding: 18px 16px 6px 16px; }
            .feedback-area { margin: 0 12px 16px 12px; }
            .phrase-list, .sentence-list { padding: 8px 16px 16px 16px; }
            .vocab-table th, .vocab-table td { padding: 6px 8px; }
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #86a694;
            margin: 32px 0 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>✨ 赢未来国雅 · 英语练习考点精析 ✨</h1>
        <p>DIY 阅读专练 | 单词悬停 | 答案对比 | 难词&长难句收纳表</p>
        <div class="meta-info">📌 来源：2023全国甲卷 · 较难</div>
    </div>
    <div id="questionsRoot"></div>
    <footer>💡 点击选项立即锁定答案，显示正误+你的答案 vs 正确答案。悬停英文单词查看释义，下方表格可自填复习。</footer>
</div>

<script>
    // ---------- 单词悬停释义库 ----------
    const meaningMap = {
        "dab": "能手", "hand": "人手；帮手", "DIY": "自己动手", "skilled": "熟练的", "shelves": "架子", "furniture": "家具",
        "credits": "归功于", "late": "已故的", "grandfather": "祖父", "builder": "建筑工", "accompanied": "陪伴",
        "rewarded": "奖励", "pocket money": "零花钱", "backbreaking": "累人的", "proud": "自豪的", "rents": "租用",
        "deposit": "押金", "tenancy": "租赁期", "personalise": "个性化", "cover up": "掩盖", "repaint": "重刷",
        "charges": "费用", "property": "房产", "value": "价值", "traditionally": "传统上", "hobby": "爱好",
        "leading": "领先的", "charge": "冲锋 / 收费", "comfort": "舒适", "projects": "项目"
    };
    function addWordHover(text) {
        if (!text) return text;
        return text.replace(/\b([A-Za-z][A-Za-z\-']{1,35})\b/g, (match) => {
            let low = match.toLowerCase();
            let meaning = meaningMap[low] || meaningMap[match];
            if (meaning) return `<span class="hover-word" title="${meaning}">${match}</span>`;
            return match;
        });
    }

    // ---------- 阅读数据 (根据新附件) ----------
    const passageData = {
        title: "Terri Bolton & DIY Trend",
        content: `Terri Bolton is a dab hand when it comes to DIY (do-it-yourself). Skilled at putting up shelves and piecing together furniture, she never pays someone else to do a job she can do herself.

She credits these skills to her late grandfather and builder Derek Lloyd. From the age of six, Terri, now 26, accompanied Derek to work during her school holidays. A day's work was rewarded with £5 in pocket money. She says: "I'm sure I wasn't much of a help to start with painting the rooms and putting down the flooring throughout the house. It took weeks and it was backbreaking work, but I know he was proud of my skills."

Terri, who now rents a house with friends in Wandsworth, South West London, says DIY also saves her from losing any deposit when a tenancy (租期) comes to an end. She adds: "I've moved house many times and I always like to personalise my room and put up pictures. So, it's been useful to know how to cover up holes and repaint a room to avoid any charges when I've moved out."

With millions of people likely to take on DIY projects over the coming weeks, new research shows that more than half of people are planning to make the most of the long, warm summer days to get jobs done. The average spend per project will be around £823. Two thirds of people aim to improve their comfort while at home. Two fifth wish to increase the value of their house. Though DIY has traditionally been seen as male hobby, the research shows it is women now leading the charge.`
    };

    const mcQuestions = [
        { id: 24, text: "Which is closest in meaning to 'a dab hand' in paragraph 1?", options: ["A. An artist.", "B. A winner.", "C. A specialist.", "D. A pioneer."], correct: "C", explanation: "原文描述Terri擅长安装架子、组装家具，从不花钱请人，说明‘dab hand’意为‘能手/专家’，specialist最贴近。", note: "dab hand 为英式口语，表示‘熟练工；行家’。同义替换题需结合上下文。" },
        { id: 25, text: "Why did Terri's grandfather give her £5 a day?", options: ["A. For a birthday gift.", "B. As a treat for her work.", "C. To support her DIY projects.", "D. To encourage her to take up a hobby."], correct: "B", explanation: "文中明确：A day's work was rewarded with £5 in pocket money. 作为对她工作的奖励。", note: "细节定位题，注意‘rewarded with’表示酬劳。" },
        { id: 26, text: "How did Terri avoid losing the deposit on the house she rented?", options: ["A. By making it look like before.", "B. By furnishing it herself.", "C. By splitting the rent with a roommate.", "D. By cancelling the rental agreement."], correct: "A", explanation: "文中提到她学会 cover up holes and repaint a room to avoid charges，让房间恢复原状避免扣款，即使房间看起来像之前一样。", note: "细节归纳：恢复原样 = make it look like before。" },
        { id: 27, text: "What trend in DIY does the research show?", options: ["A. It is becoming more costly.", "B. It is getting more time-consuming.", "C. It is turning into a seasonal industry.", "D. It is gaining popularity among females."], correct: "D", explanation: "最后一句：though DIY has traditionally been seen as male hobby, the research shows it is women now leading the charge. 女性引领DIY潮流。", note: "趋势题，抓住‘women now leading the charge’。" }
    ];

    // 高频短语 + 长难句 (带中文+解析)
    const phraseList = [
        { phrase: "a dab hand at", meaning: "擅长……的能手", example: "She is a dab hand at DIY. (她是DIY能手)" },
        { phrase: "piece together", meaning: "拼装；组装", example: "piece together furniture (组装家具)" },
        { phrase: "credit sth to sb", meaning: "把……归功于某人", example: "She credits her skills to her grandfather." },
        { phrase: "rewarded with", meaning: "以……作为奖励", example: "Each day’s work was rewarded with £5." },
        { phrase: "save sb from losing", meaning: "使某人免于失去", example: "DIY saves her from losing deposit." },
        { phrase: "cover up holes", meaning: "遮盖孔洞", example: "learn to cover up holes before moving out." },
        { phrase: "make the most of", meaning: "充分利用", example: "make the most of summer days to DIY." },
        { phrase: "lead the charge", meaning: "领头；率先行动", example: "Women are leading the charge in DIY." }
    ];

    const longSentences = [
        { sentence: "Skilled at putting up shelves and piecing together furniture, she never pays someone else to do a job she can do herself.", translation: "她擅长安装架子和组装家具，从不花钱请别人做自己能做的事。", analysis: "形容词短语作状语；定语从句'she can do herself'修饰job。" },
        { sentence: "Though DIY has traditionally been seen as male hobby, the research shows it is women now leading the charge.", translation: "尽管DIY传统上被视为男性爱好，但研究表明现在女性正引领这一潮流。", analysis: "though引导让步状语从句；主句包含宾语从句，现在分词短语leading修饰women。" },
        { sentence: "With millions of people likely to take on DIY projects over the coming weeks, new research shows that more than half of people are planning to make the most of the long, warm summer days.", translation: "随着数百万人可能在未来几周进行DIY项目，新研究表明超过一半的人正计划充分利用漫长温暖的夏日。", analysis: "with复合结构作状语；that引导宾语从句。" }
    ];

    // 解题策略
    const strategyBlock = `
        <div class="method-card">
            <div class="badge-method">🎯 解题方法与思路点拨</div>
            <div style="margin-top:12px; font-weight:500; color:#2c5a44;">📖 阅读理解核心策略：</div>
            <ul style="margin-left:20px; margin-top:8px; color:#375e4c; line-height:1.5;">
                <li><strong>1. 词义猜测题</strong> —— 根据上下文逻辑、同位语或举例推断生词含义，如 “a dab hand” 后文说明她能力很强 → specialist。</li>
                <li><strong>2. 细节理解题</strong> —— 定位关键词，原文原句或同义转述，如 £5 对应 “rewarded with”。</li>
                <li><strong>3. 推理判断题</strong> —— 注意因果关系，Terri避免扣款→恢复原样。</li>
                <li><strong>4. 主旨/趋势题</strong> —— 关注最后一段转折/总结句，女性引领潮流。</li>
                <li><strong>5. 长难句拆解</strong> —— 先找主谓，再理从句，结合翻译。</li>
            </ul>
        </div>
    `;

    // 构建页面
    const root = document.getElementById("questionsRoot");

    function buildExam() {
        let html = `<div class="card"><div class="question-panel"><div class="question-text">📖 阅读理解 · DIY 与生活趋势 (2023全国甲卷)</div><div class="reading-passage">${addWordHover(passageData.content)}</div></div></div>`;

        mcQuestions.forEach(q => {
            html += `
                <div class="card" data-qid="mc_${q.id}" data-correct="${q.correct}" data-type="choice" data-explanation='${q.explanation.replace(/'/g, "&#39;")}' data-note='${q.note.replace(/'/g, "&#39;")}'>
                    <div class="question-panel">
                        <div class="question-text">${q.id}. ${addWordHover(q.text)}</div>
                        <div class="options-list" id="opts-mc_${q.id}">
            `;
            q.options.forEach(opt => {
                let letter = opt.charAt(0);
                let optRaw = opt.slice(1).trim();
                html += `<div class="option" data-val="${letter}"><div class="option-letter">${letter}</div><div class="option-text">${addWordHover(optRaw)}</div></div>`;
            });
            html += `</div></div><div class="feedback-area" id="fb-mc_${q.id}" style="display:none;"></div></div>`;
        });

        // 高频短语 + 长难句 板块（独立美观）
        html += `<div class="card"><div class="analysis-special">
                    <div class="analysis-title">📚 高频搭配 & 核心短语 · 长难句精析</div>
                    <div class="phrase-list"><strong style="display:block; margin-bottom:14px;">🔖 常考短语 (含释义+例句)</strong>`;
        phraseList.forEach(p => {
            html += `<div class="phrase-item">
                        <div class="phrase-text"><span class="phrase-en">${addWordHover(p.phrase)}</span> <span class="phrase-zh">${p.meaning}</span></div>
                        <div class="phrase-example">💬 ${addWordHover(p.example)}</div>
                     </div>`;
        });
        html += `</div><div class="sentence-list"><strong style="display:block; margin:20px 0 14px;">🧩 长难句 + 语法分析</strong>`;
        longSentences.forEach(ls => {
            html += `<div class="sentence-item">
                        <div class="sentence-en">📖 ${addWordHover(ls.sentence)}</div>
                        <div class="sentence-zh">📝 中文：${ls.translation}</div>
                        <div class="sentence-grammar">📌 语法解析：${ls.analysis}</div>
                     </div>`;
        });
        html += `</div></div></div>`;

        // 解题方法
        html += strategyBlock;

        // 难词表 + 长难句积累表 (可编辑空白复习表)
        html += `<div class="card" style="padding:16px 22px 22px 22px;">
                    <div class="section-title-icon">📘 我的难词表 · 自主复习</div>
                    <table class="vocab-table" id="vocabTable">
                        <thead><tr><th>序号</th><th>单词</th><th>词性及释义</th><th>我的笔记</th></tr></thead>
                        <tbody id="vocabTbody">
                            ${[...Array(10)].map((_,i)=>`<tr><td>${i+1}</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>`).join('')}
                        </tbody>
                    </table>
                    <div class="section-title-icon" style="margin-top:24px;">📜 长难句积累 · 语料库</div>
                    <table class="sentence-table">
                        <thead><tr><th>序号</th><th>长难句</th><th>备注（翻译/结构分析）</th></tr></thead>
                        <tbody id="sentenceTbody">
                            ${[...Array(5)].map((_,i)=>`<tr><td>${i+1}</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>`).join('')}
                        </tbody>
                    </table>
                    <div style="font-size:0.7rem; color:#8aa998; margin-top:12px;">✏️ 双击/单击表格内单元格即可填写，自由记录难词和长难句分析。</div>
                </div>`;

        root.innerHTML = html;
        attachEvents();
    }

    function attachEvents() {
        const allCards = document.querySelectorAll('.card[data-qid]');
        allCards.forEach(card => {
            const correctAns = card.getAttribute('data-correct');
            const expRaw = card.getAttribute('data-explanation');
            const noteRaw = card.getAttribute('data-note');
            const explanationText = expRaw ? expRaw : "根据上下文分析得出。";
            const noteText = noteRaw ? noteRaw : "积累核心表达。";
            const optsDiv = card.querySelector('.options-list');
            if (!optsDiv) return;
            const options = optsDiv.querySelectorAll('.option');
            options.forEach(opt => {
                opt.addEventListener('click', (e) => {
                    if (card.classList.contains('answered')) return;
                    const selectedVal = opt.getAttribute('data-val');
                    const isCorrect = (selectedVal === correctAns);
                    const feedbackDiv = card.querySelector('.feedback-area');
                    if (!feedbackDiv) return;

                    let yourFull = "", correctFull = "";
                    options.forEach(op => {
                        if(op.getAttribute('data-val') === selectedVal) yourFull = op.querySelector('.option-text')?.innerText || selectedVal;
                        if(op.getAttribute('data-val') === correctAns) correctFull = op.querySelector('.option-text')?.innerText || correctAns;
                    });

                    const resultHtml = `
                        <div class="result-badge ${isCorrect ? 'correct-badge' : 'wrong-badge'}">
                            ${isCorrect ? '✔ 回答正确' : '❌ 回答错误'}
                        </div>
                        <div class="answer-compare">
                            <div class="your-answer">📌 你的答案：${selectedVal}. ${yourFull}</div>
                            <div class="correct-answer">✅ 正确答案：${correctAns}. ${correctFull}</div>
                        </div>
                        <div class="detail-explanation">
                            <strong>🔎 详细解析：</strong> ${explanationText}<br/>
                            <strong>📘 考点笔记：</strong> ${noteText}
                        </div>
                        <div class="lock-message">🔒 答案已锁定，不可修改</div>
                    `;
                    feedbackDiv.innerHTML = resultHtml;
                    feedbackDiv.style.display = 'block';
                    card.classList.add('answered');
                    options.forEach(op => op.classList.add('disabled-opt'));
                });
            });
        });
    }

    buildExam();
</script>
</body>
</html>

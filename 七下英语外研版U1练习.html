<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>赢未来国雅 · 即学即练 | 中考英语 Unit 1 幸福秘诀（考点笔记版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f7f0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
            color: #1a2e1f;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        .stats-bar {
            background: white;
            border-radius: 32px;
            padding: 16px 24px;
            margin-bottom: 28px;
            box-shadow: 0 6px 16px rgba(0, 32, 0, 0.06);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .progress-text {
            background: #e9f5e9;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            color: #2a6b2f;
        }
        .accuracy-badge {
            background: #fff0df;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        h1 {
            font-size: 1.7rem;
            background: linear-gradient(135deg, #2a7a2a, #5fad5f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .section-card {
            background: white;
            border-radius: 32px;
            margin-bottom: 38px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        .section-title {
            background: #edf5ea;
            padding: 18px 26px;
            font-size: 1.5rem;
            font-weight: 700;
            border-left: 8px solid #4caf50;
            color: #2c4a2a;
        }
        .sub-title {
            background: #f9fbf5;
            padding: 8px 26px;
            font-size: 0.85rem;
            color: #5a7a55;
            border-bottom: 1px solid #d9e8d9;
            font-style: italic;
        }
        .question-item {
            padding: 20px 26px;
            border-bottom: 1px solid #e2efe2;
        }
        .question-text {
            font-weight: 700;
            font-size: 1.02rem;
            margin-bottom: 16px;
            line-height: 1.45;
            color: #1f3b1a;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 8px 0 12px;
        }
        .option-btn {
            background: #fafefa;
            border: 1.5px solid #c8e0c8;
            border-radius: 60px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #1f3b1c;
        }
        .option-btn:hover:not(:disabled) {
            background: #d9f0d9;
            border-color: #5fbb5f;
            transform: scale(0.97);
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }
        .feedback {
            margin-top: 14px;
            padding: 12px 18px;
            border-radius: 20px;
            background: #f8faf5;
            font-size: 0.9rem;
            line-height: 1.5;
            border-left: 5px solid #bcd0b5;
        }
        .feedback.correct {
            background: #e6f4ea;
            border-left-color: #2e7d32;
        }
        .feedback.wrong {
            background: #ffefef;
            border-left-color: #d32f2f;
        }
        .correct-answer-badge {
            font-weight: bold;
            background: #e9ecef;
            display: inline-block;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }
        .note-box {
            background: #fef7e0;
            padding: 10px 14px;
            border-radius: 16px;
            margin-top: 10px;
            font-size: 0.85rem;
            border-left: 3px solid #ffb74d;
            color: #5d4a1a;
        }
        .section-footer {
            padding: 16px 26px;
            background: #fafef8;
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid #ddebe0;
            font-weight: 500;
        }
        .global-download {
            display: flex;
            justify-content: center;
            margin: 20px 0 40px;
        }
        .download-btn {
            background: #2c6e2c;
            border: none;
            padding: 14px 36px;
            border-radius: 48px;
            font-weight: bold;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .download-btn:hover {
            background: #1f551f;
            transform: translateY(-2px);
        }
        @media (max-width: 700px) {
            body { padding: 12px; }
            .option-btn { padding: 5px 14px; font-size: 0.8rem; }
            .section-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="stats-bar">
        <h1>🌸 赢未来国雅 · 即学即练 | U1 幸福真谛</h1>
        <div style="display: flex; gap: 12px;">
            <div class="progress-text" id="progressCounter">已完成 0 / 28</div>
            <div class="accuracy-badge" id="accuracyDisplay">正确率: --%</div>
        </div>
    </div>
    <div id="quizRoot"></div>
    <div class="global-download" id="downloadBtnContainer"></div>
</div>

<script>
    // ======================= Unit 1 优化版：考点笔记化，每个选项考点清晰，正确答案始终显示 =======================
    // 总题数 28：短语·语法融合12题 + 完形填空8题 + 短文填空8题（Developing ideas拓展）
    // 每道题的feedback中：展示正确选项 + 考点笔记（包含所有选项所匹配的考点/辨析）

    // ---------- 1. 短语·语法融合 (Understanding ideas核心考点，每个选项都有考点标注) ----------
    const mixedChoice = [
        { text: "I kept ________ the exciting story in my mind after reading it.", options: ["A. go over", "B. going over", "C. to go over", "D. went over"], correct: "B", note: "🔍 考点笔记：keep doing sth. 持续做某事。A.go over 原形不能用于keep后；B.going over 动名词，正确；C.to go over 不定式错误；D.went over 过去式错误。" },
        { text: "In winter, the freezing wind ________ the floor all night long.", options: ["A. swept across", "B. swept away", "C. put down", "D. went across"], correct: "A", note: "🔍 考点笔记：sweep across 横扫/席卷（课文原词）。A.swept across 正确；B.swept away 清除；C.put down 放下；D.went across 穿过（表面），不符寒风语境。" },
        { text: "To ________ surprise, the poor family were happy together.", options: ["A. me", "B. I", "C. my", "D. mine"], correct: "C", note: "🔍 考点笔记：to one's surprise 令某人惊讶的是。A.me 宾格；B.I 主格；C.my 形容词性物主代词，正确；D.mine 名词性物主代词。" },
        { text: "The family were not rich, but they were rich ________ love.", options: ["A. in", "B. of", "C. with", "D. for"], correct: "A", note: "🔍 考点笔记：be rich in 富含……。A.in 正确搭配；B.of 表所属；C.with 伴随；D.for 为了。课文原句 'rich in love'。" },
        { text: "We should fill our life ________ happiness instead of sadness.", options: ["A. of", "B. by", "C. with", "D. in"], correct: "C", note: "🔍 考点笔记：fill...with... 用……装满。A.of 错误；B.by 通过；C.with 正确；D.in 在……内。" },
        { text: "Happiness ________ doing good and helping others, according to the passage.", options: ["A. comes", "B. springs from", "C. goes from", "D. looks from"], correct: "B", note: "🔍 考点笔记：spring from 源自于（课文原句）。A.comes from 也表来自，但原文用springs from；C.goes from 离开；D.looks from 从……看。最佳答案为B。" },
        { text: "My mother made me ________ the room, and I felt happy to help.", options: ["A. clean", "B. to clean", "C. cleaning", "D. cleaned"], correct: "A", note: "🔍 考点笔记：make sb. do sth. 让某人做某事。A.clean 动词原形正确；B.to clean 不定式错误；C.cleaning 动名词错误；D.cleaned 过去分词错误。" },
        { text: "The story was so ________ that everyone was deeply ________.", options: ["A. moving; moved", "B. moved; moving", "C. moving; moving", "D. moved; moved"], correct: "A", note: "🔍 考点笔记：-ing形容词修饰物，-ed形容词修饰人。A.moving(令人感动)修饰故事；moved(感动)修饰人，正确。B、C、D搭配错误。" },
        { text: "He decided ________ a volunteer to help the old people.", options: ["A. become", "B. becoming", "C. to become", "D. became"], correct: "C", note: "🔍 考点笔记：decide to do sth. 决定做某事。A.become原形；B.becoming动名词；C.to become不定式正确；D.became过去式。" },
        { text: "The whole family joined ________ the game and had great fun.", options: ["A. in", "B. to", "C. at", "D. for"], correct: "A", note: "🔍 考点笔记：join in 参加活动。A.in 正确；B.to 搭配错误；C.at 地点；D.for 为了。" },
        { text: "I have a stomachache, so I have to ________ a rest.", options: ["A. take", "B. make", "C. do", "D. put"], correct: "A", note: "🔍 考点笔记：take a rest 休息。A.take 正确；B.make 制作；C.do 做；D.put 放。" },
        { text: "Neither of the twins ________ playing chess with their grandfather.", options: ["A. enjoy", "B. enjoys", "C. enjoying", "D. are enjoy"], correct: "B", note: "🔍 考点笔记：neither of + 复数名词，谓语用单数。A.enjoy 复数错误；B.enjoys 单数正确；C.enjoying 分词不能作谓语；D.are enjoy 结构错误。" }
    ];

    // ---------- 2. 完形填空 (8空) 基于Understanding ideas 考点笔记化 ----------
    const clozeOptions = [
        { text: "The freezing wind ________ the floor all night long.", options: ["A. went over", "B. swept across", "C. put down", "D. looked over"], correct: "B", note: "🔍 考点笔记：swept across 横扫（课文原文）。A.went over复习；B.swept across正确；C.put down放下；D.looked over检查。" },
        { text: "But to my ________, the family were happy together.", options: ["A. joy", "B. surprise", "C. sadness", "D. anger"], correct: "B", note: "🔍 考点笔记：to one's surprise 令人惊讶的是。A.joy快乐；B.surprise惊讶正确；C.sadness悲伤；D.anger愤怒。" },
        { text: "We ________ fun talking and laughing.", options: ["A. had", "B. took", "C. made", "D. did"], correct: "A", note: "🔍 考点笔记：have fun 玩得开心。A.had正确；B.took fun 无此搭配；C.made fun取笑；D.did fun错误。" },
        { text: "Those words ________ me greatly.", options: ["A. beat", "B. touched", "C. hit", "D. moved"], correct: "B", note: "🔍 考点笔记：touch sb. greatly 深深感动某人。A.beat打败；B.touched感动正确；C.hit撞击；D.moved也可表感动，但课文原词为touched，侧重触动力。" },
        { text: "I kept ________ them in my mind.", options: ["A. go over", "B. going over", "C. to go over", "D. went over"], correct: "B", note: "🔍 考点笔记：keep doing sth. 一直做某事。A.go over原形；B.going over正确；C.to go over不定式；D.went over过去式。" },
        { text: "I realized the key ________ happiness is not money.", options: ["A. of", "B. to", "C. for", "D. with"], correct: "B", note: "🔍 考点笔记：the key to ... ……的关键。A.of表所属；B.to正确；C.for为了；D.with伴随。" },
        { text: "I decided to ________ a volunteer group to help the homeless.", options: ["A. join", "B. join in", "C. take part", "D. attend"], correct: "B", note: "🔍 考点笔记：join in 参加活动/团体。A.join 加入组织（如军队）；B.join in正确；C.take part缺少in；D.attend出席（会议）。" },
        { text: "we grow old because we stop ________.", options: ["A. play", "B. to play", "C. playing", "D. played"], correct: "C", note: "🔍 考点笔记：stop doing sth. 停止做某事。A.play原形；B.to play不定式；C.playing正确；D.played过去分词。" }
    ];

    // ---------- 3. 短文填空 (Developing ideas拓展，考点笔记) ----------
    const shortPassages = [
        { text: "Zhou Jian kept his hair long for over two years. Finally he took ________ his hat and his hair fell.", options: ["A. off", "B. out", "C. away", "D. in"], correct: "A", note: "🔍 考点笔记：take off 脱下。A.off正确；B.out取出；C.away拿走；D.in吸收。" },
        { text: "He looked at the mirror and said to ________, “It's time to grow happiness again.”", options: ["A. him", "B. himself", "C. his", "D. he"], correct: "B", note: "🔍 考点笔记：say to oneself 自言自语。A.him他；B.himself反身代词正确；C.his他的；D.he主格。" },
        { text: "The glass is half full or half ________? Your answer shows your attitude.", options: ["A. full", "B. empty", "C. hollow", "D. blank"], correct: "B", note: "🔍 考点笔记：half empty 半空（与half full相对）。A.full满；B.empty正确；C.hollow中空；D.blank空白。" },
        { text: "Thank you ________ helping kids with cancer. Your kindness matters.", options: ["A. of", "B. for", "C. to", "D. with"], correct: "B", note: "🔍 考点笔记：thank you for doing sth. 因……感谢。A.of；B.for正确；C.to；D.with。" },
        { text: "Happiness ________ from doing good and helping others, just like Zhou Jian’s story.", options: ["A. spring", "B. springs", "C. sprang", "D. is springing"], correct: "B", note: "🔍 考点笔记：springs from 一般现在时三单表真理。A.spring原形；B.springs正确；C.sprang过去式；D.is springing进行时。" },
        { text: "We should always look on the ________ side of life and never give up.", options: ["A. bright", "B. dark", "C. sad", "D. bad"], correct: "A", note: "🔍 考点笔记：the bright side of life 生活的光明面。A.bright正确；B.dark黑暗；C.sad悲伤；D.bad坏。" },
        { text: "When in China, do as the Chinese do. This idea ________ from an old saying.", options: ["A. comes", "B. springs", "C. both A and B", "D. goes"], correct: "C", note: "🔍 考点笔记：comes from / springs from 均可表示源自。A.comes正确；B.springs正确；C.both正确；D.goes错误。" },
        { text: "He smiled and said, “I'm proud to ________ happiness to others.”", options: ["A. bring", "B. take", "C. carry", "D. fetch"], correct: "A", note: "🔍 考点笔记：bring happiness 带来幸福（朝向说话者）。A.bring正确；B.take带走；C.carry搬运；D.fetch去取回。" }
    ];

    // 构建总题目列表
    let allQuestions = [];
    mixedChoice.forEach((item, idx) => {
        allQuestions.push({ id: `mix_${idx}`, type: "📖 短语·语法融合", text: item.text, options: item.options, correct: item.correct, note: item.note });
    });
    clozeOptions.forEach((item, idx) => {
        allQuestions.push({ id: `cloze_${idx}`, type: "📝 完形填空 (课文情节)", text: item.text, options: item.options, correct: item.correct, note: item.note });
    });
    shortPassages.forEach((item, idx) => {
        allQuestions.push({ id: `short_${idx}`, type: "✍️ 短文填空 (Developing ideas)", text: item.text, options: item.options, correct: item.correct, note: item.note });
    });

    const TOTAL = allQuestions.length; // 28
    let userAnswers = new Array(TOTAL).fill(null);
    let locked = new Array(TOTAL).fill(false);
    let feedbackArr = new Array(TOTAL).fill(null);

    function updateStatsAndRender() {
        let answeredCount = userAnswers.filter(a => a !== null).length;
        let correctCount = 0;
        for (let i = 0; i < TOTAL; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === allQuestions[i].correct) correctCount++;
        }
        let percent = answeredCount === 0 ? 0 : Math.round((correctCount / answeredCount) * 100);
        document.getElementById('progressCounter').innerText = `已完成 ${answeredCount} / ${TOTAL}`;
        document.getElementById('accuracyDisplay').innerHTML = `正确率: ${answeredCount === 0 ? '--' : percent + '%'}`;
        renderAllSections();
    }

    function renderAllSections() {
        const root = document.getElementById('quizRoot');
        if (!root) return;
        const groups = {
            "📖 短语·语法融合": [],
            "📝 完形填空 (课文情节)": [],
            "✍️ 短文填空 (Developing ideas)": []
        };
        allQuestions.forEach((q, idx) => {
            let typeKey = q.type;
            if (groups[typeKey]) groups[typeKey].push({ ...q, originalIndex: idx });
            else if (typeKey.includes("完形填空")) groups["📝 完形填空 (课文情节)"].push({ ...q, originalIndex: idx });
            else if (typeKey.includes("短文填空")) groups["✍️ 短文填空 (Developing ideas)"].push({ ...q, originalIndex: idx });
            else groups["📖 短语·语法融合"].push({ ...q, originalIndex: idx });
        });
        let html = '';
        for (let [sectionName, items] of Object.entries(groups)) {
            if (!items.length) continue;
            html += `<div class="section-card"><div class="section-title">${sectionName} (${items.length}题)</div>`;
            for (let item of items) {
                const idx = item.originalIndex;
                const selected = userAnswers[idx];
                const isLocked = locked[idx];
                const fb = feedbackArr[idx];
                const isCorrectAnswer = (selected === item.correct);
                html += `<div class="question-item">
                            <div class="question-text">${item.text}</div>
                            <div class="options" id="options-${idx}">`;
                item.options.forEach(opt => {
                    const optLetter = opt.charAt(0);
                    const isSelected = (selected === optLetter);
                    let disabledAttr = isLocked ? 'disabled' : '';
                    let extraStyle = (isSelected && isLocked) ? 'style="background:#c8e6c9; border-color:#2e7d32;"' : '';
                    html += `<button class="option-btn" data-idx="${idx}" data-val="${optLetter}" ${disabledAttr} ${extraStyle}>${opt}</button>`;
                });
                html += `</div><div class="feedback ${fb ? (fb.correctFlag ? 'correct' : 'wrong') : ''}" id="fb-${idx}">`;
                if (fb) {
                    // 显示正确选项 + 考点笔记（包含所有选项的辨析）
                    html += `<div class="correct-answer-badge">✔️ 正确答案：${item.correct}</div>`;
                    html += `<div><strong>📘 考点笔记</strong><br>${item.note}</div>`;
                    html += `<div style="margin-top:6px; font-size:0.8rem;">${fb.correctFlag ? '✅ 你的回答正确' : '❌ 你的回答错误'}</div>`;
                } else {
                    html += `<div style="opacity:0.8;">✨ 点击选项后，将显示正确答案及完整考点笔记（含所有选项辨析）。</div>`;
                }
                html += `</div></div>`;
            }
            let answeredInSec = 0, correctInSec = 0;
            items.forEach(it => {
                const ans = userAnswers[it.originalIndex];
                if (ans !== null) {
                    answeredInSec++;
                    if (ans === allQuestions[it.originalIndex].correct) correctInSec++;
                }
            });
            let secRate = answeredInSec === 0 ? '暂无' : `${Math.round((correctInSec/answeredInSec)*100)}%`;
            html += `<div class="section-footer">📊 本区正确率：${secRate} (${correctInSec}/${answeredInSec})</div></div>`;
        }
        root.innerHTML = html;
        for (let i = 0; i < TOTAL; i++) {
            const btns = document.querySelectorAll(`.option-btn[data-idx="${i}"]`);
            btns.forEach(btn => {
                btn.removeEventListener('click', handler);
                btn.addEventListener('click', handler);
            });
        }
    }

    function handler(e) {
        const btn = e.currentTarget;
        const idx = parseInt(btn.getAttribute('data-idx'));
        if (locked[idx]) return;
        const selectedVal = btn.getAttribute('data-val');
        const question = allQuestions[idx];
        const isCorrect = (selectedVal === question.correct);
        userAnswers[idx] = selectedVal;
        locked[idx] = true;
        feedbackArr[idx] = { correctFlag: isCorrect };
        updateStatsAndRender();
        const fbDiv = document.getElementById(`fb-${idx}`);
        if (fbDiv) fbDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function downloadReport() {
        let report = "【赢未来国雅·即学即练】学习报告 (Unit 1 幸福秘诀·考点笔记版)\n";
        report += `生成时间: ${new Date().toLocaleString()}\n`;
        report += `单元：外研七下 Unit 1 The secrets of happiness\n`;
        report += `总题数: ${TOTAL}\n`;
        let answered = userAnswers.filter(a => a !== null).length;
        let correct = 0;
        for (let i=0;i<TOTAL;i++) if(userAnswers[i] && userAnswers[i] === allQuestions[i].correct) correct++;
        let percentTotal = answered===0?0:Math.round((correct/answered)*100);
        report += `完成数量: ${answered} / ${TOTAL}\n`;
        report += `正确率: ${percentTotal}%\n`;
        report += `========================================\n\n`;
        for (let i=0;i<TOTAL;i++) {
            const q = allQuestions[i];
            const userAns = userAnswers[i] || "未作答";
            const correctAns = q.correct;
            const isRight = (userAns === correctAns);
            report += `【${i+1}】${q.type}\n`;
            report += `题目: ${q.text}\n`;
            report += `我的答案: ${userAns}\n`;
            report += `正确答案: ${correctAns}\n`;
            report += `考点笔记(选项全解): ${q.note}\n`;
            report += `结果: ${isRight ? "✓ 正确" : "✗ 错误"}\n`;
            report += `----------------------------------------\n`;
        }
        const blob = new Blob([report], {type: "text/plain;charset=utf-8"});
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = "英语U1_幸福秘诀_考点笔记报告.txt";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function addDownloadButton() {
        const container = document.getElementById('downloadBtnContainer');
        container.innerHTML = '';
        const btn = document.createElement('button');
        btn.className = 'download-btn';
        btn.innerText = '📥 下载学习报告 (含考点笔记)';
        btn.addEventListener('click', downloadReport);
        container.appendChild(btn);
    }

    function init() {
        addDownloadButton();
        updateStatsAndRender();
    }
    init();
</script>
</body>
</html>

name: Generate Directory Listing

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 用 PHP 脚本生成目录列表（GitHub Actions 自带 PHP）
      - name: Generate index.html
        run: |
          echo '<!DOCTYPE html>
          <html>
          <head>
              <title>复习资料列表</title>
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <style>
                  body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
                  h1 { color: #333; }
                  ul { list-style: none; padding: 0; }
                  li { margin: 10px 0; padding: 8px; background: #f5f5f5; border-radius: 5px; }
                  a { text-decoration: none; color: #0366d6; font-size: 18px; }
                  a:hover { text-decoration: underline; }
                  .file-icon { margin-right: 10px; }
              </style>
          </head>
          <body>
              <h1>📚 学生复习资料</h1>
              <p>点击文件名开始复习：</p>
              <ul>' > index.html
          
          # 遍历所有 .html 文件，生成链接
          for file in *.html; do
              if [ "$file" != "index.html" ]; then
                  filename=$(basename "$file" .html)
                  echo "<li><a href=\"$file\">📄 $filename</a></li>" >> index.html
              fi
          done
          
          echo '</ul></body></html>' >> index.html

      # 提交生成的 index.html 到仓库
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generate directory listing"
          git push

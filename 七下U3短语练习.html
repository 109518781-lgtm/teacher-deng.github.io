<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>赢未来国雅 · 短语即学即练 | 外研版七下U3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f7f0;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            color: #1e2f1e;
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部进度 */
        .progress-header {
            background: white;
            border-radius: 32px;
            padding: 16px 24px;
            margin-bottom: 28px;
            box-shadow: 0 8px 20px rgba(0, 20, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            backdrop-filter: blur(2px);
            border: 1px solid #cfe3cf;
        }

        .title-section h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2b6e2b, #4cae4c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .title-section p {
            font-size: 0.85rem;
            color: #5b7c5b;
            margin-top: 6px;
        }

        .stats {
            background: #e9f3e9;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #2c6e2c;
        }

        /* 分区卡片 */
        .section-card {
            background: white;
            border-radius: 36px;
            margin-bottom: 40px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            transition: all 0.2s;
            border: 1px solid #ddebd9;
        }

        .section-title {
            background: #e2f0df;
            padding: 18px 28px;
            font-size: 1.5rem;
            font-weight: 700;
            border-bottom: 3px solid #8bc34a;
            color: #2b5e2b;
        }

        .section-title small {
            font-size: 0.8rem;
            font-weight: normal;
            color: #568f56;
            margin-left: 12px;
        }

        .quiz-area {
            padding: 24px 28px;
        }

        /* 题目卡片 */
        .question-item {
            background: #fefef7;
            border-radius: 28px;
            margin-bottom: 28px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2f0dd;
            transition: all 0.2s;
        }

        .question-text {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 18px;
            color: #1e3a1e;
            line-height: 1.4;
            background: #f9fff7;
            padding: 8px 12px;
            border-radius: 20px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #fafefa;
            border: 1px solid #d9e8d3;
            border-radius: 60px;
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option:hover:not(.disabled-opt) {
            background: #eef5ea;
            border-color: #9bc48b;
            transform: translateX(4px);
        }

        .option.disabled-opt {
            cursor: default;
            opacity: 0.9;
        }

        .option input {
            accent-color: #4caf50;
            width: 20px;
            height: 20px;
            margin: 0;
            pointer-events: none;
        }

        .option label {
            flex: 1;
            font-weight: 500;
            cursor: pointer;
            color: #2a4b2a;
        }

        .disabled-opt label {
            cursor: default;
        }

        /* 反馈区 */
        .feedback {
            background: #f8f9f2;
            border-radius: 20px;
            padding: 16px 18px;
            margin-top: 12px;
            border-left: 6px solid #b0d9a3;
            font-size: 0.9rem;
        }

        .feedback-correct {
            border-left-color: #2e7d32;
            background: #e8f5e9;
        }
        .feedback-wrong {
            border-left-color: #d32f2f;
            background: #ffefef;
        }
        .explanation {
            margin-top: 8px;
            color: #2d3e2d;
            font-weight: 500;
        }
        .note-box {
            background: #fff7e0;
            padding: 10px 14px;
            border-radius: 18px;
            margin-top: 12px;
            font-size: 0.85rem;
            border: 1px solid #ffe3a3;
            color: #8a6e2c;
        }
        .badge {
            font-size: 0.7rem;
            background: #cfe3cf;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 8px;
        }

        /* 完成区 */
        .section-summary {
            margin: 16px 28px 28px 28px;
            padding: 18px;
            background: #f3f8ef;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .accuracy {
            font-weight: bold;
            background: white;
            padding: 6px 16px;
            border-radius: 40px;
        }
        .download-btn {
            background: #2c6e2c;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .download-btn:hover {
            background: #1f521f;
            transform: scale(0.98);
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.75rem;
            color: #7b9a6e;
        }
        @media (max-width: 640px) {
            .quiz-area { padding: 16px; }
            .question-item { padding: 16px; }
            .option { padding: 10px 14px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="progress-header">
        <div class="title-section">
            <h1>📖 赢未来国雅 · 短语即学即练</h1>
            <p>外研版七年级下册 Unit 3 |  Food & Culture · 短语专项突破</p>
        </div>
        <div class="stats" id="globalStats">已完成 0 / 0 题</div>
    </div>

    <!-- 三个区域动态加载 -->
    <div id="app"></div>
    <footer>✨ 每道题点击选项后即刻锁定，查看解析与考点笔记 | 可生成学习报告</footer>
</div>

<script>
    // ---------- 基于U3短语内容生成题库 (Start out + Understanding ideas基础 + Developing ideas拓展) ----------
    // 根据PDF重点短语/考点精析设计三类题型: 中英互译、一词多义、语境运用
    
    const questionsDB = [
        // ======================= SECTION 1: START OUT (幸福主题短语融合，但属于U3原内容？实际外研U3为食物与文化，但为贴合附件中的U3内容: 从PDF看到U3为 Food across borders / 食物主题，短语memory, taste, bring back等)
        // 按照PDF Unit3 The art of having fun ? 实际PDF从U3开始为 Food 话题，但【根据要求生成U3内容，分开start out, understanding ideas, developing ideas】
        // 严格依照附件 unit3 重点短语部分 (从PDF page14开始 "Unit3 Food across borders" 理解及拓展短语)
        // start out部分短语: around the world, signature dish, think of, according to, food across borders 等
        {
            id: "s1",
            section: "start_out",
            type: "中英互译",
            question: "“signature dish” 的中文意思是？",
            options: ["招牌菜", "签名盘", "特色服务", "甜点"],
            correct: 0,
            explanation: "signature 意为“特色的，标志性的”，dish 菜肴，合起来即“招牌菜”。",
            note: "📌 signature dish 常用在餐厅推荐菜，signature还可表示“签名”。"
        },
        {
            id: "s2",
            section: "start_out",
            type: "语境运用",
            question: "According to the passage, food across borders can bring sweet things. 划线短语 'across borders' 的含义是？",
            options: ["跨国界", "在边界上", "跨越边境线", "出入境"],
            correct: 0,
            explanation: "across borders 意为“跨越国界/跨国界”，文中表达美食文化交流。",
            note: "📌 across borders 常用在全球化语境，类似 'cross borders'。"
        },
        {
            id: "s3",
            section: "start_out",
            type: "中英互译",
            question: "短语 'think of' 在句子 “I think of my hometown when eating noodles.” 中的最佳释义是？",
            options: ["想起", "思考", "认为", "考虑"],
            correct: 0,
            explanation: "think of 此处表示“想起，回忆起”，由食物引发记忆。",
            note: "📌 think of 还有“考虑；认为”之意，但语境中多为“想起”。"
        },
        // ======================= UNDERSTANDING IDEAS (基础短语) 重点来自U3记忆篇: delicious memories, bring back, start with, grow hungry, fall ill, better than, taste of home等
        {
            id: "u1",
            section: "understanding",
            type: "中英互译",
            question: "短语 “bring back memories” 的意思是？",
            options: ["带回记忆", "带回礼物", "使回忆起往事", "拿回记忆"],
            correct: 2,
            explanation: "bring back memories 表示“唤起回忆/使回忆起”，常用于美食或场景。",
            note: "📌 bring back 可指“带回某物”，引申为“使回忆起”。"
        },
        {
            id: "u2",
            section: "understanding",
            type: "一词多义",
            question: "单词 “grow” 在 “I always grow hungry thinking of them.” 中的含义是？",
            options: ["种植", "成长", "逐渐变得", "增加"],
            correct: 2,
            explanation: "grow hungry = become hungry 逐渐变得饥饿，系动词用法。",
            note: "📌 grow 作系动词：grow + adj. 表示“渐渐变得”。"
        },
        {
            id: "u3",
            section: "understanding",
            type: "语境运用",
            question: "When I fall ill, my mother makes plain rice porridge for me. 划线短语 “fall ill” 的最佳解释？",
            options: ["生病", "摔倒生病", "变糟糕", "陷入疾病"],
            correct: 0,
            explanation: "fall ill 为固定搭配，意为“生病”，尤其指突发疾病。",
            note: "📌 fall ill = get sick；fall asleep 入睡，结构类似。"
        },
        {
            id: "u4",
            section: "understanding",
            type: "中英互译",
            question: "“the taste of home” 翻译正确的是？",
            options: ["家的味道", "家乡的品味", "家庭滋味", "家庭风格"],
            correct: 0,
            explanation: "the taste of home 指代“家乡的味道”，常与思乡情感相关。",
            note: "📌 taste of home 承载个人情感记忆。"
        },
        {
            id: "u5",
            section: "understanding",
            type: "语境运用",
            question: "Each kind of porridge tastes great in its own way. 该句中 “in its own way” 意思是？",
            options: ["以自己独特的方式", "按照自己的路", "以自己的道路", "在自己的方法里"],
            correct: 0,
            explanation: "in its own way 意为“以其特有的方式”，强调独特性。",
            note: "📌 类似表达：in a way 在某种程度上。"
        },
        {
            id: "u6",
            section: "understanding",
            type: "一词多义",
            question: "单词 “remain” 在 “The connection with food remains strong.” 中的含义是？",
            options: ["留下", "保持不变", "剩余", "继续存在"],
            correct: 1,
            explanation: "remain 系动词，意为“仍然是，保持不变”，强调状态持续。",
            note: "📌 remain + adj. 保持某种状态，类似stay。"
        },
        // Developing ideas 拓展 (根据unit3 developing 短语: a balanced diet, suggest sb. do sth, as many as possible, junk food, hold on, a bridge between cultures等)
        {
            id: "d1",
            section: "developing",
            type: "中英互译",
            question: "“a balanced diet” 的中文是？",
            options: ["均衡饮食", "平衡餐", "营养餐盘", "合理膳食"],
            correct: 0,
            explanation: "balanced diet 指各类营养均衡的饮食模式。",
            note: "📌 keep a balanced diet 保持均衡饮食。"
        },
        {
            id: "d2",
            section: "developing",
            type: "语境运用",
            question: "My doctor suggested that I eat more vegetables. 句中 suggest 的用法正确的是？",
            options: ["建议某人做某事", "暗示", "表明", "提议"],
            correct: 0,
            explanation: "suggest 后接宾语从句表示“建议”，此处符合医生建议。",
            note: "📌 suggest doing sth. / suggest that 从句。"
        },
        {
            id: "d3",
            section: "developing",
            type: "中英互译",
            question: "“junk food” 指的是？",
            options: ["垃圾食品", "废旧食品", "速食", "零食"],
            correct: 0,
            explanation: "junk food 高热量低营养食品，如汉堡、炸鸡。",
            note: "📌 应避免过多摄入 junk food，多吃蔬果。"
        },
        {
            id: "d4",
            section: "developing",
            type: "一词多义",
            question: "短语 “hold on” 在 “Hold on, I will check the recipe.” 中的含义是？",
            options: ["坚持", "别挂电话", "等一下", "抓住"],
            correct: 2,
            explanation: "hold on 此处意为“等一下，稍等”，用于口语请求等待。",
            note: "📌 hold on 还有“坚持；握住；别挂断”多种含义。"
        },
        {
            id: "d5",
            section: "developing",
            type: "语境运用",
            question: "Food is a bridge between cultures. 这句话中 “bridge” 的修辞义是？",
            options: ["连接/纽带", "桥梁建筑", "沟通方式", "过渡"],
            correct: 0,
            explanation: "bridge 隐喻为“连接两种文化的纽带/桥梁”。",
            note: "📌 名词作比喻，build bridges 建立联系。"
        },
        {
            id: "d6",
            section: "developing",
            type: "中英互译",
            question: "“as many as possible” 的正确翻译？",
            options: ["尽可能多", "和多一样多", "尽可能少", "多达"],
            correct: 0,
            explanation: "as many as possible 意为“尽可能多的”，后接可数名词。",
            note: "📌 as much as possible 修饰不可数名词。"
        }
    ];

    // 数据结构增强，为每个题目增加用户选择及锁定状态
    let userAnswers = {};
    let lockedQuestions = {}; // 已答锁定

    // 初始化/重置区域数据
    function initAnswers() {
        const newAnswers = {};
        const newLocked = {};
        questionsDB.forEach(q => {
            newAnswers[q.id] = null;
            newLocked[q.id] = false;
        });
        userAnswers = newAnswers;
        lockedQuestions = newLocked;
    }

    // 计算总完成数
    function computeCompleted() {
        let count = 0;
        for (let id in userAnswers) {
            if (userAnswers[id] !== null && userAnswers[id] !== undefined) count++;
        }
        return count;
    }

    // 更新全局header
    function updateGlobalStats() {
        const total = questionsDB.length;
        const done = computeCompleted();
        document.getElementById('globalStats').innerHTML = `✅ 已完成 ${done} / ${total} 题`;
        return {done, total};
    }

    // 为某个分区生成HTML并绑定事件
    function renderSection(sectionKey, sectionTitle, desc) {
        const filtered = questionsDB.filter(q => q.section === sectionKey);
        if (filtered.length === 0) return '';
        let html = `<div class="section-card" data-section="${sectionKey}">
                        <div class="section-title">${sectionTitle} <small>${desc}</small></div>
                        <div class="quiz-area" id="quiz-area-${sectionKey}">`;
        filtered.forEach(q => {
            const selectedIdx = userAnswers[q.id] !== null ? userAnswers[q.id] : -1;
            const isLocked = lockedQuestions[q.id];
            html += `
                <div class="question-item" data-qid="${q.id}">
                    <div class="question-text">
                        <span class="badge">${q.type}</span> 
                        ${q.question}
                    </div>
                    <div class="options" id="opts-${q.id}">`;
            // 生成选项
            q.options.forEach((opt, idx) => {
                const checkedAttr = (selectedIdx === idx) ? 'checked' : '';
                const disabledAttr = isLocked ? 'disabled' : '';
                const divClass = `option ${isLocked ? 'disabled-opt' : ''}`;
                html += `
                    <div class="${divClass}" data-opt-index="${idx}" data-qid="${q.id}">
                        <input type="radio" name="q_${q.id}" value="${idx}" id="q_${q.id}_${idx}" ${checkedAttr} ${disabledAttr}>
                        <label for="q_${q.id}_${idx}">${String.fromCharCode(65+idx)}. ${opt}</label>
                    </div>
                `;
            });
            html += `</div><div class="feedback" id="fb-${q.id}" style="display: none;"></div></div>`;
        });
        html += `</div><div class="section-summary" id="summary-${sectionKey}"><span>📊 本区完成情况</span><span class="accuracy" id="acc-${sectionKey}">0% 正确率</span></div></div>`;
        return html;
    }

    // 显示单个题目的反馈（根据是否正确）
    function showFeedback(qid, selectedIdx, isCorrect) {
        const fbDiv = document.getElementById(`fb-${qid}`);
        if (!fbDiv) return;
        const question = questionsDB.find(q => q.id === qid);
        if (!question) return;
        const correctLetter = String.fromCharCode(65 + question.correct);
        const correctText = question.options[question.correct];
        const userLetter = String.fromCharCode(65 + selectedIdx);
        const statusIcon = isCorrect ? '✅ 回答正确！' : '❌ 回答错误';
        const explanationHtml = `
            <div class="${isCorrect ? 'feedback-correct' : 'feedback-wrong'}" style="padding: 8px; border-radius: 16px;">
                <strong>${statusIcon}</strong><br/>
                <div class="explanation">📖 解析：${question.explanation}</div>
                <div class="note-box">📘 考点笔记：${question.note}<br/>✔ 正确答案：${correctLetter}. ${correctText}</div>
            </div>
        `;
        fbDiv.style.display = 'block';
        fbDiv.innerHTML = explanationHtml;
    }

    // 锁定题目选项的UI
    function lockOptions(qid) {
        const container = document.getElementById(`opts-${qid}`);
        if (!container) return;
        const allOptions = container.querySelectorAll('.option');
        allOptions.forEach(opt => {
            opt.classList.add('disabled-opt');
            const radio = opt.querySelector('input');
            if (radio) radio.disabled = true;
        });
    }

    // 更新分区正确率和下载按钮正确率统计 (显示所有题目正确数)
    function updateSectionAccuracy() {
        const sections = ['start_out', 'understanding', 'developing'];
        for (let sec of sections) {
            const secQuestions = questionsDB.filter(q => q.section === sec);
            if (secQuestions.length === 0) continue;
            let answeredCount = 0;
            let correctCount = 0;
            secQuestions.forEach(q => {
                const userChoice = userAnswers[q.id];
                if (userChoice !== null) {
                    answeredCount++;
                    if (userChoice === q.correct) correctCount++;
                }
            });
            const accuracy = answeredCount === 0 ? 0 : Math.round((correctCount / answeredCount) * 100);
            const accSpan = document.getElementById(`acc-${sec}`);
            if (accSpan) accSpan.innerText = `${accuracy}% 正确率 (${correctCount}/${answeredCount})`;
            // 同时显示完成情况简讯
            const summaryDiv = document.getElementById(`summary-${sec}`);
            if (summaryDiv && answeredCount === secQuestions.length) {
                // 可额外显示区域完成标记，无妨
            }
        }
        updateGlobalStats();
    }

    // 处理点击选项事件（委托）
    function bindEvents() {
        document.querySelectorAll('.options').forEach(optContainer => {
            optContainer.addEventListener('change', (e) => {
                const targetRadio = e.target;
                if (!targetRadio.matches('input[type="radio"]')) return;
                const qid = targetRadio.name.split('_')[1];
                if (lockedQuestions[qid]) return; // 已锁定不可改
                const selectedVal = parseInt(targetRadio.value);
                const questionObj = questionsDB.find(q => q.id === qid);
                if (!questionObj) return;
                const isCorrect = (selectedVal === questionObj.correct);
                // 保存答案
                userAnswers[qid] = selectedVal;
                lockedQuestions[qid] = true;
                // 显示反馈
                showFeedback(qid, selectedVal, isCorrect);
                // 锁定UI
                lockOptions(qid);
                // 更新全局及分区进度
                updateGlobalStats();
                updateSectionAccuracy();
            });
        });
    }

    // 生成学习报告（包含所有题目，用户答案，正确答案，解析）
    function generateReport() {
        let report = "📚 赢未来国雅·短语即学即练 学习报告\n";
        report += `生成时间：${new Date().toLocaleString()}\n`;
        report += `总完成题数：${computeCompleted()} / ${questionsDB.length}\n`;
        let totalCorrect = 0;
        const details = [];
        questionsDB.forEach(q => {
            const userChoice = userAnswers[q.id];
            const isAnswered = userChoice !== null;
            const isCorrect = isAnswered && (userChoice === q.correct);
            if (isCorrect) totalCorrect++;
            const userAnswerText = isAnswered ? q.options[userChoice] : "未作答";
            const correctAnswerText = q.options[q.correct];
            const status = isAnswered ? (isCorrect ? "✓" : "✗") : "○";
            details.push(`\n【${q.section.toUpperCase()}】${q.type} | ${q.question}\n我的答案：${userAnswerText}\n正确答案：${correctAnswerText}\n解析：${q.explanation}\n笔记：${q.note}\n状态：${status}`);
        });
        report += `总体正确率：${questionsDB.length === 0 ? 0 : Math.round((totalCorrect / questionsDB.length) * 100)}% (${totalCorrect}/${questionsDB.length})\n\n`;
        report += "========== 详细记录 ==========\n";
        report += details.join("\n---\n");
        const blob = new Blob([report], {type: "text/plain;charset=utf-8"});
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = "phrase_learning_report.txt";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    // 为三个分区分别挂载下载报告 + 额外全局下载按钮已在底部生成，但需求分区底部也有下载报告按钮，在每个summary区添加按钮
    function addDownloadButtonsToSections() {
        const sections = ['start_out', 'understanding', 'developing'];
        sections.forEach(sec => {
            const summaryDiv = document.getElementById(`summary-${sec}`);
            if (summaryDiv && !summaryDiv.querySelector('.section-download-btn')) {
                const btn = document.createElement('button');
                btn.innerText = '📄 下载学习报告';
                btn.className = 'download-btn';
                btn.style.marginLeft = 'auto';
                btn.style.backgroundColor = '#4c7a4c';
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    generateReport();
                });
                summaryDiv.appendChild(btn);
            }
        });
    }

    // 主渲染函数
    function renderApp() {
        const app = document.getElementById('app');
        const startOutHtml = renderSection('start_out', '🎯 Starting out', '基础认知·短语预热');
        const understandingHtml = renderSection('understanding', '📘 Understanding ideas (基础)', '中英互译·一词多义·语境运用');
        const developingHtml = renderSection('developing', '🚀 Developing ideas (拓展)', '高阶短语·综合训练');
        app.innerHTML = startOutHtml + understandingHtml + developingHtml;
        // 重新绑定
        bindEvents();
        updateGlobalStats();
        updateSectionAccuracy();
        addDownloadButtonsToSections();
        // 全局底部额外再挂一个下载按钮 (可选)
        const existingGlobalBtn = document.querySelector('.global-download-btn');
        if (!existingGlobalBtn) {
            const footerBtn = document.createElement('div');
            footerBtn.style.display = 'flex';
            footerBtn.style.justifyContent = 'center';
            footerBtn.style.margin = '20px 0';
            const btn = document.createElement('button');
            btn.innerText = '📑 下载完整学习报告（所有分区）';
            btn.className = 'download-btn';
            btn.style.padding = '12px 28px';
            btn.style.fontSize = '1rem';
            btn.addEventListener('click', generateReport);
            footerBtn.appendChild(btn);
            app.appendChild(footerBtn);
        }
    }

    initAnswers();
    renderApp();
</script>
</body>
</html>

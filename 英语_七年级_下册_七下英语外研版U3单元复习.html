<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5fbf7;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;

            max-width: 1280px;

        }
        .hero {

        .hero h1 {

        .hero p {

        .meta-info {

        .card {

        }
        .question-text, .cloze-passage, .grammar-text {
            font-size: 1rem;

        .options-list {
            display: flex;

        .option {

        .phrase-item, .sentence-item {

        .phrase-text {

        .phrase-example {

        .sentence-en { font-weight: 600; color: #2f6042; }
        .sentence-zh { color: #a5651e; margin-top: 6px; font-size: 0.85rem; }

        .clickable-word:active { background: #d9f0e4; border-radius: 8px; }
        .word-toast {

        .method-card {

        }

            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #2f6b48;
        }
        .vocab-table, .sentence-table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffffdd;
            border-radius: 24px;

        .vocab-table th, .vocab-table td, .sentence-table th, .sentence-table td {

        .section-title-icon { margin: 20px 0 10px 0; font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .editable-cell { background-color: #fffff2; }
        @media (max-width: 640px) {
            body { padding: 16px 12px; }
            .question-panel { padding: 18px 16px 6px 16px; }
            .feedback-area { margin: 0 12px 16px 12px; }
            .phrase-list, .sentence-list { padding: 8px 16px 16px 16px; }
        }
        footer { text-align: center; font-size: 0.7rem; color: #86a694; margin: 32px 0 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>✨ 赢未来国雅 · 英语练习考点精析 ✨</h1>
        <p>U3单元综合复习 | 点击查词（手机/平板适用）| 答案对比 | 自主复习表</p>
        <div class="meta-info">📌 基础单选 + 语法填空 + 选词 + 完形 · 移动触词版</div>
    </div>
    <div id="questionsRoot"></div>
    <footer>💡 点击选项立即锁定，显示你的答案vs正确答案。<span style="background:#e8f0e3;padding:2px 10px;border-radius:20px;">🔍 点击任意英文单词 → 弹出中文释义</span>，下方表格可自填复习。</footer>
</div>
<div id="wordToast" class="word-toast"></div>

<script>
    const meaningMap = {
        "soup": "汤", "tastes": "尝起来", "bowl": "碗", "well": "好地", "good": "好的", "another": "另一个",
        "suffer": "遭受", "cold": "感冒", "mean": "意思是", "feels": "感觉", "menu": "菜单", "remains": "仍然",
        "symbol": "象征", "smells": "闻起来", "communication": "沟通", "bridge": "桥梁", "add": "添加",
        "salt": "盐", "until": "直到", "diet": "饮食", "mixture": "混合物", "actually": "实际上",
        "traditional": "传统的", "dumplings": "饺子", "vinegar": "醋", "coin": "硬币", "lucky": "幸运的",
        "important": "重要的", "usually": "通常", "vegetables": "蔬菜", "circle": "圈出", "history": "历史",
        "make": "发出", "sound": "声音", "story": "故事", "scholar": "秀才", "hungry": "饥饿的",
        "free": "免费的", "name": "名字", "interesting": "有趣的", "bring": "带来", "luck": "运气",
        "hobby": "爱好", "hope": "希望", "habit": "习惯", "change": "改变", "match": "匹配", "meet": "遇见",
        "beautiful": "美丽的", "lovely": "可爱的", "bad": "坏的", "expensive": "昂贵的", "cheap": "便宜的",
        "nature": "自然", "news": "新闻", "master": "大师", "wants": "想要", "knows": "知道", "tells": "告诉",
        "looks": "看起来", "sounds": "听起来"
    };
    function showWordMeaning(word) {
        const lower = word.toLowerCase();
        let meaning = meaningMap[lower] || meaningMap[word];
        if (!meaning) meaning = "✨ 可自行补充笔记";
        const toast = document.getElementById("wordToast");
        toast.innerText = `${word}  ·  ${meaning}`;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1500);
    }
    function makeWordsClickable(container) {
        if (!container) return;
        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
            acceptNode: (node) => {
                if (node.parentElement?.classList?.contains('clickable-word') || node.parentElement?.closest?.('.option, .disabled-opt, .feedback-area, .result-badge, .answer-compare, .detail-explanation'))
                    return NodeFilter.FILTER_REJECT;
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        const nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(textNode => {
            const text = textNode.nodeValue;
            if (!text?.trim()) return;
            const regex = /\b([A-Za-z][A-Za-z\-']{1,35})\b/g;
            let last = 0, match;
            const frag = document.createDocumentFragment();
            while ((match = regex.exec(text)) !== null) {
                if (match.index > last) frag.appendChild(document.createTextNode(text.substring(last, match.index)));
                const word = match[1];
                const span = document.createElement('span');
                span.className = 'clickable-word';
                span.innerText = word;
                span.addEventListener('click', (e) => { e.stopPropagation(); showWordMeaning(word); });
                frag.appendChild(span);
                last = match.index + match[0].length;
            }
            if (last < text.length) frag.appendChild(document.createTextNode(text.substring(last)));
            if (frag.childNodes.length) textNode.parentNode.replaceChild(frag, textNode);
        });
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

    // 单选题 1-10
    const mc = [
        { id:1, text:"The soup tastes ______. Can I have ______ bowl?", opts:["A well; any","B good; other","C good; another","D well; any other"], correct:"C", exp:"感官动词tastes后接形容词good；another表示‘另一碗’。", note:"感官系动词+adj；another泛指另一个。" },
        { id:2, text:"I can't go to school because I ______ from a bad cold.", opts:["A beat","B suffer","C hurt","D store"], correct:"B", exp:"suffer from 患……病，固定搭配。", note:"suffer from + 疾病" },
        { id:3, text:"Who's that lovely girl? — You ______ the girl with long hair? That's Kate.", opts:["A want","B mean","C know","D tell"], correct:"B", exp:"mean意为‘意思是，指’，用于确认所指对象。", note:"mean v. 意指" },
        { id:4, text:"Do you like swimming in winter? Of course. The water ______ a bit cold at first, but then I am full of energy.", opts:["A tastes","B smells","C feels","D looks"], correct:"C", exp:"水冷是皮肤接触的感觉，feels符合。", note:"feel+adj‘感觉……’" },
        { id:5, text:"What would you like to order, sir? Let me have a look at the ______.", opts:["A chair","B menu","C plate","D bowl"], correct:"B", exp:"点餐需要看菜单menu。", note:"menu菜单" },
        { id:6, text:"Queen Elizabeth II is already 92 years old. Really? She remains so healthy and energetic.", opts:["A is sometimes","B is still","C is never","D is hardly"], correct:"B", exp:"remains同义‘仍然’，替换为is still。", note:"同义替换 remain=still be" },
        { id:7, text:"In China, people believe the dragon is the ______ of good luck and success.", opts:["A picture","B hope","C step","D symbol"], correct:"D", exp:"龙是好运和成功的象征symbol。", note:"cultural symbol" },
        { id:8, text:"What is your mother cooking in the kitchen? Fish, I guess. It ______ nice!", opts:["A looks","B smells","C tastes","D sounds"], correct:"B", exp:"根据猜测‘鱼’闻起来很香。", note:"smells+adj 嗅觉推断" },
        { id:9, text:"Communication is a ______ between the young and the old.", opts:["A pill","B pepper","C bridge","D boat"], correct:"C", exp:"沟通是两代人之间的桥梁bridge。", note:"比喻用法" },
        { id:10, text:"Can you add some salt ______ the soup?", opts:["A in","B to","C on","D with"], correct:"B", exp:"add ... to ... 把……加到……里。", note:"固定搭配add A to B" }
    ];
    // 语法填空/词形变换 11-16
    const grammar = [
        { id:11, text:"You should look after your pet ______ the end.", answer:"until", exp:"until直到", note:"until介词‘直到……为止’" },
        { id:12, text:"We have healthy ______ (diet): vegetables, meat and snacks.", answer:"diets", exp:"diet可数名词，前面无冠词用复数", note:"diet的复数形式" },
        { id:13, text:"Can you read the text and ______ (圈出) the main words?", answer:"circle", exp:"circle动词‘圈出’", note:"动词原形" },
        { id:14, text:"The drink is a ______ (mix) of three different kinds of fruit.", answer:"mixture", exp:"mix的名词形式mixture‘混合物’", note:"a mixture of" },
        { id:15, text:"Miss Li looks very strict, but ______ (actual), she is very nice.", answer:"actually", exp:"actual的副词形式actually‘实际上’", note:"副词修饰整个句子" }
    ];
    // 选词填空语篇（第14/17题部分）
    const clozePassageText = `In China, there are many different kinds of food. Some of them are very popular. A kind of traditional Chinese food is dumplings. Now let's talk about them. There are different kinds of dumplings. Some have meat and vegetables in them, and others have sugar, eggs and so on. I like dumplings with vegetables and pork. People usually make dumplings at home. If you have no time to make them, you can buy some from the supermarkets. People like eating them with vinegar. The Spring Festival is very important in China. When the Spring Festival comes, we make dumplings. We sometimes put a coin in a dumpling. If someone eats the dumpling with the coin in it, he or she will be lucky in the new year. Welcome to China, and you can enjoy our traditional food — dumplings.`;
    // Biangbiang面完形（17题共10空）
    const biangQuestions = [
        { id:"B1", text:"It has a ______ of about 2,000 years.", opts:["A hobby","B history","C hope","D habit"], correct:"B", exp:"2000年的历史，history。", note:"have a history of" },
        { id:"B2", text:"the noodles ______ the sound 'biang'.", opts:["A make","B change","C match","D meet"], correct:"A", exp:"发出声音，make the sound。", note:"make the sound" },
        { id:"B3", text:"there is an interesting story ______ the word 'biang'.", opts:["A with","B under","C about","D after"], correct:"C", exp:"关于……的故事，story about。", note:"about表示关于" },
        { id:"B4", text:"he meets some ______ men on his way", opts:["A beautiful","B lovely","C good","D bad"], correct:"D", exp:"坏人，bad men。", note:"bad坏的" },
        { id:"B5", text:"He is very ______.", opts:["A happy","B hungry","C sad","D afraid"], correct:"B", exp:"饿了想吃面，hungry。", note:"hungry饥饿" },
        { id:"B6", text:"wants to eat a bowl of ______ noodles.", opts:["A free","B expensive","C cheap","D different"], correct:"A", exp:"没钱想吃免费面，free。", note:"free免费的" },
        { id:"B7", text:"There is no ______ for its noodles.", opts:["A nature","B news","C master","D name"], correct:"D", exp:"面条没有名字，name。", note:"name名字" },
        { id:"B8", text:"The shopkeeper thinks the word ______ interesting", opts:["A sounds","B tastes","C smells","D feels"], correct:"A", exp:"听起来有趣，sounds。", note:"sound+adj" },
        { id:"B9", text:"Later, the scholar does ______ in the exam", opts:["A well","B badly","C good","D nice"], correct:"A", exp:"考得好，do well。", note:"do well in" },
        { id:"B10", text:"the noodles can ______ them good luck.", opts:["A take","B bring","C carry","D become"], correct:"B", exp:"带来好运，bring。", note:"bring good luck" }
    ];
    const phraseList = [
        { phrase:"suffer from", meaning:"遭受", example:"suffer from a bad cold" },
        { phrase:"add...to", meaning:"把…加到…", example:"add salt to the soup" },
        { phrase:"a symbol of", meaning:"…的象征", example:"dragon is a symbol of good luck" },
        { phrase:"have a history of", meaning:"有…历史", example:"have a history of 2,000 years" },
        { phrase:"bring good luck", meaning:"带来好运", example:"bring them good luck" },
        { phrase:"do well in", meaning:"在…做得好", example:"do well in the exam" }
    ];
    const longSentences = [
        { sentence:"If someone eats the dumpling with the coin in it, he or she will be lucky in the new year.", trans:"如果某人吃到包有硬币的饺子，他/她新年就会好运。", analysis:"if条件状语从句，主句一般将来时。" },
        { sentence:"When the cook puts the noodles against the chopping board, the noodles make the sound 'biang'.", trans:"当厨师把面条摔在砧板上时，面条发出‘biang’的声音。", analysis:"when时间状语从句。" }
    ];

    const root = document.getElementById("questionsRoot");
    function build() {
        let html = `<div class="card"><div class="question-panel"><div class="question-text">📝 单选题·语法词汇精练 (1-10)</div></div></div>`;
        mc.forEach(q => {
            html += `<div class="card" data-qid="mc_${q.id}" data-correct="${q.correct}" data-exp='${escapeHtml(q.exp)}' data-note='${escapeHtml(q.note)}'><div class="question-panel"><div class="question-text">${q.id}. ${escapeHtml(q.text)}</div><div class="options-list" id="opts_mc_${q.id}">`;
            q.opts.forEach(opt => { let l = opt[0]; html += `<div class="option" data-val="${l}"><div class="option-letter">${l}</div><div class="option-text">${escapeHtml(opt.slice(1).trim())}</div></div>`; });
            html += `</div></div><div class="feedback-area" id="fb_mc_${q.id}" style="display:none;"></div></div>`;
        });
        html += `<div class="card"><div class="question-panel"><div class="question-text">✍️ 语法填空 / 词形变换 (11-15)</div></div></div>`;
        grammar.forEach(g => {
            html += `<div class="card" data-qid="gram_${g.id}" data-correct="${g.answer}" data-exp='${escapeHtml(g.exp)}' data-note='${escapeHtml(g.note)}'><div class="question-panel"><div class="question-text">${g.id}. ${escapeHtml(g.text)}</div><div class="options-list" id="opts_gram_${g.id}"><div class="option" data-val="${g.answer}"><div class="option-letter">📝</div><div class="option-text">点击此处填写答案</div></div></div></div><div class="feedback-area" id="fb_gram_${g.id}" style="display:none;"></div></div>`;
        });
        html += `<div class="card"><div class="question-panel"><div class="question-text">📖 选词填空·饺子文化 (语篇)</div><div class="cloze-passage" id="clozePassage">${escapeHtml(clozePassageText)}</div></div></div>`;
        biangQuestions.forEach((q,idx) => {
            html += `<div class="card" data-qid="biang_${idx}" data-correct="${q.correct}" data-exp='${escapeHtml(q.exp)}' data-note='${escapeHtml(q.note)}'><div class="question-panel"><div class="question-text">${idx+1}. ${escapeHtml(q.text)}</div><div class="options-list" id="opts_biang_${idx}">`;
            q.opts.forEach(opt => { let l = opt[0]; html += `<div class="option" data-val="${l}"><div class="option-letter">${l}</div><div class="option-text">${escapeHtml(opt.slice(1).trim())}</div></div>`; });
            html += `</div></div><div class="feedback-area" id="fb_biang_${idx}" style="display:none;"></div></div>`;
        });
        html += `<div class="card"><div class="analysis-special"><div class="analysis-title">📚 高频搭配 & 核心短语 · 长难句精析</div><div class="phrase-list"><strong>🔖 常考短语</strong>`;
        phraseList.forEach(p => { html += `<div class="phrase-item"><div class="phrase-text"><span class="phrase-en">${escapeHtml(p.phrase)}</span><span class="phrase-zh">${escapeHtml(p.meaning)}</span></div><div class="phrase-example">💬 ${escapeHtml(p.example)}</div></div>`; });
        html += `</div><div class="sentence-list"><strong>🧩 长难句 + 语法分析</strong>`;
        longSentences.forEach(ls => { html += `<div class="sentence-item"><div class="sentence-en">📖 ${escapeHtml(ls.sentence)}</div><div class="sentence-zh">📝 中文：${escapeHtml(ls.trans)}</div><div class="sentence-grammar">📌 语法解析：${escapeHtml(ls.analysis)}</div></div>`; });
        html += `</div></div></div><div class="method-card"><div class="badge-method">🎯 解题方法与思路点拨</div><ul style="margin-left:20px;margin-top:8px;color:#375e4c;"><li><strong>1. 语境推断法</strong> —— 根据上下文逻辑选择适当词汇。</li><li><strong>2. 固定搭配优先</strong> —— 如“suffer from, add...to, a symbol of”。</li><li><strong>3. 感官动词考点</strong> —— taste/smell/feel + adj。</li><li><strong>4. 词性一致原则</strong> —— 名词单复数/副词形式。</li><li><strong>5. 完形填空上下文复现</strong> —— 注意前后提示词。</li></ul></div>`;
        html += `<div class="card" style="padding:16px 22px 22px 22px;"><div class="section-title-icon">📘 我的难词表 · 自主复习</div><table class="vocab-table"><thead><tr><th>序号</th><th>单词</th><th>词性及释义</th><th>我的笔记</th></tr></thead><tbody id="vocabTbody">${[...Array(10)].map((_,i)=>`<tr><td>${i+1}</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>`).join('')}</tbody></table><div class="section-title-icon" style="margin-top:24px;">📜 长难句积累 · 语料库</div><table class="sentence-table"><thead><tr><th>序号</th><th>长难句</th><th>备注</th></tr></thead><tbody id="sentenceTbody">${[...Array(5)].map((_,i)=>`<tr><td>${i+1}</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>`).join('')}</tbody></table><div style="font-size:0.7rem; color:#8aa998; margin-top:12px;">✏️ 点击单元格即可填写。</div></div>`;
        root.innerHTML = html;
        document.querySelectorAll(".cloze-passage, .question-text, .option-text, .phrase-item, .sentence-item, .method-card").forEach(el => makeWordsClickable(el));
        attachEvents();
    }
    function attachEvents() {
        document.querySelectorAll('.card[data-qid]').forEach(card => {
            const correct = card.getAttribute('data-correct');
            const exp = card.getAttribute('data-exp') || "根据语境分析得出。";
            const note = card.getAttribute('data-note') || "注意固定搭配。";
            const optsDiv = card.querySelector('.options-list');
            if (!optsDiv) return;
            const opts = optsDiv.querySelectorAll('.option');
            opts.forEach(opt => {
                opt.addEventListener('click', () => {
                    if (card.classList.contains('answered')) return;
                    const selected = opt.getAttribute('data-val');
                    const isCorrect = (selected === correct);
                    const fb = card.querySelector('.feedback-area');
                    if (!fb) return;
                    let yourFull = selected, correctFull = correct;
                    opts.forEach(o => { if(o.getAttribute('data-val') === selected) yourFull = o.querySelector('.option-text')?.innerText || selected; if(o.getAttribute('data-val') === correct) correctFull = o.querySelector('.option-text')?.innerText || correct; });
                    fb.innerHTML = `<div class="result-badge ${isCorrect ? 'correct-badge' : 'wrong-badge'}">${isCorrect ? '✔ 回答正确' : '❌ 回答错误'}</div><div class="answer-compare"><div class="your-answer">📌 你的答案：${selected}. ${escapeHtml(yourFull)}</div><div class="correct-answer">✅ 正确答案：${correct}. ${escapeHtml(correctFull)}</div></div><div class="detail-explanation"><strong>🔎 详细解析：</strong> ${escapeHtml(exp)}<br/><strong>📘 考点笔记：</strong> ${escapeHtml(note)}</div><div class="lock-message">🔒 答案已锁定</div>`;
                    fb.style.display = 'block';
                    card.classList.add('answered');
                    opts.forEach(o => o.classList.add('disabled-opt'));
                });
            });
        });
    }
    build();
</script>
</body>
</html>
